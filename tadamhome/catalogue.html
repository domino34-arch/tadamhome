<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TadamHome — Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:    #F5F2EC;
  --bg2:   #EDEAE2;
  --bg3:   #E4E0D6;
  --ink:   #1C1B18;
  --ink2:  #4A4840;
  --ink3:  #8A8880;
  --accent:#B8986A;
  --acc2:  #D4B896;
  --acc3:  #A07A4A;
  --white: #FAFAF8;
  --border:rgba(28,27,24,.1);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'Outfit', sans-serif;
  --ease:  cubic-bezier(.25,.1,.25,1);
}
html { scroll-behavior: smooth; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); font-weight: 300; min-height: 100vh; overflow-x: hidden; }

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 200;
  background: rgba(245,242,236,.95); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  height: 56px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 32px;
}
.nav-logo { font-family: var(--serif); font-size: 20px; font-weight: 500; color: var(--ink); text-decoration: none; letter-spacing: .02em; display: flex; align-items: center; }
.nav-logo img { height: 22px; object-fit: contain; }
.nav-logo span { display: none; }
.nav-logo img[style*="display:none"] + span { display: block; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-search {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg2); border: 1px solid var(--border);
  padding: 8px 14px; width: 240px; transition: border-color .2s;
}
.nav-search:focus-within { border-color: var(--accent); background: var(--white); }
.nav-search input { background: transparent; border: none; outline: none; font-family: var(--sans); font-size: 12px; color: var(--ink); width: 100%; font-weight: 300; }
.nav-search input::placeholder { color: var(--ink3); }
.nav-search svg { width: 14px; height: 14px; stroke: var(--ink3); fill: none; stroke-width: 1.5; stroke-linecap: round; flex-shrink: 0; }
.nav-btn {
  font-size: 11px; font-weight: 400; letter-spacing: .1em; text-transform: uppercase;
  padding: 8px 18px; border: 1px solid var(--border); background: transparent;
  color: var(--ink2); cursor: pointer; font-family: var(--sans); transition: all .2s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn.primary { background: var(--ink); color: var(--white); border-color: var(--ink); }
.nav-btn.primary:hover { background: var(--accent); border-color: var(--accent); }
.nav-user { display: flex; align-items: center; gap: 8px; }
.user-avatar {
  width: 30px; height: 30px; border-radius: 0;
  background: rgba(184,152,106,.15); border: 1px solid rgba(184,152,106,.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; color: var(--accent); cursor: pointer;
  font-family: var(--sans);
}

/* ── CATEGORY BAR ── */
.cat-bar {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 0 32px; display: flex; align-items: center;
  gap: 0; overflow-x: auto; scrollbar-width: none;
}
.cat-bar::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0; padding: 14px 20px;
  font-size: 11px; font-weight: 400; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink3); background: transparent; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; font-family: var(--sans); margin-bottom: -1px; transition: all .2s; white-space: nowrap;
}
.cat-btn:hover { color: var(--ink); }
.cat-btn.act { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

/* ── LAYOUT ── */
.layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 96px); }

/* ── SIDEBAR FILTERS ── */
.filters {
  background: var(--white); border-right: 1px solid var(--border);
  padding: 24px 0; position: sticky; top: 96px;
  height: calc(100vh - 96px); overflow-y: auto; scrollbar-width: thin;
}
.filter-section { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 0; }
.filter-section:last-child { border-bottom: none; }
.filter-title {
  font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--ink3); margin-bottom: 14px; margin-top: 20px;
  display: flex; align-items: center; justify-content: space-between; cursor: pointer;
  font-family: var(--sans);
}
.filter-title svg { width: 12px; height: 12px; stroke: var(--ink3); fill: none; stroke-width: 2; stroke-linecap: round; transition: transform .2s; }
.filter-title.open svg { transform: rotate(180deg); }
.filter-opts { display: flex; flex-direction: column; gap: 2px; }
.filter-opt {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; cursor: pointer; transition: background .15s;
  font-size: 12px; color: var(--ink2); font-family: var(--sans);
}
.filter-opt:hover { background: var(--bg2); }
.filter-opt.sel { color: var(--accent); }
.filter-check {
  width: 14px; height: 14px; border: 1px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.filter-opt.sel .filter-check { background: var(--accent); border-color: var(--accent); }
.filter-opt.sel .filter-check::after { content: '✓'; font-size: 9px; color: white; }
.filter-count { margin-left: auto; font-size: 10px; color: var(--ink3); }

/* Price range */
.price-range { padding: 4px 10px 10px; }
.price-inputs { display: flex; gap: 8px; align-items: center; }
.price-inputs input {
  flex: 1; padding: 8px 10px; border: 1px solid var(--border);
  background: var(--bg2); font-family: var(--sans); font-size: 12px;
  color: var(--ink); outline: none; transition: border-color .2s; width: 0;
}
.price-inputs input:focus { border-color: var(--accent); background: var(--white); }
.price-inputs span { font-size: 11px; color: var(--ink3); flex-shrink: 0; }

/* Reset filters */
.filter-reset {
  margin: 16px 20px 0; padding: 10px;
  background: transparent; border: 1px solid var(--border);
  font-family: var(--sans); font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink3); cursor: pointer; width: calc(100% - 40px); transition: all .2s;
}
.filter-reset:hover { border-color: var(--accent); color: var(--accent); }

/* ── MAIN CONTENT ── */
.main { padding: 0; }

/* Top toolbar */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  background: var(--bg); position: sticky; top: 96px; z-index: 100;
}
.toolbar-left { display: flex; align-items: center; gap: 16px; }
.result-count { font-family: var(--serif); font-size: 18px; font-weight: 300; color: var(--ink); }
.result-count span { color: var(--accent); }
.active-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-tag {
  display: flex; align-items: center; gap: 5px;
  background: rgba(184,152,106,.1); border: 1px solid rgba(184,152,106,.25);
  padding: 3px 10px; font-size: 10px; color: var(--acc3);
  font-family: var(--sans); letter-spacing: .06em; cursor: pointer; transition: all .2s;
}
.filter-tag:hover { background: rgba(184,152,106,.2); }
.filter-tag svg { width: 10px; height: 10px; stroke: var(--acc3); fill: none; stroke-width: 2; }
.toolbar-right { display: flex; align-items: center; gap: 10px; }
.sort-select {
  padding: 7px 12px; border: 1px solid var(--border); background: var(--white);
  font-family: var(--sans); font-size: 11px; color: var(--ink2); outline: none;
  cursor: pointer; letter-spacing: .06em; transition: border-color .2s;
}
.sort-select:focus { border-color: var(--accent); }
.view-btns { display: flex; gap: 2px; }
.view-btn {
  width: 32px; height: 32px; border: 1px solid var(--border);
  background: transparent; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all .2s;
}
.view-btn.act { background: var(--ink); border-color: var(--ink); }
.view-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; }
.view-btn { color: var(--ink3); }
.view-btn.act { color: var(--white); }
.view-btn:not(.act):hover { border-color: var(--accent); color: var(--accent); }

/* ── PRODUCT GRID ── */
.prod-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 2px; background: var(--border);
  padding: 2px;
}
.prod-grid.list-view { grid-template-columns: 1fr; }

/* PRODUCT CARD */
.prod-card {
  background: var(--white); position: relative; overflow: hidden;
  cursor: pointer; transition: background .25s;
  animation: fadein .4s ease;
}
.prod-card:hover { background: var(--bg); }

.prod-card-img {
  aspect-ratio: 4/3; background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.prod-card-img img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .5s var(--ease);
}
.prod-card:hover .prod-card-img img { transform: scale(1.04); }
.prod-card-img .no-img {
  width: 60%; height: 60%; display: flex; align-items: center; justify-content: center;
}
.prod-card-img .no-img svg { width: 100%; height: 100%; opacity: .15; }

/* AR badge on hover */
.ar-overlay {
  position: absolute; inset: 0;
  background: rgba(28,27,24,.04);
  display: flex; align-items: flex-end; justify-content: flex-end;
  padding: 12px; opacity: 0; transition: opacity .25s;
}
.prod-card:hover .ar-overlay { opacity: 1; }
.ar-overlay-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--white); border: none;
  padding: 8px 14px; font-family: var(--sans); font-size: 10px;
  font-weight: 500; color: var(--ink); letter-spacing: .1em; text-transform: uppercase;
  cursor: pointer; transition: background .2s; text-decoration: none;
}
.ar-overlay-btn:hover { background: var(--accent); color: var(--white); }
.ar-overlay-btn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; }

/* Category chip on image */
.prod-cat-chip {
  position: absolute; top: 12px; left: 12px;
  background: rgba(245,242,236,.92); backdrop-filter: blur(6px);
  padding: 3px 9px; font-size: 9px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--ink3); font-family: var(--sans);
}

/* Card info */
.prod-card-info { padding: 16px 18px 18px; border-top: 1px solid var(--border); }
.prod-card-brand { font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.prod-card-name { font-family: var(--serif); font-size: 18px; font-weight: 400; color: var(--ink); margin-bottom: 4px; line-height: 1.2; }
.prod-card-meta { font-size: 11px; color: var(--ink3); margin-bottom: 10px; }
.prod-card-footer { display: flex; align-items: center; justify-content: space-between; }
.prod-card-price { font-family: var(--serif); font-size: 18px; font-weight: 300; color: var(--ink); }
.prod-card-actions { display: flex; gap: 6px; }
.card-btn {
  padding: 6px 12px; border: 1px solid var(--border); background: transparent;
  font-size: 9px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--ink3); cursor: pointer; font-family: var(--sans); transition: all .2s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
}
.card-btn:hover { border-color: var(--accent); color: var(--accent); }
.card-btn.ar { background: var(--ink); color: var(--white); border-color: var(--ink); }
.card-btn.ar:hover { background: var(--accent); border-color: var(--accent); }

/* LIST VIEW */
.prod-grid.list-view .prod-card { display: grid; grid-template-columns: 200px 1fr; }
.prod-grid.list-view .prod-card-img { aspect-ratio: auto; height: 160px; }
.prod-grid.list-view .prod-card-info { display: flex; flex-direction: column; justify-content: center; padding: 20px 24px; }

/* ── EMPTY STATE ── */
.empty {
  grid-column: 1/-1; padding: 80px; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.empty-ico { font-family: var(--serif); font-size: 52px; font-weight: 300; color: rgba(184,152,106,.25); line-height: 1; }
.empty-h { font-family: var(--serif); font-size: 26px; font-weight: 300; color: var(--ink); }
.empty-p { font-size: 13px; color: var(--ink3); max-width: 300px; line-height: 1.7; font-family: var(--sans); }

/* ── LOADING ── */
.loading-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; background: var(--border); padding: 2px; }
.skeleton { background: var(--white); animation: shimmer 1.5s ease-in-out infinite; }
.skeleton-img { aspect-ratio: 4/3; background: var(--bg2); }
.skeleton-info { padding: 16px 18px; }
.skeleton-line { height: 10px; background: var(--bg3); border-radius: 2px; margin-bottom: 8px; }
.skeleton-line.short { width: 60%; }
@keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.6} }

/* ── PAGINATION ── */
.pagination { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 32px; }
.page-btn {
  width: 36px; height: 36px; border: 1px solid var(--border); background: transparent;
  font-family: var(--sans); font-size: 12px; color: var(--ink3); cursor: pointer; transition: all .2s;
}
.page-btn:hover { border-color: var(--accent); color: var(--accent); }
.page-btn.act { background: var(--ink); color: var(--white); border-color: var(--ink); }
.page-btn.nav { font-size: 16px; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: var(--white); padding: 11px 20px; font-size: 12px; font-weight: 400; opacity: 0; transition: all .3s; z-index: 999; transform: translateY(8px); letter-spacing: .04em; font-family: var(--sans); }
.toast.show { opacity: 1; transform: translateY(0); }

/* ── MOBILE ── */
@media (max-width: 1024px) { .prod-grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 768px) {
  nav { padding: 0 18px; }
  .nav-search { display: none; }
  .layout { grid-template-columns: 1fr; }
  .filters { display: none; position: fixed; inset: 0; top: 96px; z-index: 300; background: var(--white); height: calc(100vh - 96px); }
  .filters.open { display: block; }
  .prod-grid { grid-template-columns: repeat(2,1fr); }
  .toolbar { padding: 12px 16px; top: 56px; }
  .cat-bar { padding: 0 16px; }
}
@media (max-width: 480px) { .prod-grid { grid-template-columns: 1fr; } }

@keyframes fadein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="TadamHome" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
    <span style="font-family:var(--serif);font-size:20px;font-weight:500">Tadam<span style="color:var(--accent)">Home</span></span>
  </a>
  <div class="nav-search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Rechercher un meuble, une marque…" oninput="handleSearch()"/>
  </div>
  <div class="nav-right">
    <div class="nav-user">
      <div class="user-avatar" id="userAvatar" onclick="window.location='dashboard.html'">—</div>
    </div>
    <a href="dashboard.html" class="nav-btn">Dashboard</a>
    <button class="nav-btn" id="filterToggle" onclick="toggleMobileFilters()" style="display:none">Filtres</button>
  </div>
</nav>

<!-- CATEGORY BAR -->
<div class="cat-bar" id="catBar">
  <button class="cat-btn act" data-cat="all" onclick="setCategory('all', this)">Tout</button>
  <button class="cat-btn" data-cat="sofa"      onclick="setCategory('sofa', this)">Canapés</button>
  <button class="cat-btn" data-cat="fauteuil"  onclick="setCategory('fauteuil', this)">Fauteuils</button>
  <button class="cat-btn" data-cat="chaise"    onclick="setCategory('chaise', this)">Chaises</button>
  <button class="cat-btn" data-cat="table"     onclick="setCategory('table', this)">Tables</button>
  <button class="cat-btn" data-cat="luminaire" onclick="setCategory('luminaire', this)">Luminaires</button>
  <button class="cat-btn" data-cat="rangement" onclick="setCategory('rangement', this)">Rangements</button>
  <button class="cat-btn" data-cat="lit"       onclick="setCategory('lit', this)">Lits</button>
  <button class="cat-btn" data-cat="autre"     onclick="setCategory('autre', this)">Autre</button>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR FILTERS -->
  <aside class="filters" id="filtersSidebar">

    <div class="filter-section">
      <div class="filter-title open" onclick="toggleSection(this)">
        Marque
        <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
      </div>
      <div class="filter-opts" id="brandFilters">
        <!-- Populated by JS -->
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-title open" onclick="toggleSection(this)">
        Prix
        <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
      </div>
      <div class="price-range">
        <div class="price-inputs">
          <input type="number" id="priceMin" placeholder="Min" oninput="applyFilters()"/>
          <span>—</span>
          <input type="number" id="priceMax" placeholder="Max" oninput="applyFilters()"/>
          <span style="font-size:11px;color:var(--ink3)">€</span>
        </div>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-title open" onclick="toggleSection(this)">
        Matière
        <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
      </div>
      <div class="filter-opts" id="matFilters">
        <!-- Populated by JS -->
      </div>
    </div>

    <button class="filter-reset" onclick="resetFilters()">Réinitialiser les filtres</button>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="result-count" id="resultCount">— <span>produits</span></div>
        <div class="active-filters" id="activeTags"></div>
      </div>
      <div class="toolbar-right">
        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
          <option value="new">Plus récents</option>
          <option value="price_asc">Prix croissant</option>
          <option value="price_desc">Prix décroissant</option>
          <option value="name">A — Z</option>
        </select>
        <div class="view-btns">
          <button class="view-btn act" id="btnGrid" onclick="setView('grid')" title="Grille">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" id="btnList" onclick="setView('list')" title="Liste">
            <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- GRID -->
    <div id="prodGrid" class="prod-grid">
      <!-- Loading skeletons -->
      ${Array(6).fill(0).map(() => `
        <div class="skeleton">
          <div class="skeleton-img"></div>
          <div class="skeleton-info">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
          </div>
        </div>`).join('')}
    </div>

    <div class="pagination" id="pagination"></div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── SUPABASE ── */
const SB_URL = 'https://wbunwfxecvxngypuehop.supabase.co';
const SB_KEY = 'sb_publishable_whNXpZBu7hbDWxZ-foYFUQ_WSEiIl1P';
const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

const SCAN_BASE = 'https://tadamhome.fr/scan';
const PER_PAGE  = 24;

/* ── STATE ── */
let allProducts   = [];
let filtered      = [];
let currentCat    = 'all';
let selectedBrands= new Set();
let selectedMats  = new Set();
let currentView   = 'grid';
let currentPage   = 1;
let searchQ       = '';

/* ── AUTH CHECK ── */
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  const u = session.user;
  const name = u.user_metadata?.full_name || u.email?.split('@')[0] || '?';
  document.getElementById('userAvatar').textContent = name[0].toUpperCase();
})();

/* ── LOAD PRODUCTS ── */
async function loadProducts() {
  try {
    const { data, error } = await sb.from('products').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    allProducts = data || [];
    buildSidebarFilters();
    applyFilters();
  } catch(e) {
    console.error(e);
    showToast('Erreur de chargement');
    document.getElementById('prodGrid').innerHTML = `<div class="empty"><div class="empty-ico">◇</div><div class="empty-h">Impossible de charger le catalogue</div><p class="empty-p">Vérifiez votre connexion et réessayez.</p></div>`;
  }
}

/* ── SIDEBAR FILTERS ── */
function buildSidebarFilters() {
  // Brands
  const brands = [...new Set(allProducts.map(p => p.enseigne_name || p.marque).filter(Boolean))].sort();
  const bf = document.getElementById('brandFilters');
  bf.innerHTML = brands.slice(0, 12).map(b => `
    <div class="filter-opt" onclick="toggleBrand('${b}', this)">
      <div class="filter-check"></div>
      <span>${b}</span>
      <span class="filter-count">${allProducts.filter(p => (p.enseigne_name||p.marque)===b).length}</span>
    </div>`).join('');

  // Matières
  const mats = [...new Set(allProducts.flatMap(p => {
    const m = p.matiere || p.material;
    if (!m) return [];
    return m.split(',').map(x => x.trim()).filter(Boolean);
  }))].sort().slice(0, 10);
  const mf = document.getElementById('matFilters');
  mf.innerHTML = mats.map(m => `
    <div class="filter-opt" onclick="toggleMat('${m}', this)">
      <div class="filter-check"></div>
      <span>${m}</span>
    </div>`).join('');
  if (!mats.length) document.querySelector('.filter-section:last-of-type').style.display = 'none';
}

/* ── CATEGORY ── */
function setCategory(cat, el) {
  currentCat = cat;
  currentPage = 1;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('act'));
  el.classList.add('act');
  applyFilters();
}

/* ── BRAND FILTER ── */
function toggleBrand(brand, el) {
  el.classList.toggle('sel');
  if (selectedBrands.has(brand)) selectedBrands.delete(brand);
  else selectedBrands.add(brand);
  currentPage = 1;
  applyFilters();
}

/* ── MAT FILTER ── */
function toggleMat(mat, el) {
  el.classList.toggle('sel');
  if (selectedMats.has(mat)) selectedMats.delete(mat);
  else selectedMats.add(mat);
  currentPage = 1;
  applyFilters();
}

/* ── SEARCH ── */
function handleSearch() {
  searchQ = document.getElementById('searchInput').value.toLowerCase().trim();
  currentPage = 1;
  applyFilters();
}

/* ── APPLY ALL FILTERS ── */
function applyFilters() {
  const priceMin = parseFloat(document.getElementById('priceMin').value) || 0;
  const priceMax = parseFloat(document.getElementById('priceMax').value) || Infinity;
  const sort     = document.getElementById('sortSelect').value;

  filtered = allProducts.filter(p => {
    const name   = (p.name || p.nom || '').toLowerCase();
    const brand  = (p.enseigne_name || p.marque || '').toLowerCase();
    const cat    = (p.category || p.categorie || '').toLowerCase();
    const mat    = (p.matiere || p.material || '').toLowerCase();
    const price  = p.price || p.prix || 0;

    // Category
    if (currentCat !== 'all') {
      const catMap = { sofa: ['sofa','canapé','canape'], fauteuil: ['fauteuil'], chaise: ['chaise'], table: ['table'], luminaire: ['luminaire'], rangement: ['rangement'], lit: ['lit'], autre: ['autre'] };
      const cats = catMap[currentCat] || [currentCat];
      if (!cats.some(c => cat.includes(c))) return false;
    }

    // Search
    if (searchQ && !name.includes(searchQ) && !brand.includes(searchQ) && !cat.includes(searchQ)) return false;

    // Brands
    if (selectedBrands.size > 0 && !selectedBrands.has(p.enseigne_name || p.marque)) return false;

    // Mats
    if (selectedMats.size > 0) {
      const hasM = [...selectedMats].some(m => mat.includes(m.toLowerCase()));
      if (!hasM) return false;
    }

    // Price
    if (price && (price < priceMin || price > priceMax)) return false;

    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    if (sort === 'price_asc')  return (a.price||a.prix||0) - (b.price||b.prix||0);
    if (sort === 'price_desc') return (b.price||b.prix||0) - (a.price||a.prix||0);
    if (sort === 'name')       return (a.name||a.nom||'').localeCompare(b.name||b.nom||'');
    return 0; // newest first (already sorted by Supabase)
  });

  updateResultCount();
  updateActiveTags();
  renderPage();
  renderPagination();
}

/* ── RENDER PRODUCTS ── */
function renderPage() {
  const grid = document.getElementById('prodGrid');
  const start = (currentPage - 1) * PER_PAGE;
  const page  = filtered.slice(start, start + PER_PAGE);

  if (!page.length) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-ico">◇</div>
        <div class="empty-h">Aucun résultat</div>
        <p class="empty-p">Essayez d'élargir vos critères de recherche ou de réinitialiser les filtres.</p>
      </div>`;
    return;
  }

  grid.innerHTML = page.map(p => {
    const name   = p.name  || p.nom   || '—';
    const brand  = p.enseigne_name || p.marque || '—';
    const cat    = p.category || p.categorie || '';
    const mat    = p.matiere  || p.material  || '';
    const price  = p.price    || p.prix;
    const hasGlb = !!(p.model_glb_url);

    return `
      <div class="prod-card" onclick="goProduct('${p.id}')">
        <div class="prod-card-img">
          <div class="no-img">
            <svg viewBox="0 0 200 150" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="20" y="70" width="160" height="55" rx="12" fill="#C4B896"/>
              <rect x="20" y="55" width="160" height="22" rx="6" fill="#D4C8A8"/>
              <rect x="20" y="55" width="18" height="70" rx="4" fill="#B4A888"/>
              <rect x="162" y="55" width="18" height="70" rx="4" fill="#B4A888"/>
            </svg>
          </div>
          ${cat ? `<div class="prod-cat-chip">${cat}</div>` : ''}
          <div class="ar-overlay">
            <a href="${SCAN_BASE}?id=${p.id}" class="ar-overlay-btn" onclick="event.stopPropagation()">
              <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
              Voir en AR
            </a>
          </div>
        </div>
        <div class="prod-card-info">
          <div class="prod-card-brand">${brand}</div>
          <div class="prod-card-name">${name}</div>
          <div class="prod-card-meta">${[cat, mat].filter(Boolean).join(' · ')}</div>
          <div class="prod-card-footer">
            <div class="prod-card-price">${price ? price.toLocaleString('fr-FR') + ' €' : '—'}</div>
            <div class="prod-card-actions">
              ${hasGlb ? `<a href="${SCAN_BASE}?id=${p.id}" class="card-btn ar" onclick="event.stopPropagation()">AR</a>` : ''}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function goProduct(id) { window.location.href = `${SCAN_BASE}?id=${id}`; }

/* ── PAGINATION ── */
function renderPagination() {
  const total = filtered.length;
  const pages = Math.ceil(total / PER_PAGE);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn nav" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>←</button>`;
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || Math.abs(i - currentPage) <= 1) {
      html += `<button class="page-btn${i===currentPage?' act':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - currentPage) === 2) {
      html += `<button class="page-btn" style="pointer-events:none;color:var(--ink3)">…</button>`;
    }
  }
  html += `<button class="page-btn nav" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>→</button>`;
  el.innerHTML = html;
}

function goPage(p) {
  const pages = Math.ceil(filtered.length / PER_PAGE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderPage();
  renderPagination();
  document.querySelector('.toolbar').scrollIntoView({ behavior: 'smooth' });
}

/* ── UI HELPERS ── */
function updateResultCount() {
  document.getElementById('resultCount').innerHTML = `${filtered.length} <span>${filtered.length > 1 ? 'produits' : 'produit'}</span>`;
}

function updateActiveTags() {
  const tags = [];
  if (currentCat !== 'all') tags.push({ label: document.querySelector(`.cat-btn[data-cat="${currentCat}"]`)?.textContent || currentCat, action: () => setCategory('all', document.querySelector('.cat-btn[data-cat="all"]')) });
  selectedBrands.forEach(b => tags.push({ label: b, action: () => { selectedBrands.delete(b); document.querySelectorAll('.filter-opt').forEach(el => { if(el.textContent.trim().startsWith(b)) el.classList.remove('sel'); }); applyFilters(); } }));
  if (searchQ) tags.push({ label: `"${searchQ}"`, action: () => { searchQ=''; document.getElementById('searchInput').value=''; applyFilters(); } });

  document.getElementById('activeTags').innerHTML = tags.map((t, i) => `
    <div class="filter-tag" onclick="removeTag(${i})">
      ${t.label}
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>`).join('');
  document.getElementById('activeTags')._tags = tags;
}

function removeTag(i) {
  const tags = document.getElementById('activeTags')._tags;
  if (tags && tags[i]) { tags[i].action(); }
}

function resetFilters() {
  currentCat = 'all'; selectedBrands.clear(); selectedMats.clear(); searchQ = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('priceMin').value = '';
  document.getElementById('priceMax').value = '';
  document.querySelectorAll('.filter-opt').forEach(el => el.classList.remove('sel'));
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('act'));
  document.querySelector('.cat-btn[data-cat="all"]').classList.add('act');
  currentPage = 1;
  applyFilters();
}

/* ── VIEW ── */
function setView(v) {
  currentView = v;
  const grid = document.getElementById('prodGrid');
  grid.classList.toggle('list-view', v === 'list');
  document.getElementById('btnGrid').classList.toggle('act', v === 'grid');
  document.getElementById('btnList').classList.toggle('act', v === 'list');
}

/* ── SECTION TOGGLE ── */
function toggleSection(el) {
  el.classList.toggle('open');
  const opts = el.nextElementSibling;
  opts.style.display = el.classList.contains('open') ? '' : 'none';
}

/* ── MOBILE FILTERS ── */
function toggleMobileFilters() {
  document.getElementById('filtersSidebar').classList.toggle('open');
}

/* ── TOAST ── */
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

/* ── RESPONSIVE ── */
function checkMobile() {
  const isMobile = window.innerWidth <= 768;
  document.getElementById('filterToggle').style.display = isMobile ? 'flex' : 'none';
}
window.addEventListener('resize', checkMobile);
checkMobile();

/* ── INIT ── */
loadProducts();
</script>
</body>
</html>
