<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TadamHome — Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:    #F5F2EC;
  --bg2:   #EDEAE2;
  --bg3:   #E4E0D6;
  --ink:   #1C1B18;
  --ink2:  #4A4840;
  --ink3:  #8A8880;
  --accent:#B8986A;
  --acc2:  #D4B896;
  --acc3:  #A07A4A;
  --white: #FAFAF8;
  --border:rgba(28,27,24,.1);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'Outfit', sans-serif;
  --ease:  cubic-bezier(.25,.1,.25,1);
  --header-h: 102px; /* nav 56 + cat-bar ~46 — JS updates this when alphabet shows */
}
html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  font-weight: 300;
  min-height: 100vh;
  padding-top: var(--header-h);
  transition: padding-top .25s var(--ease);
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: rgba(245,242,236,.97); backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  height: 56px; display: flex; align-items: center;
  justify-content: space-between; gap: 16px; padding: 0 24px;
}
.nav-logo { font-family: var(--serif); font-size: 20px; font-weight: 500; color: var(--ink); text-decoration: none; letter-spacing: .02em; display: flex; align-items: center; }
.nav-logo img { height: 22px; object-fit: contain; }
.nav-logo span { display: none; }
.nav-logo img[style*="display:none"] + span { display: block; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-search {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg2); border: 1px solid var(--border);
  padding: 8px 14px; width: 240px; transition: border-color .2s;
}
.nav-search:focus-within { border-color: var(--accent); background: var(--white); }
.nav-search input { background: transparent; border: none; outline: none; font-family: var(--sans); font-size: 12px; color: var(--ink); width: 100%; font-weight: 300; }
.nav-search input::placeholder { color: var(--ink3); }
.nav-search svg { width: 14px; height: 14px; stroke: var(--ink3); fill: none; stroke-width: 1.5; stroke-linecap: round; flex-shrink: 0; }
.nav-btn {
  font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase;
  padding: 6px 12px; border: 1px solid var(--border); background: transparent;
  color: var(--ink); cursor: pointer; font-family: var(--sans); transition: all .2s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn.primary { background: var(--ink); color: var(--white); border-color: var(--ink); }
.nav-btn.primary:hover { background: var(--accent); border-color: var(--accent); }

/* ── CATEGORY BAR (fixed, always visible) ── */
.cat-wrapper {
  position: fixed;
  top: 56px; left: 0; right: 0;
  z-index: 150;
  background: var(--white);
  border-bottom: 1px solid var(--border);
}
.cat-bar {
  display: flex; align-items: center; gap: 0;
  padding: 0 24px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  scroll-behavior: smooth;
}
.cat-bar::-webkit-scrollbar { display: none; }

/* Burger button */
.burger-btn {
  flex-shrink: 0;
  width: 44px; height: 46px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: none; border-right: 1px solid var(--border);
  cursor: pointer; margin-right: 8px;
  transition: background .15s;
}
.burger-btn:hover { background: var(--bg2); }
.burger-btn svg { width: 18px; height: 18px; stroke: var(--ink); fill: none; stroke-width: 1.6; stroke-linecap: round; }

.cat-btn {
  flex-shrink: 0; padding: 14px 18px;
  font-size: 11px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink2); background: transparent; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; font-family: var(--sans); margin-bottom: -1px; transition: color .2s, border-color .2s;
  white-space: nowrap;
}
.cat-btn:hover { color: var(--ink); }
.cat-btn.act { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* Alphabet bar (visible when "Marques" active) */
.alpha-bar {
  display: none;
  align-items: center;
  gap: 2px;
  padding: 10px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  overflow-x: auto;
  scrollbar-width: none;
}
.alpha-bar::-webkit-scrollbar { display: none; }
.alpha-bar.show { display: flex; }
.alpha-btn {
  flex-shrink: 0;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid transparent;
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: .04em; color: var(--ink2);
  cursor: pointer; transition: all .15s;
}
.alpha-btn:hover { color: var(--accent); border-color: rgba(184,152,106,.3); }
.alpha-btn.act { background: var(--ink); color: var(--white); border-color: var(--ink); }
.alpha-btn.disabled { color: var(--ink3); opacity: .35; pointer-events: none; }
.alpha-btn.all-letters {
  width: auto; padding: 0 10px; font-size: 9px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--ink2);
}

/* Burger menu panel */
.burger-panel {
  position: fixed; top: 0; left: 0;
  width: 280px; height: 100vh;
  background: var(--white); border-right: 1px solid var(--border);
  box-shadow: 4px 0 24px rgba(0,0,0,.08);
  z-index: 400;
  transform: translateX(-100%);
  transition: transform .25s var(--ease);
  display: flex; flex-direction: column;
}
.burger-panel.open { transform: translateX(0); }
.burger-overlay {
  position: fixed; inset: 0;
  background: rgba(28,27,24,.4);
  backdrop-filter: blur(2px);
  z-index: 399;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.burger-overlay.show { opacity: 1; pointer-events: auto; }
.burger-head {
  padding: 18px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.burger-head h3 {
  font-family: var(--serif); font-size: 20px; font-weight: 400; color: var(--ink);
}
.burger-close {
  width: 32px; height: 32px; background: transparent; border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.burger-close:hover { border-color: var(--accent); }
.burger-close svg { width: 14px; height: 14px; stroke: var(--ink); fill: none; stroke-width: 1.6; }
.burger-list { flex: 1; overflow-y: auto; padding: 12px 0; }
.burger-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  font-family: var(--sans); font-size: 13px; font-weight: 400;
  letter-spacing: .04em; color: var(--ink);
  cursor: pointer; border-left: 3px solid transparent;
  transition: all .15s;
}
.burger-item:hover { background: var(--bg2); border-left-color: var(--acc2); }
.burger-item.act { background: rgba(184,152,106,.08); border-left-color: var(--accent); color: var(--accent); font-weight: 500; }
.burger-item-count {
  font-size: 11px; color: var(--ink3); font-weight: 300;
}
.burger-item.act .burger-item-count { color: var(--accent); }

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr);
  min-height: calc(100vh - var(--header-h));
}

/* ── SIDEBAR FILTERS ── */
.filters {
  background: var(--white); border-right: 1px solid var(--border);
  padding: 24px 0;
  align-self: start;
  position: sticky;
  top: var(--header-h);
  max-height: calc(100vh - var(--header-h));
  overflow-y: auto;
  scrollbar-width: thin;
  transition: top .25s var(--ease), max-height .25s var(--ease);
}
.filter-section { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 0; }
.filter-section:last-child { border-bottom: none; }
.filter-title {
  font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--ink); font-weight: 600;
  margin-bottom: 14px; margin-top: 20px;
  display: flex; align-items: center; justify-content: space-between; cursor: pointer;
  font-family: var(--sans);
}
.filter-title svg { width: 12px; height: 12px; stroke: var(--ink); fill: none; stroke-width: 2; stroke-linecap: round; transition: transform .2s; }
.filter-title.open svg { transform: rotate(180deg); }
.filter-opts { display: flex; flex-direction: column; gap: 2px; }
.filter-opt {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; cursor: pointer; transition: background .15s;
  font-size: 12px; color: var(--ink); font-family: var(--sans); font-weight: 400;
}
.filter-opt:hover { background: var(--bg2); }
.filter-opt.sel { color: var(--accent); font-weight: 500; }
.filter-check {
  width: 14px; height: 14px; border: 1px solid var(--ink3);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.filter-opt.sel .filter-check { background: var(--accent); border-color: var(--accent); }
.filter-opt.sel .filter-check::after { content: '✓'; font-size: 9px; color: white; }
.filter-count { margin-left: auto; font-size: 10px; color: var(--ink3); }

/* Price range */
.price-range { padding: 4px 10px 10px; }
.price-inputs { display: flex; gap: 8px; align-items: center; }
.price-inputs input {
  flex: 1; padding: 8px 10px; border: 1px solid var(--border);
  background: var(--bg2); font-family: var(--sans); font-size: 12px;
  color: var(--ink); outline: none; transition: border-color .2s; width: 0;
}
.price-inputs input:focus { border-color: var(--accent); background: var(--white); }
.price-inputs span { font-size: 11px; color: var(--ink2); flex-shrink: 0; }

/* Reset filters */
.filter-reset {
  margin: 16px 20px 0; padding: 11px;
  background: transparent; border: 1px solid var(--ink2);
  font-family: var(--sans); font-size: 10px; font-weight: 500;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink); cursor: pointer; width: calc(100% - 40px); transition: all .2s;
}
.filter-reset:hover { background: var(--ink); color: var(--white); border-color: var(--ink); }

/* ── MAIN CONTENT ── */
.main { padding: 0; min-width: 0; }

/* Top toolbar */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  background: var(--bg); flex-wrap: wrap; gap: 12px;
}
.toolbar-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.result-count { font-family: var(--serif); font-size: 18px; font-weight: 400; color: var(--ink); }
.result-count span { color: var(--accent); font-weight: 300; }
.active-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-tag {
  display: flex; align-items: center; gap: 5px;
  background: rgba(184,152,106,.12); border: 1px solid rgba(184,152,106,.3);
  padding: 4px 10px; font-size: 10px; color: var(--acc3); font-weight: 500;
  font-family: var(--sans); letter-spacing: .06em; cursor: pointer; transition: all .2s;
}
.filter-tag:hover { background: rgba(184,152,106,.22); }
.filter-tag svg { width: 10px; height: 10px; stroke: var(--acc3); fill: none; stroke-width: 2; }
.toolbar-right { display: flex; align-items: center; gap: 10px; }
.sort-select {
  padding: 8px 14px; border: 1px solid var(--ink3); background: var(--white);
  font-family: var(--sans); font-size: 12px; color: var(--ink); font-weight: 500;
  outline: none; cursor: pointer; letter-spacing: .04em; transition: border-color .2s;
}
.sort-select:focus { border-color: var(--accent); }
.view-btns { display: flex; gap: 2px; }
.view-btn {
  width: 34px; height: 34px; border: 1px solid var(--ink3);
  background: var(--white); cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all .2s;
}
.view-btn.act { background: var(--ink); border-color: var(--ink); }
.view-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }
.view-btn { color: var(--ink2); }
.view-btn.act { color: var(--white); }
.view-btn:not(.act):hover { border-color: var(--accent); color: var(--accent); }

/* ── PRODUCT GRID ── */
.prod-grid {
  display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 2px; background: var(--border);
  padding: 2px;
}
.prod-grid.list-view { grid-template-columns: minmax(0, 1fr); }

/* PRODUCT CARD */
.prod-card {
  background: var(--white); position: relative; overflow: hidden;
  cursor: pointer; transition: background .25s;
  animation: fadein .4s ease;
  min-width: 0;
}
.prod-card:hover { background: var(--bg); }

.prod-card-img {
  aspect-ratio: 4/3; background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.prod-card-img img.product-photo {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .5s var(--ease);
}
.prod-card:hover .prod-card-img img.product-photo { transform: scale(1.04); }
.prod-card-img .no-img {
  width: 60%; height: 60%; display: flex; align-items: center; justify-content: center;
}
.prod-card-img .no-img svg { width: 100%; height: 100%; opacity: .15; }

/* Card info */
.prod-card-info { padding: 16px 18px 18px; border-top: 1px solid var(--border); }
.prod-card-brand { font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; font-weight: 500; }
.prod-card-name { font-family: var(--serif); font-size: 18px; font-weight: 400; color: var(--ink); margin-bottom: 4px; line-height: 1.2; }
.prod-card-meta { font-size: 11px; color: var(--ink2); margin-bottom: 10px; font-weight: 400; }
.prod-card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.prod-card-price { font-family: var(--serif); font-size: 18px; font-weight: 400; color: var(--ink); }
.prod-card-actions { display: flex; gap: 6px; }
.card-btn.ar {
  padding: 8px 14px; border: 1px solid var(--ink); background: var(--ink);
  color: var(--white); font-size: 10px; font-weight: 600; letter-spacing: .12em;
  text-transform: uppercase; cursor: pointer; font-family: var(--sans);
  transition: all .2s; text-decoration: none;
  display: inline-flex; align-items: center; gap: 5px;
}
.card-btn.ar:hover { background: var(--accent); border-color: var(--accent); }
.card-btn.ar svg { width: 11px; height: 11px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }

/* LIST VIEW */
.prod-grid.list-view .prod-card { display: grid; grid-template-columns: 200px minmax(0,1fr); }
.prod-grid.list-view .prod-card-img { aspect-ratio: auto; height: 160px; }
.prod-grid.list-view .prod-card-info { display: flex; flex-direction: column; justify-content: center; padding: 20px 24px; border-top: none; border-left: 1px solid var(--border); }

/* ── EMPTY STATE ── */
.empty {
  grid-column: 1/-1; padding: 80px 32px; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.empty-ico { font-family: var(--serif); font-size: 52px; font-weight: 300; color: rgba(184,152,106,.25); line-height: 1; }
.empty-h { font-family: var(--serif); font-size: 26px; font-weight: 300; color: var(--ink); }
.empty-p { font-size: 13px; color: var(--ink2); max-width: 300px; line-height: 1.7; font-family: var(--sans); }

/* ── LOADING ── */
.skeleton { background: var(--white); animation: shimmer 1.5s ease-in-out infinite; }
.skeleton-img { aspect-ratio: 4/3; background: var(--bg2); }
.skeleton-info { padding: 16px 18px; }
.skeleton-line { height: 10px; background: var(--bg3); border-radius: 2px; margin-bottom: 8px; }
.skeleton-line.short { width: 60%; }
@keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.6} }

/* ── PAGINATION ── */
.pagination { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 32px; flex-wrap: wrap; }
.page-btn {
  min-width: 36px; height: 36px; border: 1px solid var(--ink3); background: var(--white);
  font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--ink);
  cursor: pointer; transition: all .2s; padding: 0 8px;
}
.page-btn:hover { border-color: var(--accent); color: var(--accent); }
.page-btn.act { background: var(--ink); color: var(--white); border-color: var(--ink); }
.page-btn.nav { font-size: 16px; }
.page-btn[disabled] { opacity: .4; cursor: not-allowed; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: var(--white); padding: 11px 20px; font-size: 12px; font-weight: 400; opacity: 0; transition: all .3s; z-index: 999; transform: translateY(8px); letter-spacing: .04em; font-family: var(--sans); }
.toast.show { opacity: 1; transform: translateY(0); }

/* ── MOBILE ── */
@media (max-width: 1024px) { .prod-grid { grid-template-columns: repeat(2,minmax(0,1fr)); } }
@media (max-width: 768px) {
  nav { padding: 0 16px; }
  .nav-search { display: none; }
  .layout { grid-template-columns: minmax(0,1fr); }
  .filters {
    display: none;
    position: fixed; left: 0; right: 0; bottom: 0;
    top: var(--header-h);
    z-index: 300; background: var(--white);
    height: auto; width: 100%;
    max-height: none;
  }
  .filters.open { display: block; }
  .prod-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
  .toolbar { padding: 12px 16px; }
  .cat-bar { padding: 0 12px; }
  .alpha-bar { padding: 8px 12px; }
  .cat-btn { padding: 12px 14px; font-size: 10px; }
  .burger-panel { width: 85%; max-width: 320px; }
}
@media (max-width: 480px) {
  .prod-grid { grid-template-columns: minmax(0,1fr); }
  .prod-grid.list-view .prod-card { grid-template-columns: 130px minmax(0,1fr); }
  .prod-grid.list-view .prod-card-img { height: 130px; }
}

@keyframes fadein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="TadamHome" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
    <span style="font-family:var(--serif);font-size:20px;font-weight:500">Tadam<span style="color:var(--accent)">Home</span></span>
  </a>
  <div class="nav-search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Rechercher un meuble, une marque…" oninput="handleSearch()"/>
  </div>
  <div class="nav-right">
    <a href="dashboard.html" class="nav-btn">Dashboard</a>
    <button class="nav-btn" id="filterToggle" onclick="toggleMobileFilters()" style="display:none">Filtres</button>
  </div>
</nav>

<!-- CATEGORY BAR + ALPHABET -->
<div class="cat-wrapper">
  <div class="cat-bar" id="catBar">
    <button class="burger-btn" onclick="openBurger()" aria-label="Menu catégories" title="Catégories">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <button class="cat-btn act" data-cat="all" onclick="setCategory('all', this)">Tout</button>
    <button class="cat-btn" data-cat="sofa"      onclick="setCategory('sofa', this)">Canapés</button>
    <button class="cat-btn" data-cat="fauteuil"  onclick="setCategory('fauteuil', this)">Fauteuils</button>
    <button class="cat-btn" data-cat="chaise"    onclick="setCategory('chaise', this)">Chaises</button>
    <button class="cat-btn" data-cat="table"     onclick="setCategory('table', this)">Tables</button>
    <button class="cat-btn" data-cat="luminaire" onclick="setCategory('luminaire', this)">Luminaires</button>
    <button class="cat-btn" data-cat="rangement" onclick="setCategory('rangement', this)">Rangements</button>
    <button class="cat-btn" data-cat="lit"       onclick="setCategory('lit', this)">Lits</button>
    <button class="cat-btn" data-cat="marque"    onclick="setCategory('marque', this)">Marques</button>
    <button class="cat-btn" data-cat="autre"     onclick="setCategory('autre', this)">Autre</button>
  </div>
  <!-- Alphabet bar (only when "Marques" selected) -->
  <div class="alpha-bar" id="alphaBar">
    <button class="alpha-btn all-letters act" data-letter="all" onclick="setLetter('all', this)">Toutes</button>
    <!-- Letters generated by JS -->
  </div>
</div>

<!-- BURGER PANEL -->
<div class="burger-overlay" id="burgerOverlay" onclick="closeBurger()"></div>
<aside class="burger-panel" id="burgerPanel">
  <div class="burger-head">
    <h3>Catégories</h3>
    <button class="burger-close" onclick="closeBurger()" aria-label="Fermer">

  if (!c.keys) return allProducts.length;
  return allProducts.filter(p => {

/* ── PRODUCT IMAGE RESOLUTION ── */
/* Tries multiple field names commonly used during admin upload.
   Also handles Supabase Storage paths (relative paths get a public URL). */
const STORAGE_BUCKETS = ['products', 'product-images', 'images', 'models', 'thumbnails', 'public'];

function getProductImage(p) {
  // Try every plausible field
  const candidates = [
    p.image_url, p.imageUrl, p.thumbnail_url, p.thumbnailUrl,
    p.cover_url, p.coverUrl, p.cover, p.thumbnail,
    p.preview_url, p.previewUrl, p.preview,
    p.photo_url, p.photoUrl, p.photo,
    p.image, p.img, p.picture,
    p.image_path, p.imagePath, p.thumb, p.thumb_url,
    p.glb_thumbnail, p.glbThumbnail,
    p.poster, p.poster_url, p.posterUrl,
    p.visual, p.visual_url
  ];

  // Also handle array fields (e.g. "images": ["url1","url2"])
  if (Array.isArray(p.images) && p.images.length) candidates.unshift(p.images[0]);
  if (Array.isArray(p.photos) && p.photos.length) candidates.unshift(p.photos[0]);
  if (Array.isArray(p.pictures) && p.pictures.length) candidates.unshift(p.pictures[0]);

  for (const v of candidates) {
    if (!v || typeof v !== 'string') continue;
    const trimmed = v.trim();
    if (!trimmed) continue;

    // Already a full URL (https or data)
    if (/^(https?:|data:|blob:)/i.test(trimmed)) return trimmed;

    // Relative storage path → build public URL
    // Strip leading slashes
    const clean = trimmed.replace(/^\/+/, '');

    // If path looks like "bucket/path/to/file.jpg" use as-is
    const firstSeg = clean.split('/')[0];
    if (STORAGE_BUCKETS.includes(firstSeg)) {
      return `${SB_URL}/storage/v1/object/public/${clean}`;
    }
    // Otherwise default to "products" bucket
    return `${SB_URL}/storage/v1/object/public/products/${clean}`;
  }
  return null;
}

/* ── SIDEBAR FILTERS ── */
function buildSidebarFilters() {
  // Brands
  const brands = [...new Set(allProducts.map(p => p.enseigne_name || p.marque).filter(Boolean))].sort();
  const bf = document.getElementById('brandFilters');
  bf.innerHTML = brands.slice(0, 12).map(b => `
    <div class="filter-opt" data-brand="${b.replace(/"/g,'&quot;')}" onclick="toggleBrand(this)">
      <div class="filter-check"></div>
      <span>${b}</span>
      <span class="filter-count">${allProducts.filter(p => (p.enseigne_name||p.marque)===b).length}</span>
    </div>`).join('');

  // Matières
  const mats = [...new Set(allProducts.flatMap(p => {
    const m = p.matiere || p.material;
    if (!m) return [];
    return m.split(',').map(x => x.trim()).filter(Boolean);
  }))].sort().slice(0, 10);
  const mf = document.getElementById('matFilters');
  mf.innerHTML = mats.map(m => `
    <div class="filter-opt" data-mat="${m.replace(/"/g,'&quot;')}" onclick="toggleMat(this)">
      <div class="filter-check"></div>
      <span>${m}</span>
    </div>`).join('');
  if (!mats.length) document.querySelectorAll('.filter-section')[2].style.display = 'none';
}

/* ── ALPHABET STATE ── */
function refreshAlphabetState() {
  // Determine which letters have at least one brand
  const brands = [...new Set(allProducts.map(p => p.enseigne_name || p.marque).filter(Boolean))];
  const lettersAvailable = new Set(brands.map(b => b.charAt(0).toUpperCase()));
  document.querySelectorAll('.alpha-btn[data-letter]').forEach(btn => {
    const L = btn.dataset.letter;
    if (L === 'all') return;
    btn.classList.toggle('disabled', !lettersAvailable.has(L));
  });
}

/* ── CATEGORY ── */
function setCategory(cat, el) {
  currentCat = cat;
  currentPage = 1;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('act'));
  el.classList.add('act');

  // Show / hide alphabet bar + adjust header height variable
  const alphaBar = document.getElementById('alphaBar');
  if (cat === 'marque') {
    alphaBar.classList.add('show');
    document.documentElement.style.setProperty('--header-h', '150px'); // 56 + 46 + 48
  } else {
    alphaBar.classList.remove('show');
    document.documentElement.style.setProperty('--header-h', '102px');
    // reset letter selection when leaving "marque"
    currentLetter = 'all';
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('act'));
    const allLet = document.querySelector('.alpha-btn[data-letter="all"]');
    if (allLet) allLet.classList.add('act');
  }
  applyFilters();
}

function setLetter(L, el) {
  currentLetter = L;
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('act'));
  el.classList.add('act');
  currentPage = 1;
  applyFilters();
}

/* ── BRAND FILTER ── */
function toggleBrand(el) {
  const brand = el.dataset.brand;
  el.classList.toggle('sel');
  if (selectedBrands.has(brand)) selectedBrands.delete(brand);
  else selectedBrands.add(brand);
  currentPage = 1;
  applyFilters();
}

/* ── MAT FILTER ── */
function toggleMat(el) {
  const mat = el.dataset.mat;
  el.classList.toggle('sel');
  if (selectedMats.has(mat)) selectedMats.delete(mat);
  else selectedMats.add(mat);
  currentPage = 1;
  applyFilters();
}

/* ── SEARCH ── */
function handleSearch() {
  searchQ = document.getElementById('searchInput').value.toLowerCase().trim();
  currentPage = 1;
  applyFilters();
}

/* ── APPLY ALL FILTERS ── */
function applyFilters() {
  const priceMin = parseFloat(document.getElementById('priceMin').value) || 0;
  const priceMax = parseFloat(document.getElementById('priceMax').value) || Infinity;
  const sort     = document.getElementById('sortSelect').value;

  filtered = allProducts.filter(p => {
    const name   = (p.name || p.nom || '').toLowerCase();
    const brand  = (p.enseigne_name || p.marque || '').toLowerCase();
    const cat    = (p.category || p.categorie || '').toLowerCase();
    const mat    = (p.matiere || p.material || '').toLowerCase();
    const price  = p.price || p.prix || 0;

    // Category
    if (currentCat !== 'all' && currentCat !== 'marque') {
      const catDef = CATEGORIES.find(c => c.key === currentCat);
      if (catDef && catDef.keys) {
        if (!catDef.keys.some(c => cat.includes(c))) return false;
      }
    }

    // Marque tab — letter filter
    if (currentCat === 'marque' && currentLetter !== 'all') {
      const firstLetter = (p.enseigne_name || p.marque || '').charAt(0).toUpperCase();
      if (firstLetter !== currentLetter) return false;
    }

    // Search
    if (searchQ && !name.includes(searchQ) && !brand.includes(searchQ) && !cat.includes(searchQ)) return false;

    // Brands
    if (selectedBrands.size > 0 && !selectedBrands.has(p.enseigne_name || p.marque)) return false;

    // Mats
    if (selectedMats.size > 0) {
      const hasM = [...selectedMats].some(m => mat.includes(m.toLowerCase()));
      if (!hasM) return false;
    }

    // Price
    if (price && (price < priceMin || price > priceMax)) return false;

    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    if (sort === 'price_asc')  return (a.price||a.prix||0) - (b.price||b.prix||0);
    if (sort === 'price_desc') return (b.price||b.prix||0) - (a.price||a.prix||0);
    if (sort === 'name')       return (a.name||a.nom||'').localeCompare(b.name||b.nom||'');
    return 0; // newest first
  });

  updateResultCount();
  updateActiveTags();
  renderPage();
  renderPagination();
}

/* ── RENDER PRODUCTS ── */
function renderPage() {
  const grid = document.getElementById('prodGrid');
  const start = (currentPage - 1) * PER_PAGE;
  const page  = filtered.slice(start, start + PER_PAGE);

  if (!page.length) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-ico">◇</div>
        <div class="empty-h">Aucun résultat</div>
        <p class="empty-p">Essayez d'élargir vos critères de recherche ou de réinitialiser les filtres.</p>
      </div>`;
    return;
  }

  const fallbackSvg = `
    <div class="no-img">
      <svg viewBox="0 0 200 150" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="70" width="160" height="55" rx="12" fill="#C4B896"/>
        <rect x="20" y="55" width="160" height="22" rx="6" fill="#D4C8A8"/>
        <rect x="20" y="55" width="18" height="70" rx="4" fill="#B4A888"/>
        <rect x="162" y="55" width="18" height="70" rx="4" fill="#B4A888"/>
      </svg>
    </div>`;

  grid.innerHTML = page.map(p => {
    const name   = p.name  || p.nom   || '—';
    const brand  = p.enseigne_name || p.marque || '—';
    const cat    = p.category || p.categorie || '';
    const mat    = p.matiere  || p.material  || '';
    const price  = p.price    || p.prix;
    const hasGlb = !!(p.model_glb_url);
    const img    = getProductImage(p);

    const imgHtml = img
      ? `<img class="product-photo" src="${img}" alt="${(name||'').replace(/"/g,'&quot;')}" loading="lazy" onerror="this.outerHTML=this.dataset.fb" data-fb='${fallbackSvg.replace(/'/g,'&#39;')}'/>`
      : fallbackSvg;

    return `
      <div class="prod-card" onclick="goProduct('${p.id}')">
        <div class="prod-card-img">
          ${imgHtml}
        </div>
        <div class="prod-card-info">
          <div class="prod-card-brand">${brand}</div>
          <div class="prod-card-name">${name}</div>
          <div class="prod-card-meta">${[cat, mat].filter(Boolean).join(' · ')}</div>
          <div class="prod-card-footer">
            <div class="prod-card-price">${price ? Number(price).toLocaleString('fr-FR') + ' €' : '—'}</div>
            <div class="prod-card-actions">
              ${hasGlb ? `<a href="${SCAN_BASE}?id=${p.id}" class="card-btn ar" onclick="event.stopPropagation()" title="Voir en réalité augmentée">
                <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                AR
              </a>` : ''}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function goProduct(id) { window.location.href = `${SCAN_BASE}?id=${id}`; }

/* ── PAGINATION ── */
function renderPagination() {
  const total = filtered.length;
  const pages = Math.ceil(total / PER_PAGE);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn nav" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>←</button>`;
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || Math.abs(i - currentPage) <= 1) {
      html += `<button class="page-btn${i===currentPage?' act':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - currentPage) === 2) {
      html += `<button class="page-btn" style="pointer-events:none;color:var(--ink3);border-color:transparent;background:transparent">…</button>`;
    }
  }
  html += `<button class="page-btn nav" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>→</button>`;
  el.innerHTML = html;
}

function goPage(p) {
  const pages = Math.ceil(filtered.length / PER_PAGE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderPage();
  renderPagination();
  document.querySelector('.toolbar').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── UI HELPERS ── */
function updateResultCount() {
  const c = filtered.length;
  document.getElementById('resultCount').innerHTML = `${c} <span>${c > 1 ? 'produits' : 'produit'}</span>`;
}

function updateActiveTags() {
  const tags = [];
  if (currentCat !== 'all') {
    const catDef = CATEGORIES.find(c => c.key === currentCat);
    tags.push({ label: catDef ? catDef.label : currentCat, action: () => {
      const allBtn = document.querySelector('.cat-btn[data-cat="all"]');
      setCategory('all', allBtn);
    }});
  }
  if (currentCat === 'marque' && currentLetter !== 'all') {
    tags.push({ label: `Lettre ${currentLetter}`, action: () => {
      const allLet = document.querySelector('.alpha-btn[data-letter="all"]');
      setLetter('all', allLet);
    }});
  }
  selectedBrands.forEach(b => tags.push({ label: b, action: () => {
    selectedBrands.delete(b);
    const opt = document.querySelector(`.filter-opt[data-brand="${b.replace(/"/g,'&quot;')}"]`);
    if (opt) opt.classList.remove('sel');
    applyFilters();
  }}));
  if (searchQ) tags.push({ label: `"${searchQ}"`, action: () => { searchQ=''; document.getElementById('searchInput').value=''; applyFilters(); } });

  document.getElementById('activeTags').innerHTML = tags.map((t, i) => `
    <div class="filter-tag" onclick="removeTag(${i})">
      ${t.label}
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>`).join('');
  document.getElementById('activeTags')._tags = tags;
}

function removeTag(i) {
  const tags = document.getElementById('activeTags')._tags;
  if (tags && tags[i]) { tags[i].action(); }
}

function resetFilters() {
  currentCat = 'all'; currentLetter = 'all';
  selectedBrands.clear(); selectedMats.clear(); searchQ = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('priceMin').value = '';
  document.getElementById('priceMax').value = '';
  document.querySelectorAll('.filter-opt').forEach(el => el.classList.remove('sel'));
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('act'));
  document.querySelector('.cat-btn[data-cat="all"]').classList.add('act');
  document.getElementById('alphaBar').classList.remove('show');
  document.documentElement.style.setProperty('--header-h', '102px');
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('act'));
  const allLet = document.querySelector('.alpha-btn[data-letter="all"]');
  if (allLet) allLet.classList.add('act');
  currentPage = 1;
  applyFilters();
}

/* ── VIEW ── */
function setView(v) {
  currentView = v;
  const grid = document.getElementById('prodGrid');
  grid.classList.toggle('list-view', v === 'list');
  document.getElementById('btnGrid').classList.toggle('act', v === 'grid');
  document.getElementById('btnList').classList.toggle('act', v === 'list');
}

/* ── SECTION TOGGLE ── */
function toggleSection(el) {
  el.classList.toggle('open');
  const opts = el.nextElementSibling;
  opts.style.display = el.classList.contains('open') ? '' : 'none';
}

/* ── MOBILE FILTERS ── */
function toggleMobileFilters() {
  document.getElementById('filtersSidebar').classList.toggle('open');
}

/* ── TOAST ── */
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

/* ── RESPONSIVE ── */
function checkMobile() {
  const isMobile = window.innerWidth <= 768;
  document.getElementById('filterToggle').style.display = isMobile ? 'inline-flex' : 'none';
}
window.addEventListener('resize', checkMobile);
checkMobile();

/* ── ESC closes burger ── */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeBurger();
});

/* ── INIT ── */
loadProducts();
</script>
</body>
</html>
