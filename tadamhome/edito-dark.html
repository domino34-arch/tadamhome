<style>
:root {
  /* Reprend les codes exacts de catalogue.html — section éditoriale */
  --cream: #1C1B18;            /* fond principal — gris chaud foncé */
  --cream-dark: #14130F;
  --viewer-bg: #0E0E0D;
  --gold: #B8986A;
  --gold-light: #D4B896;
  --ink: #FAFAF8;
  --ink-mid: rgba(250,250,248,0.72);
  --ink-soft: rgba(250,250,248,0.45);
  --grid: rgba(184,152,106,.12);
  --border: rgba(250,250,248,.08);
  --nav-h: 56px;
}
* { margin:0; padding:0; box-sizing:border-box; }

/* OPTIMISATIONS MOBILE — empêche le saut au chargement */
html {
  scroll-behavior:smooth;
  background: var(--cream);
  /* Force le wrapping correct sur mobile dès le 1er paint */
  -webkit-text-size-adjust: 100%;
  /* Réserve l'espace de la scrollbar pour éviter shift au chargement contenu */
  scrollbar-gutter: stable;
}
body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight: 300;
  overflow-x: hidden;
  max-width: 430px;
  margin: 0 auto;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  /* Pas de min-height: 100vh, on laisse le contenu dicter — évite layout shift */
}

/* Empêche le rebond de scroll iOS de révéler le fond */
body, html { overscroll-behavior-y: none; }

/* NAV */
nav {
  position: fixed; top: 0; left: 50%;
  transform: translate3d(-50%, 0, 0); /* GPU layer pour éviter repaints */
  width: 100%; max-width: 430px;
  height: var(--nav-h);
  z-index: 100;
  padding: 0 24px;
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(28,27,24,0.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  /* Safe area iOS */
  padding-top: env(safe-area-inset-top, 0);
  height: calc(var(--nav-h) + env(safe-area-inset-top, 0));
}
.nav-logo {
  position: absolute; left: 50%; top: calc(50% + env(safe-area-inset-top, 0) / 2);
  transform: translate(-50%, -50%);
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 400; letter-spacing: 0.08em;
  color: var(--ink); text-decoration: none;
  display: flex; align-items: center;
}
.nav-logo img { height: 18px; width: auto; display: block; }
.nav-issue { font-size: 9px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-left: auto; }
.nav-back { font-size: 9px; font-weight: 300; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-soft); text-decoration: none; }

/* HERO — taille fixe via svh (small viewport height) → ne rebondit pas avec barre URL iOS */
#hero {
  height: 100svh;
  min-height: 560px; /* fallback navigateurs sans svh */
  display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  padding-bottom: 64px;
  position: relative; overflow: hidden;
  background: var(--viewer-bg);
  /* Conteneur isolé — empêche les repaints du canvas de remonter au DOM */
  contain: layout paint style;
}
#hero::before, .viewer-sticky::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent 0 39px, var(--grid) 39px 40px),
    repeating-linear-gradient(90deg, transparent 0 39px, var(--grid) 39px 40px);
  pointer-events: none; z-index: 1;
}
#hero-canvas {
  position: absolute; top:0; left:0; width:100%; height:100%;
  z-index: 2; pointer-events: none;
  /* GPU layer pour rendering Three.js */
  transform: translateZ(0);
  will-change: transform;
}
.hero-eyebrow {
  font-size: 9px; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold);
  margin-bottom: 14px; position: relative; z-index: 2;
  opacity: 0; animation: fadeUp 1s 0.4s forwards;
}
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 96px; font-weight: 300; line-height: 0.88; letter-spacing: -0.03em; color: var(--ink);
  position: relative; z-index: 2; text-align: center;
  opacity: 0; animation: fadeUp 1s 0.6s forwards;
  /* Réserve la hauteur dès le 1er paint pour éviter CLS quand le texte arrive */
  min-height: 1em;
}
.hero-sub {
  font-size: 10px; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft);
  margin-top: 18px; position: relative; z-index: 2;
  opacity: 0; animation: fadeUp 1s 0.8s forwards;
  min-height: 1em;
}
.hero-scroll {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 3;
  opacity: 0; animation: fadeIn 1s 1.4s forwards;
}
.hero-scroll span { font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-soft); }
.scroll-line {
  width: 1px; height: 36px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  animation: linePulse 2s infinite;
}

/* STICKY */
#sticky-section { position: relative; }
.viewer-sticky {
  position: sticky; top: var(--nav-h); height: 46svh;
  min-height: 280px;
  background: var(--viewer-bg);
  display: block;
  z-index: 10;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  contain: layout paint style;
}
#sticky-canvas {
  width: 100%; height: 100%;
  position: absolute; top:0; left:0;
  z-index: 2; pointer-events: none; display: block;
  transform: translateZ(0);
  will-change: transform;
}
.hotspot { position: absolute; width: 32px; height: 32px; cursor: pointer; z-index: 25; }
.hotspot-dot {
  width: 10px; height: 10px; background: var(--gold);
  border: 2px solid var(--cream); border-radius: 50%;
  position: absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  animation: pulseDot 2.5s infinite;
}
.hotspot-label {
  position: absolute; left: 24px; top: 50%; transform: translateY(-50%);
  background: var(--ink); color: var(--cream);
  font-size: 9px; font-weight: 300; letter-spacing: 0.15em; text-transform: uppercase;
  white-space: nowrap; padding: 5px 10px;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.hotspot.active .hotspot-label { opacity: 1; }

/* EDITORIAL */
.editorial-content { padding: 0 28px; background: var(--cream); position: relative; z-index: 2; }
.chapter {
  padding: 52px 0; border-bottom: 1px solid var(--border);
  /* CLS-safe — pas de transform initial qui crée un fantôme de hauteur */
  opacity: 0;
  transition: opacity 0.6s ease;
}
.chapter.visible { opacity: 1; }
.chapter-number {
  font-size: 8px; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold);
  margin-bottom: 22px; display: flex; align-items: center; gap: 12px;
}
.chapter-number::after { content:''; flex:1; height:1px; background: rgba(184,152,106,0.25); }
.chapter-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px; font-weight: 300; line-height: 1.1; color: var(--ink);
  margin-bottom: 22px; letter-spacing: -0.01em;
  min-height: 1.1em;
}
.chapter-title em { font-style: italic; color: var(--gold); }
.chapter-body { font-size: 14px; font-weight: 300; line-height: 1.9; color: var(--ink-mid); }
.chapter-body p + p { margin-top: 14px; }
.pull-quote {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-style: italic; font-weight: 300; line-height: 1.45; color: var(--ink);
  border-left: 2px solid var(--gold); padding-left: 20px; margin: 32px 0;
}
.data-row { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-top: 28px; }
.data-cell { background: rgba(250,250,248,0.04); border: 1px solid var(--border); padding: 16px 14px; }
.data-cell .value { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 300; color: var(--ink); display: block; line-height: 1; margin-bottom: 4px; }
.data-cell .label { font-size: 9px; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-soft); }
.tag { display: inline-flex; align-items: center; border: 1px solid var(--gold); padding: 7px 14px; margin-top: 20px; margin-right: 6px; font-size: 9px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
.timeline { margin-top: 28px; padding-left: 22px; position: relative; }
.timeline::before { content:''; position:absolute; left:5px; top:6px; bottom:6px; width:1px; background: linear-gradient(to bottom, var(--gold), rgba(184,152,106,0.1)); }
.timeline-item { position: relative; margin-bottom: 24px; }
.timeline-item::before { content:''; position:absolute; left:-20px; top:6px; width:8px; height:8px; background: var(--gold); }
.timeline-year { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: var(--gold); display: block; }
.timeline-text { font-size: 13px; font-weight: 300; color: var(--ink-mid); line-height: 1.65; margin-top: 2px; }

/* FLOATING CTA */
.ar-float {
  position: fixed;
  /* Safe area iOS pour iPhone home indicator */
  bottom: calc(16px + env(safe-area-inset-bottom, 0));
  left: 50%; transform: translate3d(-50%, 0, 0);
  z-index: 90;
  transition: opacity 0.4s, transform 0.4s;
  will-change: transform, opacity;
}
.ar-float.hidden { opacity: 0; transform: translate3d(-50%, 10px, 0); pointer-events: none; }
.ar-btn {
  background: rgba(250,250,248,0.94); color: #1C1B18; border: none;
  padding: 9px 16px;
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  font-family: 'Outfit', sans-serif; font-size: 8px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase;
  transition: background 0.3s;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  white-space: nowrap;
}
.ar-btn:hover, .ar-btn:active { background: var(--gold); color: var(--ink); }
.ar-icon { width: 18px; height: 18px; border: 1px solid rgba(28,27,24,0.3); display: flex; align-items: center; justify-content: center; flex-shrink:0; }

/* END CARD */
#end-card { padding: 60px 0 calc(120px + env(safe-area-inset-bottom, 0)); background: var(--cream); border-top: 1px solid rgba(184,152,106,0.18); }
.end-header { padding: 0 28px 32px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
.end-eyebrow { font-size: 9px; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
.end-title { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 300; color: var(--ink); line-height: 1.1; }
.end-sub { font-size: 12px; font-weight: 300; color: var(--ink-soft); margin-top: 8px; letter-spacing: 0.05em; }
.collection-strip { display: flex; gap: 2px; padding: 0 28px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.collection-strip::-webkit-scrollbar { display: none; }
.col-card { flex: 0 0 158px; background: rgba(250,250,248,0.03); border: 1px solid var(--border); cursor: pointer; transition: border-color 0.3s; }
.col-card:hover { border-color: var(--gold); }
.col-visual { height: 128px; display: flex; align-items: center; justify-content: center; background: var(--viewer-bg); position: relative; overflow: hidden; }
.col-visual svg, .col-visual img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: transform 0.5s, opacity 0.3s; }
.col-card:hover .col-visual svg, .col-card:hover .col-visual img { transform: scale(1.04); opacity: 1; }
.ar-badge { position: absolute; top: 8px; right: 8px; background: var(--gold); font-size: 7px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--cream); padding: 3px 7px; }
.col-info { padding: 12px 14px; }
.col-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: var(--ink); display: block; margin-bottom: 2px; }
.col-desc { font-size: 9px; font-weight: 300; letter-spacing: 0.08em; color: var(--ink-soft); }
.brand-cta { margin: 32px 28px 0; border: 1px solid rgba(184,152,106,0.35); padding: 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.3s, border-color 0.3s; }
.brand-cta:hover { background: rgba(184,152,106,0.08); border-color: var(--gold); }
.brand-cta-label { font-size: 9px; font-weight: 400; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 5px; }
.brand-cta-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--ink); }
.brand-cta-arrow { color: var(--gold); font-size: 22px; }

@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes linePulse { 0%,100%{opacity:1;transform:scaleY(1)} 50%{opacity:.35;transform:scaleY(.65)} }
@keyframes pulseDot { 0%{box-shadow:0 0 0 0 rgba(212,184,150,.55)} 70%{box-shadow:0 0 0 9px rgba(212,184,150,0)} 100%{box-shadow:0 0 0 0 rgba(212,184,150,0)} }

.hero-loader {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  z-index:3; display:flex; flex-direction:column; align-items:center; gap:10px;
  transition:opacity 0.6s;
}
.hero-loader.loaded { opacity:0; pointer-events:none; }
.loader-pct { font-size:10px; font-weight:300; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); }
.loader-bar-wrap { width:64px; height:1px; background:rgba(184,152,106,0.2); position:relative; overflow:hidden; }
.loader-bar { position:absolute; left:0; top:0; height:100%; background:var(--gold); width:0%; transition:width 0.3s; }

/* HOTSPOTS FIXES */
.hs-fixed {
  position: absolute;
  width: 28px; height: 28px;
  transform: translate(-50%, -50%);
  cursor: pointer; z-index: 25;
  display: flex; align-items: center; justify-content: center;
}
.hs-fdot {
  width: 9px; height: 9px;
  background: var(--gold-light);
  border-radius: 50%;
  position: relative;
  box-shadow: 0 0 0 2px rgba(14,14,13,0.7);
  animation: pulseGlow 2.4s infinite;
}
.hs-fdot::before {
  content:''; position:absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px solid rgba(212,184,150,0.45);
  animation: pulseRing 2.4s infinite;
}
@keyframes pulseGlow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.18); } }
@keyframes pulseRing { 0% { opacity: 0.7; transform: scale(0.8); } 70% { opacity: 0; transform: scale(1.7); } 100% { opacity: 0; transform: scale(1.7); } }

.hs-tooltip {
  position: absolute;
  width: 220px; max-width: 70%;
  background: rgba(28,27,24,0.96);
  border: 1px solid rgba(184,152,106,0.4);
  padding: 12px 14px;
  z-index: 30;
  opacity: 0; pointer-events: none;
  transform: translateY(-6px);
  transition: opacity 0.25s, transform 0.25s;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.hs-tooltip.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.hs-tooltip-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px; font-weight: 400; color: var(--gold-light);
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}
.hs-tooltip-text {
  font-size: 11px; font-weight: 300; line-height: 1.55; color: var(--ink-mid);
}

/* Préfère réduire les animations pour utilisateurs sensibles */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
}
</style>
</head>

<script>
// ── ATTEND QUE LES SCRIPTS DEFER SOIENT CHARGÉS ──────────────────
// (les <script> avec defer s'exécutent avant DOMContentLoaded)
window.addEventListener('DOMContentLoaded', () => {

  // ── SUPABASE ────────────────────────────────────────────────────
  const SUPA_URL = 'https://wbunwfxecvxngypuehop.supabase.co';
  const SUPA_KEY = 'sb_publishable_whNXpZBu7hbDWxZ-foYFUQ_WSEiIl1P';
  const { createClient } = supabase;
  const sb = createClient(SUPA_URL, SUPA_KEY);

  let MODEL_URL = null;
  let EDITO_DATA = null;

  // ── INIT ──────────────────────────────────────────────────────
  async function initEdito() {
    const params = new URLSearchParams(window.location.search);
    const slug   = params.get('slug');
    const id     = params.get('id');

    if (!slug && !id) { showError('Aucun édito spécifié.'); return; }

    let query = sb.from('editorials').select('*, products(id, name, enseigne_name, model_glb_url, model_usdz_url)');
    if (slug) query = query.eq('slug', slug);
    else      query = query.eq('id', id);

    const { data, error } = await query.single();

    if (error || !data) { showError('Édito introuvable.'); return; }
    EDITO_DATA = data;
    MODEL_URL = data.model_glb_url || data.products?.model_glb_url || null;

    populatePage(data);

    // Différer le démarrage 3D jusqu'au prochain idle frame
    // → laisse le navigateur peindre le contenu d'abord, évite le saut
    if ('requestIdleCallback' in window) {
      requestIdleCallback(() => initScenes(), { timeout: 1500 });
    } else {
      setTimeout(initScenes, 50);
    }
  }

  // ── POPULATE DOM ──────────────────────────────────────────────
  function populatePage(d) {
    document.title = `${d.nom_meuble} — Icônes · Tadamhome`;

    if (d.numero) document.getElementById('nav-issue').textContent =
      `N° ${String(d.numero).padStart(2,'0')} · ${d.date_publication ? new Date(d.date_publication).getFullYear() : ''}`;

    document.getElementById('hero-eyebrow').textContent = `Icône du design · ${d.marque || ''}`;
    document.getElementById('hero-title').textContent   = d.nom_meuble || '—';
    const sub = [d.designers, d.annee ? String(d.annee) : null].filter(Boolean).join(' · ');
    document.getElementById('hero-sub').textContent     = sub;

    if (d.texte_histoire) {
      document.getElementById('ch1-title').innerHTML = formatTitle(d.nom_meuble);
      document.getElementById('ch1-body').innerHTML  = textToParagraphs(d.texte_histoire);
    } else {
      document.getElementById('ch-histoire').style.display = 'none';
    }

    if (d.citation) {
      const q = document.getElementById('pull-quote');
      q.textContent   = `"${d.citation}"`;
      q.style.display = 'block';
    }

    const dataRow = document.getElementById('data-row');
    const cells = [];
    if (d.annee)     cells.push({ val: d.annee, lbl: 'Création' });
    if (d.annee)     cells.push({ val: new Date().getFullYear() - d.annee, lbl: 'Années d\'existence' });
    if (d.categorie) cells.push({ val: d.categorie, lbl: 'Catégorie' });
    if (d.marque)    cells.push({ val: d.marque, lbl: 'Éditeur officiel' });
    if (d.prix)      cells.push({ val: d.prix + ' €', lbl: 'Prix indicatif' });
    dataRow.innerHTML = cells.map(c =>
      `<div class="data-cell"><span class="value">${c.val}</span><span class="label">${c.lbl}</span></div>`
    ).join('');

    if (d.texte_designer) {
      const designers = d.designers ? d.designers.split('·')[0].trim() : 'Le Designer';
      document.getElementById('ch2-title').innerHTML = formatTitle(designers);
      document.getElementById('ch2-body').innerHTML  = textToParagraphs(d.texte_designer);
    } else {
      document.getElementById('ch-designer').style.display = 'none';
    }

    if (d.mouvement) {
      document.getElementById('ch2-tags').innerHTML =
        d.mouvement.split(',').map(m => `<span class="tag">${m.trim()}</span>`).join('');
    }

    if (d.texte_mouvement) {
      document.getElementById('ch3-title').innerHTML = `L\'<em>${d.mouvement || 'Mouvement'}</em>`;
      document.getElementById('ch3-body').innerHTML  = textToParagraphs(d.texte_mouvement);
    } else {
      document.getElementById('ch-mouvement').style.display = 'none';
    }

    document.getElementById('end-eyebrow').textContent = `${d.marque || ''} · Collection`;
    document.getElementById('end-title').innerHTML     = `Autres modèles<br>disponibles en AR`;

    if (d.marque) {
      const cta = document.getElementById('brand-cta');
      cta.style.display = 'flex';
      document.getElementById('brand-cta-label').textContent = 'Partenaire officiel';
      document.getElementById('brand-cta-title').textContent = `Voir la collection ${d.marque}`;
    }

    const arBtn = document.querySelector('.ar-btn');
    if (arBtn && (d.product_id || d.products?.id)) {
      arBtn.onclick = () => {
        window.location.href = `scan.html?id=${d.product_id || d.products.id}`;
      };
    }

    loadRelatedProducts(d.marque, d.product_id);
  }

  async function loadRelatedProducts(marque, excludeId) {
    if (!marque) return;
    const { data } = await sb
      .from('products')
      .select('id, name, category, model_glb_url, images')
      .ilike('enseigne_name', marque)
      .neq('id', excludeId || '00000000-0000-0000-0000-000000000000')
      .limit(6);

    const strip = document.getElementById('collection-strip');
    if (!data || !data.length) { strip.parentElement.style.display = 'none'; return; }

    strip.innerHTML = data.map(p => {
      const img  = (p.images && p.images[0]) ? p.images[0] : null;
      const visual = img
        ? `<img src="${img}" loading="lazy" alt="${p.name}"/>`
        : `<svg viewBox="0 0 80 80" fill="none" style="width:60px;height:60px;opacity:0.5">
             <rect x="20" y="25" width="40" height="30" fill="#B8986A" opacity="0.6"/>
             <rect x="16" y="55" width="6" height="10" fill="#7A766E"/>
             <rect x="58" y="55" width="6" height="10" fill="#7A766E"/>
           </svg>`;
      return `<div class="col-card" onclick="window.location.href='scan.html?id=${p.id}'">
        <div class="col-visual">${visual}<div class="ar-badge">AR</div></div>
        <div class="col-info">
          <span class="col-name">${p.name}</span>
          <span class="col-desc">${p.category || ''}</span>
        </div>
      </div>`;
    }).join('');
  }

  function textToParagraphs(text) {
    if (!text) return '';
    return text.split('\n').filter(l => l.trim()).map(l => `<p>${l}</p>`).join('');
  }
  function formatTitle(str) {
    if (!str) return '—';
    const words = str.trim().split(' ');
    if (words.length === 1) return `<em>${str}</em>`;
    const last = words.pop();
    return `${words.join(' ')} <em>${last}</em>`;
  }
  function showError(msg) {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100svh;font-family:'Outfit',sans-serif;font-size:14px;color:rgba(250,250,248,0.5);flex-direction:column;gap:16px;background:#1C1B18">
      <span style="font-size:32px;opacity:0.3">◈</span>
      <p>${msg}</p>
      <a href="icones/index.html" style="color:#B8986A;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;text-decoration:none">← Retour aux Icônes</a>
    </div>`;
  }

  // ── THREE.JS ──────────────────────────────────────────────────
  function fitModel(model) {
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const inner = new THREE.Group();
    inner.position.set(-center.x, -center.y + size.y * 0.0, -center.z);
    inner.add(model);
    const pivot = new THREE.Group();
    pivot.add(inner);
    pivot.scale.setScalar(1.45 / maxDim);
    return pivot;
  }

  // Détection mobile pour ajuster certains réglages
  const IS_MOBILE = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  // Pixel ratio élevé = bords nets et anti-tremblement à la rotation
  const MAX_DPR = 2.5;

  function makeRenderer(canvas) {
    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,           // ✦ MSAA toujours actif — élimine le scintillement des arêtes
      alpha: true,
      powerPreference: 'high-performance',
      stencil: false,            // optimisation : pas besoin du stencil buffer
      depth: true,
      preserveDrawingBuffer: false
    });
    renderer.setPixelRatio(Math.min(devicePixelRatio, MAX_DPR));
    renderer.shadowMap.enabled = !IS_MOBILE; // ombres uniquement desktop
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
    scene.add(new THREE.AmbientLight(0xFAFAF8, 0.55));
    const key = new THREE.DirectionalLight(0xFFF8F0, 2.2);
    key.position.set(4,8,6);
    if (!IS_MOBILE) key.castShadow = true;
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xD4CFC7, 0.6);
    fill.position.set(-4, 3, -4); scene.add(fill);
    const rim = new THREE.DirectionalLight(0xB8986A, 0.55);
    rim.position.set(0, 6, -8); scene.add(rim);
    return { renderer, scene, camera };
  }

  // ── RESIZE OPTIMISÉ ──────────────────────────────────────────
  // Au lieu de window.resize (qui se déclenche à chaque show/hide
  // de la barre URL iOS), on observe directement le conteneur du canvas.
  // C'est ce qui empêche le "saut" de l'affichage sur mobile.
  function autoResize(renderer, camera, el) {
    let lastW = 0, lastH = 0;
    function resize() {
      const w = el.offsetWidth, h = el.offsetHeight;
      // Évite resize si dimensions identiques (très fréquent sur iOS)
      if (w === lastW && h === lastH) return;
      lastW = w; lastH = h;
      renderer.setSize(w, h, false);
      camera.aspect = w/h;
      camera.updateProjectionMatrix();
    }
    resize();

    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver(resize);
      ro.observe(el);
    } else {
      // Fallback : window.resize avec debounce
      let t;
      window.addEventListener('resize', () => {
        clearTimeout(t);
        t = setTimeout(resize, 100);
      }, { passive: true });
    }

    // Resize aussi sur changement orientation (sans le bruit du resize)
    window.addEventListener('orientationchange', () => {
      setTimeout(resize, 200);
    }, { passive: true });
  }

  // Cache GLB chargé une seule fois
  let cachedGltf = null;
  const loadQueue = [];
  function loadModel(callback) {
    if (cachedGltf) { callback(cachedGltf); return; }
    loadQueue.push(callback);
    if (loadQueue.length > 1) return;
    if (!MODEL_URL) {
      document.getElementById('hero-loader')?.classList.add('loaded');
      return;
    }
    const loader = new THREE.GLTFLoader();
    // Trouve un renderer existant pour récupérer la valeur max d'anisotropie
    const tmpRenderer = new THREE.WebGLRenderer({ antialias: false });
    const MAX_ANISO = tmpRenderer.capabilities.getMaxAnisotropy();
    tmpRenderer.dispose();

    loader.load(
      MODEL_URL,
      (gltf) => {
        cachedGltf = gltf;
        gltf.scene.traverse(n => {
          if (n.isMesh) {
            n.castShadow = !IS_MOBILE;
            n.receiveShadow = !IS_MOBILE;
            n.frustumCulled = false; // évite des "pop" lors de la rotation
            // ✦ Filtrage anisotropique haute qualité sur toutes les textures
            const mat = n.material;
            const maps = mat ? [mat.map, mat.normalMap, mat.roughnessMap, mat.metalnessMap, mat.aoMap, mat.emissiveMap] : [];
            maps.forEach(tex => {
              if (!tex) return;
              tex.anisotropy = MAX_ANISO;
              tex.minFilter = THREE.LinearMipmapLinearFilter;
              tex.magFilter = THREE.LinearFilter;
              tex.generateMipmaps = true;
              tex.needsUpdate = true;
            });
          }
        });
        loadQueue.forEach(cb => cb(gltf));
        document.getElementById('hero-loader')?.classList.add('loaded');
      },
      (xhr) => {
        const pct = xhr.total ? Math.round(xhr.loaded/xhr.total*100) : 0;
        document.querySelectorAll('.loader-pct').forEach(el => el.textContent = pct+'%');
        const bar = document.getElementById('loader-bar');
        if (bar) bar.style.width = pct+'%';
      },
      (err) => {
        console.warn('GLB non chargé :', err);
        document.getElementById('hero-loader')?.classList.add('loaded');
      }
    );
  }
  function cloneModel(gltf) {
    const clone = gltf.scene.clone(true);
    return fitModel(clone);
  }

  // ── ANIMATION LOOP : pause quand pas visible (économise batterie/CPU) ──
  function makeRAFController(renderFn, container) {
    let visible = true;
    let running = true;
    if ('IntersectionObserver' in window && container) {
      const io = new IntersectionObserver(
        entries => entries.forEach(e => visible = e.isIntersecting),
        { threshold: 0.01 }
      );
      io.observe(container);
    }
    document.addEventListener('visibilitychange', () => {
      running = document.visibilityState === 'visible';
    });
    function loop() {
      requestAnimationFrame(loop);
      if (!visible || !running) return;
      renderFn();
    }
    loop();
  }

  function initScenes() {
    // HERO
    (function(){
      const canvas = document.getElementById('hero-canvas');
      const { renderer, scene, camera } = makeRenderer(canvas);
      camera.position.set(0, 0.15, 5.8); camera.lookAt(0, -0.25, 0);
      autoResize(renderer, camera, canvas.parentElement);
      let model = null, t = 0;
      loadModel(gltf => { model = cloneModel(gltf); scene.add(model); });
      // Boucle d'animation avec delta-time stable (évite les saccades)
      let prevTime = performance.now();
      makeRAFController(() => {
        const now = performance.now();
        const dt = Math.min((now - prevTime) / 1000, 0.05); // clamp 50ms max
        prevTime = now;
        t += dt * 0.11; // ~ même vitesse qu'avant mais lié au temps réel
        if (model) {
          model.rotation.y = t;
          model.position.y = Math.sin(t*0.3)*0.02;
        }
        renderer.render(scene, camera);
      }, document.getElementById('hero'));
    })();

    // STICKY
    (function(){
      const canvas = document.getElementById('sticky-canvas');
      const { renderer, scene, camera } = makeRenderer(canvas);
      camera.position.set(0, 0.75, 3.1); camera.lookAt(0, 0.05, 0);
      autoResize(renderer, camera, canvas.parentElement);

      // Blob shadow douce
      const sC = document.createElement('canvas');
      sC.width = 256; sC.height = 128;
      const sCtx2 = sC.getContext('2d');
      const sGrad = sCtx2.createRadialGradient(128,64,0,128,64,112);
      sGrad.addColorStop(0,'rgba(184,152,106,0.16)');
      sGrad.addColorStop(0.6,'rgba(28,27,24,0.05)');
      sGrad.addColorStop(1,'rgba(28,27,24,0)');
      sCtx2.fillStyle = sGrad;
      sCtx2.beginPath(); sCtx2.ellipse(128,64,120,56,0,0,Math.PI*2); sCtx2.fill();
      const sTex = new THREE.CanvasTexture(sC);
      const sMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(2.2,1.0),
        new THREE.MeshBasicMaterial({map:sTex,transparent:true,depthWrite:false})
      );
      sMesh.rotation.x = -Math.PI/2; sMesh.position.y = -0.66;
      scene.add(sMesh);

      let model = null;
      loadModel(gltf => {
        model = cloneModel(gltf);
        model.rotation.y = 0;
        scene.add(model);
      });

      makeRAFController(() => {
        renderer.render(scene, camera);
      }, document.querySelector('.viewer-sticky'));
    })();
  }

  // ── HOTSPOTS CLIQUABLES ──────────────────────────────────────
  (function() {
    const tooltip = document.getElementById('hs-tooltip');
    const ttTitle = document.getElementById('hs-tooltip-title');
    const ttText  = document.getElementById('hs-tooltip-text');
    const viewer  = document.querySelector('.viewer-sticky');
    if (!tooltip || !viewer) return;

    let activeHs = null;

    document.querySelectorAll('.hs-fixed').forEach(function(hs) {
      hs.addEventListener('click', function(e) {
        e.stopPropagation();
        if (activeHs === hs.id && tooltip.classList.contains('show')) {
          tooltip.classList.remove('show');
          activeHs = null;
          return;
        }
        activeHs = hs.id;
        ttTitle.textContent = hs.dataset.title || '';
        ttText.textContent  = hs.dataset.text  || '';
        const vRect  = viewer.getBoundingClientRect();
        const hsRect = hs.getBoundingClientRect();
        let left = hsRect.left - vRect.left + 16;
        let top  = hsRect.top  - vRect.top  - 56;
        if (left + 230 > vRect.width) left = left - 240;
        if (top < 8) top = hsRect.top - vRect.top + 16;
        tooltip.style.left = left + 'px';
        tooltip.style.top  = top  + 'px';
        tooltip.classList.add('show');
      });
    });

    document.addEventListener('click', function() {
      tooltip.classList.remove('show');
      activeHs = null;
    });
  })();

  // ── CHAPTER REVEAL (sans transform pour éviter CLS) ──────────
  if ('IntersectionObserver' in window) {
    const io = new IntersectionObserver(
      entries => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.1 }
    );
    document.querySelectorAll('.chapter').forEach(c => io.observe(c));
  } else {
    document.querySelectorAll('.chapter').forEach(c => c.classList.add('visible'));
  }

  // ── HIDE FLOATING CTA on end card ────────────────────────────
  const arFloat = document.getElementById('ar-float');
  const endCard = document.getElementById('end-card');
  if (arFloat && endCard && 'IntersectionObserver' in window) {
    new IntersectionObserver(
      entries => entries.forEach(e => arFloat.classList.toggle('hidden', e.isIntersecting)),
      { threshold: 0.05 }
    ).observe(endCard);
  }

  // ── START ─────────────────────────────────────────────────────
  initEdito();

}); // DOMContentLoaded
</script>
</body>
</html>
