<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TadamHome — AR Viewer</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:    #F5F2EC;
  --bg2:   #EDEAE2;
  --bg3:   #E4E0D6;
  --ink:   #1C1B18;
  --ink2:  #4A4840;
  --ink3:  #8A8880;
  --accent:#B8986A;
  --acc2:  #D4B896;
  --acc3:  #A07A4A;
  --white: #FAFAF8;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'Outfit', sans-serif;
  --ease:  cubic-bezier(.25,.1,.25,1);
  --eout:  cubic-bezier(0,0,.2,1);
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  font-weight: 300;
  overflow: hidden;
}

/* ── TOP BAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 56px;
  background: rgba(245,242,236,.94);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(184,152,106,.15);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px;
}
.topbar-logo {
  font-family: var(--serif);
  font-size: 18px; font-weight: 500; letter-spacing: .02em;
  color: var(--ink); text-decoration: none;
}
.topbar-logo span { color: var(--accent); }
.topbar-right { display: flex; gap: 8px; align-items: center; }
.tb-btn {
  width: 36px; height: 36px;
  border: 1px solid rgba(184,152,106,.25);
  background: transparent; border-radius: 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--ink2); transition: all .2s;
  font-size: 14px;
}
.tb-btn:hover { border-color: var(--accent); color: var(--accent); }
.tb-btn.act  { background: var(--accent); color: var(--white); border-color: var(--accent); }
.tb-tag {
  font-size: 9px; letter-spacing: .14em; text-transform: uppercase;
  padding: 4px 10px; border: 1px solid rgba(184,152,106,.35);
  color: var(--accent); display: flex; align-items: center; gap: 6px;
}
.tb-tag::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); animation: blink 2s ease-in-out infinite;
}

/* ── VIEWER WRAPPER ── */
#viewer-wrap {
  position: fixed;
  top: 56px; left: 0; right: 0;
  background: var(--bg2);
  overflow: hidden;
  transition: bottom .4s var(--ease);
}

model-viewer {
  width: 100%; height: 100%;
  --poster-color: transparent;
  background: linear-gradient(160deg, #EAE6DE 0%, #D8D4CB 100%);
}

/* grid floor inside viewer */
.viewer-grid {
  position: absolute; inset: 0; pointer-events: none;
  background:
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(184,152,106,.06) 40px, rgba(184,152,106,.06) 41px),
    repeating-linear-gradient(0deg,  transparent, transparent 40px, rgba(184,152,106,.06) 40px, rgba(184,152,106,.06) 41px);
  opacity: 0; transition: opacity .4s;
}
.viewer-grid.show { opacity: 1; }

/* AR ring decoration */
.ar-ring-deco {
  position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%);
  width: 180px; height: 24px;
  border-radius: 50%; border: 1px solid rgba(184,152,106,.35);
  animation: rpulse 3s ease-in-out infinite;
  pointer-events: none;
}

/* loading overlay */
.load-overlay {
  position: absolute; inset: 0;
  background: var(--bg2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 10;
  transition: opacity .5s, visibility .5s;
}
.load-overlay.hidden { opacity: 0; visibility: hidden; }
.load-ring {
  width: 40px; height: 40px;
  border: 1.5px solid rgba(184,152,106,.25);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
.load-txt { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink3); }

/* corner AR markers */
.ar-corner { position: absolute; width: 18px; height: 18px; pointer-events: none; }
.ar-corner::before, .ar-corner::after { content: ''; position: absolute; background: var(--accent); }
.ar-corner::before { width: 1.5px; height: 100%; }
.ar-corner::after  { width: 100%; height: 1.5px; }
.ar-corner.tl { top: 16px; left: 16px; }
.ar-corner.tl::before { top:0; left:0; } .ar-corner.tl::after { top:0; left:0; }
.ar-corner.tr { top: 16px; right: 16px; transform: scaleX(-1); }
.ar-corner.tr::before { top:0; left:0; } .ar-corner.tr::after { top:0; left:0; }
.ar-corner.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
.ar-corner.bl::before { top:0; left:0; } .ar-corner.bl::after { top:0; left:0; }
.ar-corner.br { bottom: 16px; right: 16px; transform: scale(-1); }
.ar-corner.br::before { top:0; left:0; } .ar-corner.br::after { top:0; left:0; }

/* product name badge on viewer */
.viewer-badge {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  background: rgba(250,250,248,.9); backdrop-filter: blur(8px);
  padding: 7px 16px; border-left: 2px solid var(--accent);
  white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity .4s;
}
.viewer-badge.show { opacity: 1; }
.vb-brand { font-size: 8px; letter-spacing: .16em; text-transform: uppercase; color: var(--accent); margin-bottom: 2px; }
.vb-name  { font-family: var(--serif); font-size: 14px; font-weight: 400; color: var(--ink); }

/* ── BOTTOM SHEET ── */
#sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
  background: var(--bg);
  border-top: 1px solid rgba(184,152,106,.15);
  transform: translateY(0);
  transition: transform .4s var(--ease);
  /* height driven by JS */
}
.sheet-handle-wrap {
  display: flex; justify-content: center; padding: 10px 0 4px;
  cursor: grab;
}
.sheet-handle {
  width: 36px; height: 3px; border-radius: 2px;
  background: rgba(28,27,24,.15);
}

/* sheet sections */
.sheet-inner { padding: 0 18px 24px; overflow-y: auto; height: calc(100% - 26px); }

/* product header */
.prod-header { padding-bottom: 18px; border-bottom: 1px solid rgba(28,27,24,.07); margin-bottom: 18px; }
.prod-brand { font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
.prod-name  { font-family: var(--serif); font-size: 26px; font-weight: 400; line-height: 1.15; margin-bottom: 6px; }
.prod-meta  { font-size: 12px; color: var(--ink3); }
.prod-error { font-family: var(--serif); font-size: 20px; color: var(--ink2); padding: 16px 0; }

/* section label */
.s-lbl { font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--ink3); margin-bottom: 10px; }

/* swatches */
.swatch-block { margin-bottom: 18px; }
.swatches     { display: flex; gap: 8px; flex-wrap: wrap; }
.sw {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all .2s;
  position: relative;
}
.sw.sel::after {
  content: ''; position: absolute; inset: -4px;
  border-radius: 50%; border: 1.5px solid var(--accent);
}
.sw:hover { transform: scale(1.12); }
.sw-label { font-size: 11px; color: var(--ink2); margin-top: 8px; }

/* material pills */
.mat-block { margin-bottom: 20px; }
.mat-pills  { display: flex; gap: 6px; flex-wrap: wrap; }
.mat-pill {
  font-size: 11px; font-weight: 400; letter-spacing: .04em;
  padding: 7px 14px; border: 1px solid rgba(28,27,24,.14);
  background: transparent; color: var(--ink2);
  cursor: pointer; font-family: var(--sans); transition: all .2s;
}
.mat-pill:hover,.mat-pill.sel { border-color: var(--accent); color: var(--accent); background: rgba(184,152,106,.04); }

/* size select */
.size-block { margin-bottom: 22px; }
.size-opts  { display: flex; gap: 6px; flex-wrap: wrap; }
.size-opt {
  font-size: 11px; padding: 6px 14px;
  border: 1px solid rgba(28,27,24,.12); color: var(--ink2);
  cursor: pointer; font-family: var(--sans); transition: all .2s; background: transparent;
}
.size-opt:hover,.size-opt.sel { border-color: var(--accent); color: var(--accent); }

/* info rows */
.info-rows { margin-bottom: 20px; border-top: 1px solid rgba(28,27,24,.07); }
.info-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 0; border-bottom: 1px solid rgba(28,27,24,.07);
  font-size: 12px;
}
.info-row-k { color: var(--ink3); }
.info-row-v { color: var(--ink); font-weight: 400; }

/* ── CTA BAR ── */
.cta-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 95;
  background: rgba(245,242,236,.96);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(184,152,106,.15);
  padding: 12px 18px;
  display: flex; gap: 10px;
  transition: transform .4s var(--ease);
}
.cta-bar.hidden { transform: translateY(100%); }
.btn-ar {
  flex: 1; padding: 14px;
  background: var(--ink); color: var(--white);
  border: none; font-family: var(--sans);
  font-size: 11px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase;
  cursor: pointer; transition: background .3s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-ar:hover { background: var(--accent); }
.btn-ar svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; }
.btn-save {
  width: 48px; height: 48px; flex-shrink: 0;
  border: 1px solid rgba(28,27,24,.15); background: transparent;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink2); font-size: 18px;
}
.btn-save:hover { border-color: var(--accent); color: var(--accent); }
.btn-link {
  width: 48px; height: 48px; flex-shrink: 0;
  border: 1px solid rgba(28,27,24,.15); background: transparent;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center;
}
.btn-link:hover { border-color: var(--accent); }
.btn-link svg { width: 16px; height: 16px; fill: none; stroke: var(--ink2); stroke-width: 1.5; stroke-linecap: round; transition: stroke .2s; }
.btn-link:hover svg { stroke: var(--accent); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--ink); color: var(--white);
  font-size: 12px; letter-spacing: .04em;
  padding: 10px 20px; white-space: nowrap;
  opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── ERROR SCREEN ── */
.error-screen {
  position: fixed; inset: 56px 0 0;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; padding: 32px; text-align: center; background: var(--bg);
}
.error-screen.show { display: flex; }
.err-icon { font-size: 36px; margin-bottom: 4px; }
.err-h { font-family: var(--serif); font-size: 26px; font-weight: 300; color: var(--ink); }
.err-p { font-size: 13px; color: var(--ink3); line-height: 1.7; max-width: 280px; }
.err-btn {
  margin-top: 8px; padding: 12px 28px;
  border: 1px solid var(--accent); background: transparent;
  color: var(--accent); font-family: var(--sans); font-size: 11px;
  letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: all .25s;
}
.err-btn:hover { background: var(--accent); color: var(--white); }

/* ── KEYFRAMES ── */
@keyframes blink  { 0%,100%{opacity:1}50%{opacity:.3} }
@keyframes rpulse { 0%,100%{opacity:.4;transform:translateX(-50%) scaleX(1)} 50%{opacity:.85;transform:translateX(-50%) scaleX(1.1)} }
@keyframes spin   { to{transform:rotate(360deg)} }
@keyframes fin    { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<!-- TOP BAR -->
<nav class="topbar">
  <a href="index.html" class="topbar-logo">Tadam<span>Home</span></a>
  <div class="topbar-right">
    <div class="tb-tag" id="arStatusTag">AR Prêt</div>
    <button class="tb-btn" id="btnGrid" title="Grille" onclick="toggleGrid()">⊞</button>
    <button class="tb-btn" id="btnInfo" title="Infos" onclick="toggleSheet()">≡</button>
  </div>
</nav>

<!-- VIEWER -->
<div id="viewer-wrap">
  <div class="viewer-grid" id="viewerGrid"></div>
  <div class="ar-ring-deco"></div>
  <div class="ar-corner tl"></div>
  <div class="ar-corner tr"></div>
  <div class="ar-corner bl"></div>
  <div class="ar-corner br"></div>
  <div class="viewer-badge" id="viewerBadge">
    <div class="vb-brand" id="badgeBrand">—</div>
    <div class="vb-name"  id="badgeName">Chargement…</div>
  </div>
  <div class="load-overlay" id="loadOverlay">
    <div class="load-ring"></div>
    <div class="load-txt">Chargement du modèle</div>
  </div>
  <model-viewer
    id="mv"
    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
    alt="Modèle 3D"
    auto-rotate
    camera-controls
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    shadow-intensity="0.8"
    exposure="1.0"
    environment-image="neutral">
  </model-viewer>
</div>

<!-- BOTTOM SHEET -->
<div id="sheet">
  <div class="sheet-handle-wrap" id="sheetHandle">
    <div class="sheet-handle"></div>
  </div>
  <div class="sheet-inner" id="sheetInner">
    <!-- Product header -->
    <div class="prod-header" id="prodHeader">
      <div class="prod-brand" id="prodBrand">TadamHome</div>
      <div class="prod-name"  id="prodName">Chargement…</div>
      <div class="prod-meta"  id="prodMeta"></div>
    </div>

    <!-- Coloris -->
    <div class="swatch-block" id="swatchBlock">
      <div class="s-lbl">Coloris</div>
      <div class="swatches" id="swatchRow"></div>
      <div class="sw-label" id="swatchLabel"></div>
    </div>

    <!-- Matière -->
    <div class="mat-block" id="matBlock">
      <div class="s-lbl">Matière</div>
      <div class="mat-pills" id="matRow"></div>
    </div>

    <!-- Dimensions -->
    <div class="size-block" id="sizeBlock">
      <div class="s-lbl">Dimensions</div>
      <div class="size-opts" id="sizeRow"></div>
    </div>

    <!-- Fiche technique -->
    <div class="info-rows" id="infoRows"></div>

  </div>
</div>

<!-- CTA BAR -->
<div class="cta-bar" id="ctaBar">
  <button class="btn-ar" id="btnAR" onclick="launchAR()">
    <svg viewBox="0 0 24 24"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/></svg>
    Voir dans mon salon
  </button>
  <button class="btn-save" id="btnSave" title="Sauvegarder" onclick="saveProduct()">♡</button>
  <button class="btn-link" title="Partager" onclick="shareProduct()">
    <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
  </button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ERROR SCREEN -->
<div class="error-screen" id="errScreen">
  <div class="err-icon">◇</div>
  <div class="err-h">Produit introuvable</div>
  <p class="err-p">Ce modèle n'est pas disponible ou le lien est invalide.</p>
  <button class="err-btn" onclick="window.location='index.html'">Retour au catalogue</button>
</div>

<script>
/* ─────────────── CONFIG ─────────────── */
const SUPABASE_URL = 'https://hnpwkthhnflsirglrfjz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhucHdrdGhobi' +
                     'Zsc2lyZ2xyZmp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQwNzA4NDIsImV4cCI6MjA1OTY0Njg0Mn0.' +
                     'lQoMl03bA1C9pLGGLVi37LJVCcMYVJbFtGvXuWYaTLI';

/* ─────────────── STATE ─────────────── */
let product = null;
let sheetOpen = false;
let sheetPeekH = 0;
let sheetFullH = 0;
let saved = false;

/* ─────────────── LAYOUT ─────────────── */
const TOPBAR_H = 56;
const CTA_H    = 72;
const HANDLE_H = 26;
const PEEK_H   = 140; // collapsed sheet height

function layout() {
  const wh = window.innerHeight;
  sheetPeekH = PEEK_H;
  sheetFullH = Math.round(wh * 0.72);

  const sheet = document.getElementById('sheet');
  sheet.style.height = (sheetOpen ? sheetFullH : sheetPeekH) + 'px';

  const viewerBot = sheetOpen ? sheetFullH : sheetPeekH;
  const vwrap = document.getElementById('viewer-wrap');
  vwrap.style.bottom = (viewerBot + CTA_H) + 'px';
  vwrap.style.height  = (wh - TOPBAR_H - viewerBot - CTA_H) + 'px';
}

window.addEventListener('resize', layout);

/* ─────────────── SHEET TOGGLE ─────────────── */
function toggleSheet() {
  sheetOpen = !sheetOpen;
  layout();
  const btn = document.getElementById('btnInfo');
  btn.classList.toggle('act', sheetOpen);
}

/* Sheet drag */
(function() {
  let startY = 0, startOpen = false;
  const handle = document.getElementById('sheetHandle');
  handle.addEventListener('touchstart', e => { startY = e.touches[0].clientY; startOpen = sheetOpen; }, { passive: true });
  handle.addEventListener('touchend', e => {
    const dy = startY - e.changedTouches[0].clientY;
    if (Math.abs(dy) > 30) { sheetOpen = dy > 0; layout(); }
  }, { passive: true });
})();

/* ─────────────── GRID TOGGLE ─────────────── */
let gridOn = false;
function toggleGrid() {
  gridOn = !gridOn;
  document.getElementById('viewerGrid').classList.toggle('show', gridOn);
  document.getElementById('btnGrid').classList.toggle('act', gridOn);
}

/* ─────────────── SUPABASE FETCH ─────────────── */
async function fetchProduct(id) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/produits?id=eq.${id}&select=*`,
    { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
  );
  const data = await res.json();
  return data && data.length ? data[0] : null;
}

/* ─────────────── RENDER ─────────────── */
function render(p) {
  product = p;
  // Badge viewer
  document.getElementById('badgeBrand').textContent = p.marque || 'TadamHome';
  document.getElementById('badgeName').textContent  = p.nom    || p.name || 'Modèle';
  document.getElementById('viewerBadge').classList.add('show');

  // Sheet header
  document.getElementById('prodBrand').textContent = p.marque  || 'TadamHome';
  document.getElementById('prodName').textContent  = p.nom     || p.name || 'Modèle 3D';
  document.getElementById('prodMeta').textContent  = [p.categorie, p.matiere, p.couleur].filter(Boolean).join(' · ');

  // 3D model
  const mv = document.getElementById('mv');
  const src = p.model_glb_url || p.model_url || '';
  if (src) {
    mv.setAttribute('src', src);
    if (p.usdz_url) mv.setAttribute('ios-src', p.usdz_url);
  }

  // Coloris swatches
  const colorList = p.coloris ? (Array.isArray(p.coloris) ? p.coloris : JSON.parse(p.coloris)) : [];
  const swRow  = document.getElementById('swatchRow');
  const swLbl  = document.getElementById('swatchLabel');
  const swBlk  = document.getElementById('swatchBlock');
  swRow.innerHTML = '';
  if (colorList.length) {
    colorList.forEach((c, i) => {
      const sw = document.createElement('div');
      sw.className = 'sw' + (i === 0 ? ' sel' : '');
      sw.style.background = c.hex || c.color || c;
      sw.title = c.label || c.name || c;
      sw.addEventListener('click', () => {
        document.querySelectorAll('#swatchRow .sw').forEach(s => s.classList.remove('sel'));
        sw.classList.add('sel');
        swLbl.textContent = c.label || c.name || '';
      });
      swRow.appendChild(sw);
    });
    if (colorList[0]) swLbl.textContent = colorList[0].label || colorList[0].name || '';
  } else {
    swBlk.style.display = 'none';
  }

  // Matières
  const matList = p.matieres ? (Array.isArray(p.matieres) ? p.matieres : JSON.parse(p.matieres)) : [];
  const matRow = document.getElementById('matRow');
  const matBlk = document.getElementById('matBlock');
  matRow.innerHTML = '';
  if (matList.length) {
    matList.forEach((m, i) => {
      const btn = document.createElement('button');
      btn.className = 'mat-pill' + (i === 0 ? ' sel' : '');
      btn.textContent = m.label || m;
      btn.addEventListener('click', () => {
        document.querySelectorAll('#matRow .mat-pill').forEach(b => b.classList.remove('sel'));
        btn.classList.add('sel');
      });
      matRow.appendChild(btn);
    });
  } else {
    matBlk.style.display = 'none';
  }

  // Dimensions / tailles
  const dimList = p.dimensions ? (Array.isArray(p.dimensions) ? p.dimensions : JSON.parse(p.dimensions)) : [];
  const sizeRow = document.getElementById('sizeRow');
  const sizeBlk = document.getElementById('sizeBlock');
  sizeRow.innerHTML = '';
  if (dimList.length) {
    dimList.forEach((d, i) => {
      const btn = document.createElement('button');
      btn.className = 'size-opt' + (i === 0 ? ' sel' : '');
      btn.textContent = d.label || d;
      btn.addEventListener('click', () => {
        document.querySelectorAll('#sizeRow .size-opt').forEach(b => b.classList.remove('sel'));
        btn.classList.add('sel');
      });
      sizeRow.appendChild(btn);
    });
  } else {
    sizeBlk.style.display = 'none';
  }

  // Info rows fiche technique
  const fields = [
    ['Référence', p.reference || p.id?.slice(0,8).toUpperCase()],
    ['Dimensions', p.dim_label || (p.largeur && p.hauteur && p.profondeur ? `L${p.largeur} × H${p.hauteur} × P${p.profondeur} cm` : null)],
    ['Poids',      p.poids     ? p.poids + ' kg' : null],
    ['Origine',    p.pays_origine || p.origine],
    ['Délai',      p.delai_livraison],
    ['Prix',       p.prix      ? p.prix + ' €' : null],
  ];
  const ir = document.getElementById('infoRows');
  ir.innerHTML = '';
  fields.forEach(([k, v]) => {
    if (!v) return;
    ir.innerHTML += `<div class="info-row"><span class="info-row-k">${k}</span><span class="info-row-v">${v}</span></div>`;
  });
}

/* ─────────────── MODEL VIEWER EVENTS ─────────────── */
const mv = document.getElementById('mv');
mv.addEventListener('load', () => {
  document.getElementById('loadOverlay').classList.add('hidden');
});
mv.addEventListener('ar-status', e => {
  const tag = document.getElementById('arStatusTag');
  if (e.detail.status === 'session-started') {
    tag.textContent = 'AR Active';
    document.getElementById('ctaBar').classList.add('hidden');
  } else {
    tag.textContent = 'AR Prêt';
    document.getElementById('ctaBar').classList.remove('hidden');
  }
});

/* ─────────────── AR LAUNCH ─────────────── */
function launchAR() {
  const mv = document.getElementById('mv');
  if (!mv.src || mv.src === window.location.href) {
    showToast('Aucun modèle 3D disponible');
    return;
  }
  if (mv.canActivateAR) {
    mv.activateAR();
  } else {
    const iOS     = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const android = /Android/.test(navigator.userAgent);
    if (iOS)     showToast('Ouvrez dans Safari pour l\'AR iPhone');
    else if (android) showToast('Ouvrez dans Chrome pour l\'AR Android');
    else showToast('AR disponible sur iOS et Android');
  }
}

/* ─────────────── SAVE / SHARE ─────────────── */
function saveProduct() {
  saved = !saved;
  const btn = document.getElementById('btnSave');
  btn.textContent = saved ? '♥' : '♡';
  btn.style.color = saved ? 'var(--accent)' : '';
  btn.style.borderColor = saved ? 'var(--accent)' : '';
  showToast(saved ? 'Sauvegardé dans vos favoris' : 'Retiré des favoris');
}

function shareProduct() {
  if (navigator.share) {
    navigator.share({ title: product?.nom || 'TadamHome', url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => showToast('Lien copié !'));
  }
}

/* ─────────────── TOAST ─────────────── */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

/* ─────────────── INIT ─────────────── */
async function init() {
  layout();

  const params  = new URLSearchParams(window.location.search);
  const id      = params.get('id') || params.get('product');

  if (!id) {
    // Démo — astronaute par défaut
    document.getElementById('badgeBrand').textContent = 'TadamHome';
    document.getElementById('badgeName').textContent  = 'Démo 3D';
    document.getElementById('viewerBadge').classList.add('show');
    document.getElementById('prodBrand').textContent  = 'TadamHome';
    document.getElementById('prodName').textContent   = 'Mode démo — aucun produit sélectionné';
    document.getElementById('prodMeta').textContent   = 'Scannez un QR code pour charger un produit';
    document.getElementById('swatchBlock').style.display = 'none';
    document.getElementById('matBlock').style.display    = 'none';
    document.getElementById('sizeBlock').style.display   = 'none';
    document.getElementById('loadOverlay').classList.add('hidden');
    return;
  }

  try {
    const p = await fetchProduct(id);
    if (!p) throw new Error('not found');
    render(p);
  } catch (e) {
    document.getElementById('viewer-wrap').style.display = 'none';
    document.getElementById('ctaBar').style.display      = 'none';
    document.getElementById('errScreen').classList.add('show');
    document.getElementById('loadOverlay').classList.add('hidden');
  }
}

init();
</script>
