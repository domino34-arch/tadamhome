<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TadamHome — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07051a;--p:#7C3AED;--pk:#EC4899;--acc:#a78bfa;--grad:linear-gradient(135deg,#7C3AED,#EC4899);--border:rgba(255,255,255,.1);--text:#f0eeff;--muted:rgba(167,139,250,.55)}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;opacity:.5}
.o1{width:600px;height:600px;background:#3b0764;top:-200px;left:-150px}
.o2{width:500px;height:500px;background:#4a044e;bottom:-150px;right:-100px}
.card{background:rgba(15,12,40,.9);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:44px 48px;width:100%;max-width:440px;position:relative;z-index:1;box-shadow:0 40px 100px rgba(0,0,0,.5)}
.logo{display:flex;justify-content:center;margin-bottom:32px}
h2{font-size:24px;font-weight:800;text-align:center;margin-bottom:8px;letter-spacing:-.5px}
.sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:28px}
.field{margin-bottom:14px}
.field label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;display:block;margin-bottom:6px}
.field input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:13px 16px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:all .2s}
.field input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.field input::placeholder{color:rgba(167,139,250,.3)}
.btn{width:100%;background:var(--grad);color:#fff;border:none;padding:14px;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:14px;display:none}
.error.show{display:block}
.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:10px;padding:10px 14px;font-size:13px;color:#6ee7b7;margin-bottom:14px;display:none}
.success.show{display:block}
.hint{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);border-radius:12px;padding:14px;margin-bottom:20px;font-size:12px;color:var(--acc);line-height:1.6}
.hint strong{color:#fff}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>

<div class="card">
  <div class="logo">
    <svg height="28" viewBox="0 0 560 80" fill="none">
      <line x1="9" y1="70" x2="44" y2="28" stroke="white" stroke-width="8" stroke-linecap="round"/>
      <path d="M44,10 L47.5,21 L58,24.5 L47.5,28 L44,39 L40.5,28 L30,24.5 L40.5,21 Z" fill="white"/>
      <circle cx="20" cy="22" r="3.8" fill="white" opacity=".9"/>
      <text x="72" y="60" font-family="Georgia,serif" font-weight="900" font-size="55" fill="white" letter-spacing="-2">TadamHome</text>
    </svg>
  </div>

  <h2>Bon retour 👋</h2>
  <p class="sub">Connectez-vous à votre espace enseigne</p>

  <div class="hint">
    <strong>Compte test disponible :</strong><br>
    Email : test@maisonsbelfort.fr<br>
    Mot de passe : Tadam2025!
  </div>

  <div class="error" id="error"></div>
  <div class="success" id="success"></div>

  <div class="field">
    <label>Email professionnel</label>
    <input type="email" id="email" placeholder="vous@votreenseigne.fr" value="test@maisonsbelfort.fr"/>
  </div>
  <div class="field">
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••••" value="Tadam2025!"/>
  </div>

  <button class="btn" id="btn-login" onclick="login()">
    Se connecter →
  </button>
</div>

<script>
const SUPABASE_URL = 'https://wbunwfxecvxngypuehop.supabase.co';
const SUPABASE_KEY = 'sb_publishable_whNXpZBu7hbDWxZ-foYFUQ_WSEiIl1P';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login() {
  const email = document.getElementById('email').value;
  const pwd = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('error');
  const suc = document.getElementById('success');

  if (!email || !pwd) { showError('Veuillez remplir tous les champs.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Connexion...';
  err.classList.remove('show');

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });

  if (error) {
    showError('Email ou mot de passe incorrect. Utilisez le compte test indiqué.');
    btn.disabled = false;
    btn.innerHTML = 'Se connecter →';
    return;
  }

  suc.textContent = '✓ Connecté ! Redirection vers le dashboard...';
  suc.classList.add('show');

  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
}

function showError(msg) {
  const err = document.getElementById('error');
  err.textContent = msg;
  err.classList.add('show');
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

// Vérifier si déjà connecté
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
