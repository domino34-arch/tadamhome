<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>TadamHome - Studio AR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F2EC;--ink:#1C1B18;--white:#FAFAF8;
  --accent:#B8986A;--acc3:#A07A4A;--muted:#8A8880;
  --border:rgba(28,27,24,.12);--green:#27704A;
  --serif:'Cormorant Garamond',serif;--sans:'Outfit',sans-serif;
}
html,body{height:100%;background:var(--bg);font-family:var(--sans);overflow:hidden}

/* TOPBAR - logo réduit + écarts plus serrés pour libérer la place du X */
.topbar{height:50px;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 8px;flex-shrink:0;padding-top:env(safe-area-inset-top,0);gap:4px}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:1;min-width:0;overflow:hidden}
.topbar-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.t-logo{height:14px;object-fit:contain;flex-shrink:0}
.t-sep{width:1px;height:14px;background:rgba(255,255,255,.15);flex-shrink:0}
.t-label{font-size:8px;letter-spacing:.10em;text-transform:uppercase;color:rgba(255,255,255,.3);font-family:var(--sans);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Boutons icône-seule sur mobile */
.t-btn{display:flex;align-items:center;justify-content:center;gap:4px;width:32px;height:32px;padding:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--white);font-family:var(--sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;position:relative}
.t-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;flex-shrink:0}
.t-btn-lbl{display:none}
.t-btn:hover{background:rgba(184,152,106,.2);border-color:var(--accent);color:var(--accent)}
.t-btn.ar{background:rgba(39,112,74,.25);border-color:rgba(39,112,74,.5);color:#6dcf95}
.t-btn.ar:hover{background:rgba(39,112,74,.4)}
.t-badge{background:var(--green);color:#fff;font-size:8px;font-weight:600;padding:1px 4px;border-radius:8px;font-family:var(--sans);display:none;flex-shrink:0;position:absolute;top:-3px;right:-3px}
.t-badge.on{display:inline}
.t-icon-btn{width:32px;height:32px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--white);transition:all .2s;flex-shrink:0}
.t-icon-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
.t-icon-btn:hover{background:rgba(255,255,255,.18)}
@media (min-width:540px){
  .t-btn{width:auto;padding:0 10px;gap:5px}
  .t-btn-lbl{display:inline}
  .t-btn.ar .t-badge{position:static}
  .topbar{padding:0 14px;gap:6px}
  .t-logo{height:16px}
}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.studio{flex:1;position:relative;overflow:hidden;min-height:0}
#c{display:block;width:100%;height:100%;touch-action:none;cursor:grab}
#c:active{cursor:grabbing}

/* STATUS */
.status{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(28,27,24,.78);backdrop-filter:blur(8px);padding:6px 14px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.7);white-space:nowrap;border:1px solid rgba(255,255,255,.1);pointer-events:none;max-width:90%;overflow:hidden;text-overflow:ellipsis}
.status.accent{color:var(--accent);border-color:rgba(184,152,106,.3)}

/* SELECTED NAME TAG */
.sel-tag{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(28,27,24,.85);backdrop-filter:blur(8px);padding:5px 14px;font-size:11px;color:var(--white);letter-spacing:.05em;opacity:0;transition:opacity .2s;pointer-events:none;border-left:2px solid var(--accent);white-space:nowrap}
.sel-tag.on{opacity:1}

/* ACTION FABs (delete + duplicate) */
.del-fab{position:absolute;bottom:16px;right:14px;width:42px;height:42px;background:rgba(192,57,43,.92);backdrop-filter:blur(8px);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;opacity:0;pointer-events:none;transition:all .25s;box-shadow:0 2px 10px rgba(192,57,43,.35);border-radius:2px}
.del-fab.on{opacity:1;pointer-events:all}
.del-fab svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}

.dup-fab{position:absolute;bottom:16px;right:64px;width:42px;height:42px;background:rgba(184,152,106,.95);backdrop-filter:blur(8px);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;opacity:0;pointer-events:none;transition:all .25s;box-shadow:0 2px 10px rgba(184,152,106,.35);border-radius:2px}
.dup-fab.on{opacity:1;pointer-events:all}
.dup-fab svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* UNDO */
.undo-fab{position:absolute;bottom:16px;left:14px;width:42px;height:42px;background:rgba(250,250,248,.94);backdrop-filter:blur(8px);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;pointer-events:none;transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,.1);border-radius:2px}
.undo-fab.on{opacity:1;pointer-events:all}
.undo-fab svg{width:15px;height:15px;fill:none;stroke:var(--muted);stroke-width:1.8;stroke-linecap:round}

/* BOTTOM */
.bottom{background:var(--white);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}

/* VIEW BAR */
.view-bar{display:flex;border-bottom:1px solid var(--border);background:rgba(245,242,236,.55)}
.view-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 6px;background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--border);transition:all .2s;position:relative}
.view-btn:last-child{border-right:none}
.view-btn:hover{color:var(--ink);background:rgba(184,152,106,.08)}
.view-btn.active{color:var(--accent);background:var(--white)}
.view-btn.active::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--accent)}
.view-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

.tray-row{display:flex;align-items:center;gap:8px;padding:10px 14px;overflow-x:auto;scrollbar-width:none}
.tray-row::-webkit-scrollbar{display:none}
.tray-add{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.tray-add-box{width:52px;height:52px;border:1.5px dashed rgba(184,152,106,.45);background:rgba(184,152,106,.05);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--accent);transition:all .2s}
.tray-add-box:hover{border-color:var(--accent);background:rgba(184,152,106,.12)}
.tray-lbl{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.tray-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;position:relative}
.tray-thumb{width:52px;height:52px;border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;overflow:hidden}
.tray-thumb img{width:100%;height:100%;object-fit:cover}
.tray-item.sel .tray-thumb{border-color:var(--accent);background:rgba(184,152,106,.1)}
.tray-item.placed .tray-thumb::after{content:"";position:absolute;top:-4px;right:-4px;width:12px;height:12px;background:var(--green);border-radius:50%;border:1.5px solid var(--white)}
.tray-name{font-size:8px;letter-spacing:.04em;color:var(--muted);max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.tray-hint{font-size:9px;letter-spacing:.06em;color:var(--muted);padding:0 14px 8px;text-align:center;text-transform:uppercase}

/* CATALOGUE */
#catOv{position:fixed;inset:0;z-index:100;background:rgba(28,27,24,.55);backdrop-filter:blur(6px);display:none;flex-direction:column}
#catOv.open{display:flex}
.cov-head{background:var(--white);padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding-top:calc(12px + env(safe-area-inset-top,0))}
.cov-title{font-family:var(--serif);font-size:20px;font-weight:400}
.cov-title em{font-style:italic;color:var(--accent)}
.cov-x{background:none;border:1px solid var(--border);width:30px;height:30px;cursor:pointer;font-size:13px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.cov-body{flex:1;overflow-y:auto;padding:12px;background:var(--bg)}
.cov-search{display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--white);padding:9px 12px;margin-bottom:10px}
.cov-search svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:1.5;flex-shrink:0}
.cov-search input{border:none;outline:none;background:transparent;font-family:var(--sans);font-size:13px;color:var(--ink);flex:1;font-weight:300}
.cov-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--border)}
.cov-card{background:var(--white);padding:12px;display:flex;flex-direction:column;gap:5px}
.cov-img{aspect-ratio:4/3;background:#EDEAE2;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.cov-img img{width:100%;height:100%;object-fit:cover}
.cov-brand{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.cov-name{font-family:var(--serif);font-size:15px;color:var(--ink)}
.cov-btn{padding:8px;background:var(--ink);color:var(--white);border:none;font-family:var(--sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;width:100%}
.cov-btn:hover,.cov-btn.added{background:var(--accent)}

/* LOADER + TOAST */
#ldr{position:fixed;inset:0;z-index:200;background:rgba(245,242,236,.88);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#ldr.on{display:flex}
.spin{width:32px;height:32px;border:2px solid rgba(184,152,106,.2);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
.spin-txt{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
@keyframes sp{to{transform:rotate(360deg)}}
#tst{position:fixed;bottom:calc(120px + env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%) translateY(6px);background:var(--ink);color:var(--white);padding:9px 16px;font-size:11px;letter-spacing:.05em;opacity:0;transition:all .3s;z-index:300;border-left:2px solid var(--accent);white-space:nowrap;pointer-events:none}
#tst.on{opacity:1;transform:translateX(-50%) translateY(0)}
#tst.ok{border-left-color:var(--green)}
#tst.err{border-left-color:#C0392B}
</style>
</head>
<body>
<div class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <img src="logo_blanc.png" class="t-logo" alt="TadamHome" onerror="this.outerHTML='<span style=font-size:13px;color:#fff;font-family:serif;white-space:nowrap>TadamHome</span>'"/>
      <div class="t-sep"></div>
      <div class="t-label">Studio AR</div>
    </div>
    <div class="topbar-right">
      <button class="t-btn" onclick="doPhoto()" title="Photo">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span class="t-btn-lbl">Photo</span>
      </button>
      <button class="t-btn ar" onclick="doExportAR()" title="Voir en AR">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        <span class="t-btn-lbl">AR</span>
        <span class="t-badge" id="badge">0</span>
      </button>
      <div class="t-icon-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
  </div>

  <!-- STUDIO -->
  <div class="studio">
    <canvas id="c"></canvas>
    <div class="status" id="st">Ajoutez des meubles pour commencer</div>
    <div class="sel-tag" id="selTag"></div>
    <!-- DUPLICATE FAB -->
    <button class="dup-fab" id="dupFab" onclick="doDuplicate()" title="Dupliquer">
      <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="1.5"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    </button>
    <!-- DELETE FAB -->
    <button class="del-fab" id="delFab" onclick="doDelete()" title="Supprimer">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
    </button>
    <!-- UNDO FAB -->
    <button class="undo-fab" id="undoFab" onclick="doUndo()" title="Annuler">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
    </button>
  </div>

  <!-- BOTTOM (view bar + tray) -->
  <div class="bottom">
    <!-- VIEW MODE BAR -->
    <div class="view-bar">
      <button class="view-btn" data-view="plan" onclick="setView('plan')" title="Vue de dessus">
        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="1"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        <span>Plan</span>
      </button>
      <button class="view-btn" data-view="axo" onclick="setView('axo')" title="Vue axonométrique">
        <svg viewBox="0 0 24 24"><path d="M12 3l9 5v8l-9 5-9-5V8z"/><path d="M12 3v10"/><path d="M3 8l9 5 9-5"/></svg>
        <span>Axo</span>
      </button>
      <button class="view-btn active" data-view="persp" onclick="setView('persp')" title="Vue perspective">
        <svg viewBox="0 0 24 24"><path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4"/><path d="M12 11v10"/></svg>
        <span>3D</span>
      </button>
    </div>

    <div class="tray-row" id="tray">
      <div class="tray-add" onclick="openCat()">
        <div class="tray-add-box">+</div>
        <div class="tray-lbl">Ajouter</div>
      </div>
    </div>
    <div class="tray-hint" id="trayHint">Appuyez sur + pour choisir un meuble</div>
  </div>
</div>

<!-- CATALOGUE -->
<div id="catOv">
  <div class="cov-head">
    <div class="cov-title">Choisir un <em>meuble</em></div>
    <button class="cov-x" onclick="closeCat()">x</button>
  </div>
  <div class="cov-body">
    <div class="cov-search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="csrch" placeholder="Rechercher..." oninput="filterCat()"/>
    </div>
    <div class="cov-grid" id="cgrid">
      <div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--muted);font-size:13px">Chargement...</div>
    </div>
  </div>
</div>

<div id="ldr"><div class="spin"></div><div class="spin-txt" id="ltxt">Chargement...</div></div>
<div id="tst"></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"}}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }   from 'three/addons/loaders/GLTFLoader.js';
import { USDZExporter } from 'three/addons/exporters/USDZExporter.js';

/* SUPABASE */
const sb = supabase.createClient(
  'https://wbunwfxecvxngypuehop.supabase.co',
  'sb_publishable_whNXpZBu7hbDWxZ-foYFUQ_WSEiIl1P'
);

/* THREE */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, preserveDrawingBuffer:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xEEEBE3);
scene.fog = new THREE.FogExp2(0xEEEBE3, 0.04);

/* PERSPECTIVE camera */
const perspCam = new THREE.PerspectiveCamera(48, 1, 0.01, 80);
perspCam.position.set(3, 2.2, 3);

/* ORTHOGRAPHIC camera (used for Plan + Axo) */
const orthoCam = new THREE.OrthographicCamera(-5, 5, 5, -5, -50, 100);

/* Active camera reference */
let activeCam = perspCam;

/* CAMERA STATE */
let viewMode = 'persp';                  // 'persp' | 'plan' | 'axo'
let camTheta = Math.PI * 0.25;
let camElev  = 0.55;
let camDist  = 4.5;
const camTarget = new THREE.Vector3(0, 0, 0);

/* Per-mode saved state so switching back feels right */
const viewState = {
  persp: { theta: Math.PI * 0.25, elev: 0.55,                      dist: 4.5 },
  plan:  { theta: 0,              elev: Math.PI / 2 - 0.001,       dist: 6   },
  axo:   { theta: Math.PI / 4,    elev: Math.atan(1/Math.SQRT2),   dist: 7   }
};

function applyCamera() {
  activeCam.position.x = camTarget.x + camDist * Math.sin(camTheta) * Math.cos(camElev);
  activeCam.position.y = camTarget.y + camDist * Math.sin(camElev);
  activeCam.position.z = camTarget.z + camDist * Math.cos(camTheta) * Math.cos(camElev);
  activeCam.lookAt(camTarget);

  /* ortho frustum scales with camDist for natural pinch-zoom */
  if (activeCam === orthoCam) {
    const w = canvas.parentElement.clientWidth;
    const h = canvas.parentElement.clientHeight;
    const aspect = w / h;
    const size = camDist * 0.7;
    orthoCam.left   = -size * aspect;
    orthoCam.right  =  size * aspect;
    orthoCam.top    =  size;
    orthoCam.bottom = -size;
    orthoCam.updateProjectionMatrix();
  }
}
applyCamera();

/* SET VIEW MODE — exposed for the 3 buttons */
window.setView = function(mode) {
  if (mode === viewMode) return;
  /* save current */
  viewState[viewMode] = { theta: camTheta, elev: camElev, dist: camDist };
  /* load new */
  viewMode = mode;
  const s = viewState[mode];
  camTheta = s.theta;
  camElev  = s.elev;
  camDist  = s.dist;
  activeCam = (mode === 'persp') ? perspCam : orthoCam;

  /* button states */
  document.querySelectorAll('.view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === mode);
  });

  applyCamera();

  const labels = { persp: 'Vue 3D perspective', plan: 'Vue de dessus (plan)', axo: 'Vue axonométrique' };
  toast(labels[mode], 'ok');
};

/* LIGHTS */
scene.add(new THREE.AmbientLight(0xffffff, 1.0));
const sun = new THREE.DirectionalLight(0xfffbf0, 2.2);
sun.position.set(5, 10, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far  = 40;
sun.shadow.camera.left = -8;
sun.shadow.camera.right = 8;
sun.shadow.camera.top = 8;
sun.shadow.camera.bottom = -8;
sun.shadow.bias = -0.001;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xfaf5eb, 0xcfc5b4, 0.7));

/* FLOOR */
const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(14, 14),
  new THREE.MeshLambertMaterial({ color:0xE4DFD6 })
);
floorMesh.rotation.x = -Math.PI / 2;
floorMesh.receiveShadow = true;
floorMesh.name = 'floor';
scene.add(floorMesh);

const grid = new THREE.GridHelper(14, 28, 0xBCB09A, 0xBCB09A);
grid.material.opacity = 0.35;
grid.material.transparent = true;
grid.name = 'grid';
scene.add(grid);

const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

/* RESIZE */
function resize() {
  const w = canvas.parentElement.clientWidth;
  const h = canvas.parentElement.clientHeight;
  renderer.setSize(w, h, false);
  perspCam.aspect = w / h;
  perspCam.updateProjectionMatrix();
  applyCamera(); /* updates ortho frustum too */
}
window.addEventListener('resize', resize);
resize();

/* ANIMATE */
(function loop(){ requestAnimationFrame(loop); renderer.render(scene, activeCam); })();

/* WebGL context loss safety net */
canvas.addEventListener('webglcontextlost', (e) => { e.preventDefault(); console.warn('WebGL context lost'); });
canvas.addEventListener('webglcontextrestored', () => { console.log('WebGL context restored'); });

/* STATE */
const gltfLoader = new GLTFLoader();
const usdzEx     = new USDZExporter();
const raycaster  = new THREE.Raycaster();
let products   = [];
let placed     = []; /* { mesh, id, name, sceneId, icon, imgUrl, sourceData } */
let snapList   = [];
let selected   = null;
let pending    = null;

/* ============================
   TOUCH STATE
   ============================ */
let t0 = null;
let orbitStart = null;
let tDragging  = false;
let tPinch0    = 0;
let tAngle0    = 0;
let tMid0      = null; /* midpoint between 2 fingers, used for camera panning */
let tMode      = 'none';

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (e.touches.length === 1) {
    t0 = { x:e.touches[0].clientX, y:e.touches[0].clientY, t:Date.now() };
    tDragging = false;
    tMode = 'none';
    orbitStart = { theta:camTheta, elev:camElev, x:e.touches[0].clientX, y:e.touches[0].clientY };
  } else if (e.touches.length === 2) {
    tPinch0 = getPinch(e);
    tAngle0 = getAngle(e);
    tMid0   = getMidpoint(e);
    /* If an object is selected, 2 fingers rotate it; otherwise pan + zoom the camera together */
    tMode = selected ? 'rotate' : 'panZoom';
  }
}, { passive:false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && t0) {
    const dx = e.touches[0].clientX - t0.x;
    const dy = e.touches[0].clientY - t0.y;
    if (!tDragging && Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
    tDragging = true;

    if (selected && tMode !== 'orbit') {
      tMode = 'drag';
      const nx = (e.touches[0].clientX / canvas.parentElement.clientWidth) * 2 - 1;
      const ny = -((e.touches[0].clientY / canvas.parentElement.clientHeight) * 2 - 1);
      raycaster.setFromCamera(new THREE.Vector2(nx, ny), activeCam);
      const pt = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(groundPlane, pt)) {
        selected.mesh.position.x = pt.x;
        selected.mesh.position.z = pt.z;
        const bx = new THREE.Box3().setFromObject(selected.mesh);
        if (bx.min.y < 0) selected.mesh.position.y -= bx.min.y;
      }
    } else {
      tMode = 'orbit';
      camTheta = orbitStart.theta - (e.touches[0].clientX - orbitStart.x) * 0.007;
      /* Elevation only adjustable in perspective mode — Plan/Axo elevations are fixed */
      if (viewMode === 'persp') {
        camElev = Math.max(0.05, Math.min(Math.PI / 2 - 0.05,
          orbitStart.elev + (e.touches[0].clientY - orbitStart.y) * 0.006));
      }
      applyCamera();
    }
  } else if (e.touches.length === 2) {
    if (tMode === 'rotate' && selected) {
      const da = getAngle(e) - tAngle0;
      selected.mesh.rotation.y -= da;
      tAngle0 = getAngle(e);
    } else if (tMode === 'panZoom') {
      /* Pinch -> zoom */
      const dp = getPinch(e);
      const maxD = (viewMode === 'persp') ? 12 : 20;
      camDist = Math.max(1, Math.min(maxD, camDist * (tPinch0 / dp)));
      tPinch0 = dp;
      /* Midpoint translation -> pan camera horizontally + vertically */
      const mid = getMidpoint(e);
      const dx = mid.x - tMid0.x;
      const dy = mid.y - tMid0.y;
      tMid0 = mid;
      panCamera(dx, dy);
      applyCamera();
    }
  }
}, { passive:false });

canvas.addEventListener('touchend', (e) => {
  if (!tDragging && t0 && e.changedTouches.length === 1 && (Date.now() - t0.t) < 280) {
    handleTap(e.changedTouches[0]);
  }
  if (e.touches.length === 0) { t0 = null; tDragging = false; tMode = 'none'; }
}, { passive:false });

function getPinch(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}
function getAngle(e) {
  return Math.atan2(
    e.touches[1].clientY - e.touches[0].clientY,
    e.touches[1].clientX - e.touches[0].clientX
  );
}
function getMidpoint(e) {
  return {
    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
    y: (e.touches[0].clientY + e.touches[1].clientY) / 2
  };
}

/* Pan the camera target horizontally + vertically based on screen-pixel deltas.
   The scene visually follows the fingers (target moves opposite to finger direction). */
const _panRight = new THREE.Vector3();
const _panUp    = new THREE.Vector3();
function panCamera(dx, dy) {
  const h = canvas.parentElement.clientHeight;
  let worldPerPixel;
  if (activeCam === orthoCam) {
    /* Ortho: 1px = (frustum height) / (canvas height) world units */
    worldPerPixel = (orthoCam.top - orthoCam.bottom) / h;
  } else {
    /* Perspective: world units per pixel scale with FOV and distance to target */
    const vFov = perspCam.fov * Math.PI / 180;
    worldPerPixel = (2 * Math.tan(vFov / 2) * camDist) / h;
  }
  _panRight.setFromMatrixColumn(activeCam.matrixWorld, 0);
  _panUp.setFromMatrixColumn(activeCam.matrixWorld, 1);
  camTarget.addScaledVector(_panRight, -dx * worldPerPixel);
  camTarget.addScaledVector(_panUp,     dy * worldPerPixel);
}

/* MOUSE for desktop */
let mDown = false, mDragging = false, mOrbitStart = null, mObjDrag = false, mPan = false, mPanStart = null;
canvas.addEventListener('mousedown', (e) => {
  mDown = true; mDragging = false;
  /* Shift+drag or middle-mouse-drag = pan camera (desktop convention) */
  mPan = e.shiftKey || e.button === 1;
  if (mPan) {
    mPanStart = { x:e.clientX, y:e.clientY };
    mObjDrag = false;
    return;
  }
  const nx = (e.clientX / canvas.parentElement.clientWidth) * 2 - 1;
  const ny = -((e.clientY / canvas.parentElement.clientHeight) * 2 - 1);
  raycaster.setFromCamera(new THREE.Vector2(nx, ny), activeCam);
  if (selected) {
    const hits = raycaster.intersectObjects([selected.mesh], true);
    if (hits.length) { mObjDrag = true; return; }
  }
  mObjDrag = false;
  mOrbitStart = { theta:camTheta, elev:camElev, x:e.clientX, y:e.clientY };
});
window.addEventListener('mousemove', (e) => {
  if (!mDown) return;
  mDragging = true;
  if (mPan && mPanStart) {
    const dx = e.clientX - mPanStart.x;
    const dy = e.clientY - mPanStart.y;
    mPanStart = { x:e.clientX, y:e.clientY };
    panCamera(dx, dy);
    applyCamera();
  } else if (mObjDrag && selected) {
    const nx = (e.clientX / canvas.parentElement.clientWidth) * 2 - 1;
    const ny = -((e.clientY / canvas.parentElement.clientHeight) * 2 - 1);
    raycaster.setFromCamera(new THREE.Vector2(nx, ny), activeCam);
    const pt = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(groundPlane, pt)) {
      selected.mesh.position.x = pt.x;
      selected.mesh.position.z = pt.z;
    }
  } else if (mOrbitStart) {
    camTheta = mOrbitStart.theta - (e.clientX - mOrbitStart.x) * 0.007;
    if (viewMode === 'persp') {
      camElev = Math.max(0.05, Math.min(Math.PI / 2 - 0.05,
        mOrbitStart.elev + (e.clientY - mOrbitStart.y) * 0.006));
    }
    applyCamera();
  }
});
window.addEventListener('mouseup', (e) => {
  if (!mDragging && mDown) handleMouseClick(e);
  mDown = false; mDragging = false; mObjDrag = false; mPan = false; mPanStart = null;
});
/* Suppress browser context menu so middle/right-click pan is usable */
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  /* Trackpad pinch-to-zoom: browsers send wheel + ctrlKey */
  if (e.ctrlKey) {
    const maxD = (viewMode === 'persp') ? 12 : 20;
    camDist = Math.max(1, Math.min(maxD, camDist * (1 + e.deltaY * 0.01)));
    applyCamera();
    return;
  }
  /* Trackpad two-finger drag (deltaX != 0) or shift+wheel = pan */
  if (e.shiftKey || Math.abs(e.deltaX) > 0) {
    panCamera(-e.deltaX, -e.deltaY);
    applyCamera();
    return;
  }
  /* Plain mouse wheel = zoom */
  const maxD = (viewMode === 'persp') ? 12 : 20;
  camDist = Math.max(1, Math.min(maxD, camDist + e.deltaY * 0.005));
  applyCamera();
}, { passive:false });

function handleMouseClick(e) {
  const nx = (e.clientX / canvas.parentElement.clientWidth) * 2 - 1;
  const ny = -((e.clientY / canvas.parentElement.clientHeight) * 2 - 1);
  raycaster.setFromCamera(new THREE.Vector2(nx, ny), activeCam);
  if (pending) {
    const hf = raycaster.intersectObject(floorMesh);
    if (hf.length) { doPlace(hf[0].point); return; }
  }
  const meshes = placed.map(o => o.mesh);
  const hits = raycaster.intersectObjects(meshes, true);
  if (hits.length) {
    let m = hits[0].object;
    while (m.parent && !placed.find(o => o.mesh === m)) m = m.parent;
    const f = placed.find(o => o.mesh === m);
    if (f) { selectObj(f); return; }
  }
  selectObj(null);
}
function handleTap(t) {
  const nx = (t.clientX / canvas.parentElement.clientWidth) * 2 - 1;
  const ny = -((t.clientY / canvas.parentElement.clientHeight) * 2 - 1);
  raycaster.setFromCamera(new THREE.Vector2(nx, ny), activeCam);
  if (pending) {
    const hf = raycaster.intersectObject(floorMesh);
    if (hf.length) { doPlace(hf[0].point); return; }
  }
  const meshes = placed.map(o => o.mesh);
  const hits = raycaster.intersectObjects(meshes, true);
  if (hits.length) {
    let m = hits[0].object;
    while (m.parent && !placed.find(o => o.mesh === m)) m = m.parent;
    const f = placed.find(o => o.mesh === m);
    if (f) { selectObj(f); return; }
  }
  selectObj(null);
}

/* PLACE */
function doPlace(pt) {
  const m = pending.mesh.clone(true);
  /* Each placed copy gets its OWN materials so per-instance work
     (selection highlight, AR export prep…) never pollutes the source. */
  m.traverse((c) => {
    if (!c.isMesh) return;
    c.castShadow = c.receiveShadow = true;
    if (Array.isArray(c.material)) {
      c.material = c.material.map(mat => mat.clone());
    } else if (c.material) {
      c.material = c.material.clone();
    }
    c.userData.origMat = c.material;
  });
  m.position.set(pt.x, 0, pt.z);
  const b = new THREE.Box3().setFromObject(m);
  m.position.y -= b.min.y;
  scene.add(m);

  const sid = Date.now() + Math.floor(Math.random() * 1000);
  const p = {
    mesh: m,
    id: pending.id,
    name: pending.name,
    icon: pending.icon,
    imgUrl: pending.imgUrl,
    sceneId: sid
  };
  placed.push(p);
  snapList.push(p);

  const tel = document.querySelector('.tray-item[data-id="' + pending.id + '"]');
  if (tel) { tel.dataset.sid = sid; tel.classList.add('placed'); }
  pending = null;
  selectObj(p);
  document.getElementById('undoFab').classList.add('on');
  updateBadge();
  setStatus(placed.length + ' meuble' + (placed.length > 1 ? 's' : '') + ' - Touchez pour selectionner');
  document.getElementById('trayHint').textContent = 'Glissez pour deplacer - 2 doigts pour pivoter';
  toast(p.name + ' place', 'ok');
}

/* SELECT */
function selectObj(obj) {
  if (selected) {
    selected.mesh.traverse((c) => {
      if (c.isMesh && c.userData.origMat) c.material = c.userData.origMat;
    });
  }
  selected = obj;
  document.getElementById('delFab').classList.toggle('on', !!obj);
  document.getElementById('dupFab').classList.toggle('on', !!obj);
  const tag = document.getElementById('selTag');
  tag.classList.toggle('on', !!obj);
  if (obj) tag.textContent = obj.name;
}

/* DELETE */
window.doDelete = function() {
  if (!selected) return;
  scene.remove(selected.mesh);
  /* Dispose this instance's cloned materials (textures stay shared with sources) */
  selected.mesh.traverse((c) => {
    if (c.isMesh && c.material) {
      if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
      else c.material.dispose();
    }
  });
  const removedId = selected.sceneId;
  const removedSrcId = selected.id;
  placed   = placed.filter(o => o.sceneId !== removedId);
  snapList = snapList.filter(o => o.sceneId !== removedId);
  /* Tray indicator: only un-mark if no other instance of this product remains */
  const stillPlaced = placed.some(o => o.id === removedSrcId);
  if (!stillPlaced) {
    const tel = document.querySelector('.tray-item[data-id="' + removedSrcId + '"]');
    if (tel) { tel.removeAttribute('data-sid'); tel.classList.remove('placed'); }
  }
  selected = null;
  document.getElementById('delFab').classList.remove('on');
  document.getElementById('dupFab').classList.remove('on');
  document.getElementById('selTag').classList.remove('on');
  if (!snapList.length) document.getElementById('undoFab').classList.remove('on');
  updateBadge();
  setStatus(placed.length > 0 ? placed.length + ' meuble' + (placed.length > 1 ? 's' : '') : 'Ajoutez des meubles pour commencer');
  toast('Meuble supprime');
};

/* DUPLICATE — clone the selected placed item, materials included */
window.doDuplicate = function() {
  if (!selected) return;
  const src = selected;
  const m = src.mesh.clone(true);
  m.traverse((c) => {
    if (!c.isMesh) return;
    c.castShadow = c.receiveShadow = true;
    if (Array.isArray(c.material)) {
      c.material = c.material.map(mat => mat.clone());
    } else if (c.material) {
      c.material = c.material.clone();
    }
    c.userData.origMat = c.material;
  });
  /* offset 50cm right/forward so the duplicate is visible */
  m.position.copy(src.mesh.position);
  m.position.x += 0.5;
  m.position.z += 0.5;
  m.rotation.copy(src.mesh.rotation);
  m.scale.copy(src.mesh.scale);
  scene.add(m);

  const sid = Date.now() + Math.floor(Math.random() * 1000);
  const p = {
    mesh: m,
    id: src.id,
    name: src.name,
    icon: src.icon,
    imgUrl: src.imgUrl,
    sceneId: sid
  };
  placed.push(p);
  snapList.push(p);
  selectObj(p);
  document.getElementById('undoFab').classList.add('on');
  updateBadge();
  setStatus(placed.length + ' meuble' + (placed.length > 1 ? 's' : ''));
  toast(src.name + ' duplique', 'ok');
};

/* UNDO */
window.doUndo = function() {
  if (!snapList.length) return;
  const last = snapList.pop();
  scene.remove(last.mesh);
  last.mesh.traverse((c) => {
    if (c.isMesh && c.material) {
      if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
      else c.material.dispose();
    }
  });
  placed = placed.filter(o => o.sceneId !== last.sceneId);
  if (selected && selected.sceneId === last.sceneId) {
    selected = null;
    document.getElementById('delFab').classList.remove('on');
    document.getElementById('dupFab').classList.remove('on');
    document.getElementById('selTag').classList.remove('on');
  }
  /* Update tray indicator */
  const stillPlaced = placed.some(o => o.id === last.id);
  if (!stillPlaced) {
    const tel = document.querySelector('.tray-item[data-id="' + last.id + '"]');
    if (tel) { tel.removeAttribute('data-sid'); tel.classList.remove('placed'); }
  }
  if (!snapList.length) document.getElementById('undoFab').classList.remove('on');
  updateBadge();
  toast('Annule: ' + last.name);
};

/* LOAD GLB */
async function loadModel(item) {
  spin(true, 'Chargement ' + item.name + '...');
  try {
    const gltf = await new Promise((ok, fail) => {
      gltfLoader.load(item.glb, ok, null, fail);
    });
    const mesh = gltf.scene;

    /* real 1:1 scale */
    const box = new THREE.Box3().setFromObject(mesh);
    const mh  = box.max.y - box.min.y;
    const th  = item.h ? (item.h / 100) : realH(item.category);
    if (mh > 0.001) mesh.scale.setScalar(th / mh);

    const box2 = new THREE.Box3().setFromObject(mesh);
    mesh.position.y -= box2.min.y;

    /* Set proper texture color spaces — sRGB for color maps, linear for data maps */
    mesh.traverse((c) => {
      if (!c.isMesh) return;
      c.castShadow = c.receiveShadow = true;
      if (!c.material) return;
      const mats = Array.isArray(c.material) ? c.material : [c.material];
      mats.forEach((mat) => {
        /* color maps: sRGB */
        ['map', 'emissiveMap'].forEach((k) => {
          if (mat[k]) { mat[k].colorSpace = THREE.SRGBColorSpace; mat[k].needsUpdate = true; }
        });
        /* data maps: linear (NoColorSpace) */
        ['normalMap', 'roughnessMap', 'metalnessMap', 'aoMap'].forEach((k) => {
          if (mat[k]) { mat[k].colorSpace = THREE.NoColorSpace; mat[k].needsUpdate = true; }
        });
        mat.needsUpdate = true;
      });
    });

    pending = { mesh, id:item.id, name:item.name, icon:item.icon || '\u25C7', imgUrl:item.imgUrl || null };
    spin(false);
    setStatus('Touchez le sol pour placer ' + item.name, true);
    toast(item.name + ' charge - touchez le sol pour placer', 'ok');
  } catch(e) {
    spin(false);
    toast('Erreur: ' + e.message, 'err');
  }
}

/* ========================================
   EXPORT USDZ — fully isolated deep clone
   ========================================
   Bug fixed: previously shallow-cloned materials shared textures with the
   live scene; modifying their needsUpdate / colorSpace at export time was
   triggering re-uploads that occasionally lost the GPU-side scene when many
   models were present. We now build a self-contained group with cloned
   materials, unique mesh names (USD requires unique paths) and never touch
   the source scene. */
window.doExportAR = async function() {
  if (!placed.length) { toast('Ajoutez des meubles d\'abord', 'err'); return; }
  spin(true, 'Generation USDZ (' + placed.length + ' modeles)...');

  const grp = new THREE.Group();
  grp.name = 'TadamHomeScene';
  /* Track cloned materials so we can dispose them after export */
  const clonedMats = [];

  try {
    placed.forEach((obj, idx) => {
      const cl = obj.mesh.clone(true);
      cl.position.copy(obj.mesh.position);
      cl.rotation.copy(obj.mesh.rotation);
      cl.scale.copy(obj.mesh.scale);
      cl.name = 'object_' + idx + '_' + sanitize(obj.name);

      let meshIdx = 0;
      cl.traverse((c) => {
        /* Make every node name unique inside the export group — USD hates duplicates */
        if (c.name) {
          c.name = 'o' + idx + '_' + sanitize(c.name);
        } else {
          c.name = 'o' + idx + '_n' + meshIdx;
        }
        if (!c.isMesh) return;
        meshIdx++;
        /* Skip empty meshes that would crash the exporter */
        if (!c.geometry || !c.material) {
          if (c.parent) c.parent.remove(c);
          return;
        }
        /* Clone material(s) so the live scene is never modified */
        if (Array.isArray(c.material)) {
          c.material = c.material.map((m) => {
            const cm = m.clone();
            clonedMats.push(cm);
            return cm;
          });
        } else {
          c.material = c.material.clone();
          clonedMats.push(c.material);
        }
      });
      grp.add(cl);
    });

    grp.updateMatrixWorld(true);

    const buf = await usdzEx.parse(grp, { maxTextureSize: 1024 });

    spin(false);

    const blob = new Blob([buf], { type: 'model/vnd.usdz+zip' });
    const url  = URL.createObjectURL(blob);
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                  (navigator.userAgent.includes('Mac') && 'ontouchend' in document);

    if (isIOS) {
      const a = document.createElement('a');
      a.setAttribute('rel', 'ar');
      a.href = url;
      /* iOS requires an <img> child to trigger AR Quick Look */
      const img = document.createElement('img');
      img.style.display = 'none';
      a.appendChild(img);
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        if (a.parentNode) a.parentNode.removeChild(a);
        URL.revokeObjectURL(url);
      }, 8000);
      toast('Ouverture AR Quick Look...', 'ok');
    } else {
      const a2 = document.createElement('a');
      a2.href = url;
      a2.download = 'TadamHome-scene-' + Date.now() + '.usdz';
      document.body.appendChild(a2);
      a2.click();
      setTimeout(() => {
        if (a2.parentNode) a2.parentNode.removeChild(a2);
        URL.revokeObjectURL(url);
      }, 5000);
      toast('Fichier USDZ telecharge', 'ok');
    }
  } catch(err) {
    spin(false);
    console.error('[AR Export] failed:', err);
    toast('Erreur AR: ' + (err.message || 'echec export'), 'err');
  } finally {
    /* Dispose only the cloned materials — keeps live scene intact */
    clonedMats.forEach((m) => { try { m.dispose(); } catch(_){} });
  }
};

function sanitize(s) {
  return String(s || 'item').replace(/[^a-zA-Z0-9_]/g, '_').substring(0, 40);
}

/* CATALOGUE */
async function loadCatalogue() {
  const res = await sb.from('products').select('*').order('created_at', { ascending:false });
  products = (res.data || []).filter(p => p.model_glb_url);
  renderGrid(products);
}
window.filterCat = function() {
  const q = document.getElementById('csrch').value.toLowerCase();
  renderGrid(products.filter(p =>
    (p.name||'').toLowerCase().includes(q) || (p.enseigne_name||'').toLowerCase().includes(q)
  ));
};
function renderGrid(list) {
  const g = document.getElementById('cgrid');
  if (!list.length) { g.innerHTML = '<div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--muted);font-size:13px">Aucun modele</div>'; return; }
  g.innerHTML = list.map((p) => {
    const imgHtml = (p.images && p.images[0])
      ? '<img src="' + p.images[0] + '" style="width:100%;height:100%;object-fit:cover"/>'
      : catIco(p.category);
    return '<div class="cov-card">'
      + '<div class="cov-img">' + imgHtml + '</div>'
      + '<div class="cov-brand">' + (p.enseigne_name||'') + '</div>'
      + '<div class="cov-name">' + (p.name||'') + '</div>'
      + '<button class="cov-btn" onclick="addFromCat(\'' + p.id + '\')">+ Ajouter</button>'
      + '</div>';
  }).join('');
}
window.addFromCat = async function(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  closeCat();
  const trayImg = (p.images && p.images[0]) ? p.images[0] : null;
  await loadModel({
    id: p.id, name: p.name,
    glb: p.model_glb_url,
    category: p.category,
    h: p.dimensions && p.dimensions.h ? p.dimensions.h : null,
    icon: catIco(p.category),
    imgUrl: trayImg
  });
  addTrayItem({ id:p.id, name:p.name, icon:catIco(p.category), imgUrl:trayImg });
};
window.openCat  = function() { document.getElementById('catOv').classList.add('open'); };
window.closeCat = function() { document.getElementById('catOv').classList.remove('open'); };

/* TRAY */
function addTrayItem(item) {
  const tray = document.getElementById('tray');
  if (document.querySelector('.tray-item[data-id="' + item.id + '"]')) return;
  const d = document.createElement('div');
  d.className = 'tray-item sel';
  d.dataset.id = item.id;
  const thumbHtml = item.imgUrl
    ? '<img src="' + item.imgUrl + '" style="width:100%;height:100%;object-fit:cover"/>'
    : item.icon;
  d.innerHTML = '<div class="tray-thumb">' + thumbHtml + '</div><div class="tray-name">' + item.name + '</div>';
  d.addEventListener('click', () => {
    document.querySelectorAll('.tray-item').forEach(t => t.classList.remove('sel'));
    d.classList.add('sel');
    if (pending && pending.id === item.id) {
      setStatus('Touchez le sol pour placer ' + item.name, true);
    }
  });
  tray.appendChild(d);
}

/* UTILS */
function realH(cat) {
  const h = { sofa:.85, canape:.85, fauteuil:.90, chaise:.90,
              'table basse':.45, table:.75, bureau:.75,
              luminaire:1.70, rangement:1.20, lit:.55 };
  return h[(cat||'').toLowerCase()] || 0.80;
}
function catIco(cat) {
  const i = { sofa:'\uD83D\uDECB', canape:'\uD83D\uDECB', fauteuil:'\uD83E\uDE91', chaise:'\uD83E\uDE91',
              table:'\uD83E\uDD55', luminaire:'\uD83D\uDCA1', rangement:'\uD83D\uDCE6', lit:'\uD83D\uDECF' };
  return i[(cat||'').toLowerCase()] || '\u25C7';
}
function updateBadge() {
  const b = document.getElementById('badge');
  if (placed.length > 0) { b.textContent = placed.length; b.classList.add('on'); }
  else b.classList.remove('on');
}
function setStatus(txt, accent) {
  const s = document.getElementById('st');
  s.textContent = txt;
  s.className = 'status' + (accent ? ' accent' : '');
}
let tT;
function toast(txt, type) {
  const t = document.getElementById('tst');
  t.textContent = txt;
  t.className = 'on' + (type ? ' ' + type : '');
  clearTimeout(tT);
  tT = setTimeout(() => { t.className = ''; }, 3000);
}
function spin(show, txt) {
  document.getElementById('ldr').className = show ? 'on' : '';
  if (txt) document.getElementById('ltxt').textContent = txt;
}

/* INIT */
loadCatalogue();
const q = JSON.parse(localStorage.getItem('tadam_ar_scene') || '[]');
if (q.length) {
  localStorage.removeItem('tadam_ar_scene');
  q.forEach((item) => {
    if (item.glb) {
      loadModel({ id:item.id, name:item.name, glb:item.glb, category:item.category,
                  h: item.dimensions && item.dimensions.h ? item.dimensions.h : null,
                  icon: catIco(item.category) });
      addTrayItem({ id:item.id, name:item.name, icon:catIco(item.category) });
    }
  });
}
</script>
