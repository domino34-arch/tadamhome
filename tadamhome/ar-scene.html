<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>TadamHome - Studio AR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F2EC;--ink:#1C1B18;--white:#FAFAF8;
  --accent:#B8986A;--acc3:#A07A4A;--muted:#8A8880;
  --border:rgba(28,27,24,.12);--green:#27704A;
  --serif:'Cormorant Garamond',serif;--sans:'Outfit',sans-serif;
}
html,body{height:100%;background:var(--bg);font-family:var(--sans);overflow:hidden}

/* TOPBAR */
.topbar{height:52px;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:10px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-right{display:flex;align-items:center;gap:8px}
.t-logo{height:20px;object-fit:contain}
.t-sep{width:1px;height:20px;background:rgba(255,255,255,.15)}
.t-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:var(--sans)}
.t-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--white);font-family:var(--sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap}
.t-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;flex-shrink:0}
.t-btn:hover{background:rgba(184,152,106,.2);border-color:var(--accent);color:var(--accent)}
.t-btn.ar-btn{background:rgba(39,112,74,.25);border-color:rgba(39,112,74,.5);color:#5dba87}
.t-btn.ar-btn:hover{background:rgba(39,112,74,.4)}
.t-badge{background:var(--green);color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;font-family:var(--sans)}

/* MAIN LAYOUT */
.app{display:flex;flex-direction:column;height:100vh}
.studio-wrap{flex:1;position:relative;overflow:hidden}
#studioCanvas{display:block;width:100%;height:100%;touch-action:none}

/* BOTTOM PANEL */
.bottom{background:var(--white);border-top:1px solid var(--border);flex-shrink:0}
.cat-row{display:flex;gap:6px;padding:10px 14px 8px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.cat-row::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--border);background:var(--bg);font-family:var(--sans);font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--ink);transition:all .2s}
.cat-pill:hover,.cat-pill.loading{background:var(--ink);color:var(--white);border-color:var(--ink)}
.cat-pill span{font-size:14px}
.tray-row{display:flex;align-items:center;gap:8px;padding:8px 14px;overflow-x:auto;scrollbar-width:none}
.tray-row::-webkit-scrollbar{display:none}
.tray-add{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.tray-add-box{width:48px;height:48px;border:1.5px dashed rgba(184,152,106,.4);background:rgba(184,152,106,.05);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--accent);transition:all .2s}
.tray-add-box:hover{border-color:var(--accent);background:rgba(184,152,106,.1)}
.tray-lbl{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.tray-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;position:relative}
.tray-thumb{width:48px;height:48px;border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
.tray-item.sel .tray-thumb{border-color:var(--accent);background:rgba(184,152,106,.08)}
.tray-item.placed .tray-thumb::after{content:"";position:absolute;top:-4px;right:-4px;width:12px;height:12px;background:var(--green);border-radius:50%;border:1.5px solid var(--white)}
.tray-name{font-size:8px;letter-spacing:.04em;color:var(--muted);max-width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.hint{font-size:10px;color:var(--muted);letter-spacing:.06em;padding:0 14px 10px;text-align:center;font-family:var(--sans)}

/* OBJECT CONTROLS PANEL */
.obj-panel{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;opacity:0;pointer-events:none;transition:all .25s}
.obj-panel.show{opacity:1;pointer-events:all}
.op-btn{width:40px;height:40px;background:rgba(250,250,248,.95);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.op-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
.op-btn:hover{background:var(--ink);color:var(--white);border-color:var(--ink)}
.op-btn.del:hover{background:#C0392B;border-color:#C0392B}
.op-label{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:center;font-family:var(--sans)}

/* UNDO */
.undo-btn{position:absolute;left:12px;bottom:12px;display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(250,250,248,.95);border:1px solid var(--border);font-family:var(--sans);font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--muted);box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .2s;opacity:0;pointer-events:none}
.undo-btn.show{opacity:1;pointer-events:all}
.undo-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
.undo-btn:hover{background:var(--ink);color:var(--white);border-color:var(--ink)}

/* STATUS */
.status-bar{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(28,27,24,.8);backdrop-filter:blur(8px);padding:6px 14px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.75);white-space:nowrap;border:1px solid rgba(255,255,255,.1);pointer-events:none;transition:all .3s}
.status-bar.accent{color:var(--accent);border-color:rgba(184,152,106,.3)}

/* CATALOGUE OVERLAY */
#catOverlay{position:fixed;inset:0;z-index:100;background:rgba(28,27,24,.55);backdrop-filter:blur(6px);display:none;flex-direction:column}
#catOverlay.open{display:flex}
.cat-ov-head{background:var(--white);padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cat-ov-title{font-family:var(--serif);font-size:20px;font-weight:400}
.cat-ov-title em{font-style:italic;color:var(--accent)}
.cat-x{background:none;border:1px solid var(--border);width:30px;height:30px;cursor:pointer;font-size:13px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .2s}
.cat-x:hover{border-color:var(--accent);color:var(--accent)}
.cat-ov-body{flex:1;overflow-y:auto;padding:12px;background:var(--bg)}
.cat-search{display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--white);padding:9px 12px;margin-bottom:10px}
.cat-search svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:1.5;flex-shrink:0}
.cat-search input{border:none;outline:none;background:transparent;font-family:var(--sans);font-size:13px;color:var(--ink);flex:1;font-weight:300}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--border)}
.cat-card{background:var(--white);padding:12px;display:flex;flex-direction:column;gap:5px}
.cat-card-img{aspect-ratio:4/3;background:#EDEAE2;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.cat-card-img img{width:100%;height:100%;object-fit:cover}
.cat-brand{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.cat-name{font-family:var(--serif);font-size:15px;font-weight:400;color:var(--ink)}
.cat-add{padding:8px;background:var(--ink);color:var(--white);border:none;font-family:var(--sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;width:100%;transition:background .2s}
.cat-add:hover,.cat-add.added{background:var(--accent)}

/* LOADER + TOAST */
#loader{position:fixed;inset:0;z-index:200;background:rgba(245,242,236,.85);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#loader.on{display:flex}
.spin{width:32px;height:32px;border:2px solid rgba(184,152,106,.2);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
.spin-txt{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--ink);color:var(--white);padding:9px 16px;font-size:11px;letter-spacing:.05em;opacity:0;transition:all .3s;z-index:300;border-left:2px solid var(--accent);white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-left-color:var(--green)}
#toast.err{border-left-color:#C0392B}
</style>
</head>
<body>

<div class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <img src="logo_blanc.png" class="t-logo" alt="TadamHome" onerror="this.outerHTML='<span style=\'font-family:serif;color:#fff;font-size:16px\'>TadamHome</span>'"/>

      <div class="t-label">Studio AR</div>

      <button class="t-btn" onclick="takePhoto()">

        Photo
      </button>
      <button class="t-btn ar-btn" id="arBtn" onclick="exportAR()">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Voir en AR
        <span class="t-badge" id="arBadge" style="display:none">0</span>

      <button class="t-btn" onclick="history.back()">

    <!-- OBJECT CONTROLS -->
    <div class="obj-panel" id="objPanel">
      <div class="op-label">Rotation</div>
      <div class="op-btn" onclick="rotObj(-15)"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg></div>
      <div class="op-btn" onclick="rotObj(15)"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.5"/></svg></div>
      <div class="op-label" style="margin-top:4px">Taille</div>
      <div class="op-btn" onclick="scaObj(1.15)"><svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></div>
      <div class="op-btn" onclick="scaObj(0.87)"><svg viewBox="0 0 24 24"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="21" y2="3"/><line x1="3" y1="21" x2="14" y2="10"/></svg></div>

      Annuler
    </button>
  </div>

  <!-- BOTTOM -->
  <div class="bottom">
    <!-- CATEGORY PILLS -->
    <div class="cat-row">
      <button class="cat-pill" onclick="quickAdd(this,'canape')"><span>&#128763;</span> Canape</button>
      <button class="cat-pill" onclick="quickAdd(this,'fauteuil')"><span>&#129937;</span> Fauteuil</button>
      <button class="cat-pill" onclick="quickAdd(this,'chaise')"><span>&#129937;</span> Chaise</button>
      <button class="cat-pill" onclick="quickAdd(this,'table')"><span>&#129717;</span> Table</button>
      <button class="cat-pill" onclick="quickAdd(this,'luminaire')"><span>&#128161;</span> Lampe</button>
      <button class="cat-pill" onclick="quickAdd(this,'lit')"><span>&#128719;</span> Lit</button>
    </div>
    <!-- TRAY -->
    <div class="tray-row" id="tray">
      <div class="tray-add" onclick="openCat()">
        <div class="tray-add-box">+</div>

    <div class="hint" id="hintTxt">Selectionnez un meuble puis glissez-le dans la scene</div>

</div>

<!-- CATALOGUE OVERLAY -->
<div id="catOverlay">
  <div class="cat-ov-head">
    <div class="cat-ov-title">Ajouter a la <em>scene</em></div>
    <button class="cat-x" onclick="closeCat()">x</button>
  </div>
  <div class="cat-ov-body">
    <div class="cat-search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="catSearch" placeholder="Rechercher un meuble..." oninput="filterCat()"/>
    </div>
    <div class="cat-grid" id="catGrid"><div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--muted);font-size:13px">Chargement...</div></div>
  </div>
</div>

<div id="loader"><div class="spin"></div><div class="spin-txt" id="loaderTxt">Chargement...</div></div>
<div id="toast"></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { USDZExporter }  from 'three/addons/exporters/USDZExporter.js';

/* ---- SUPABASE ---- */
const SUPA = 'https://wbunwfxecvxngypuehop.supabase.co';
const KEY  = 'sb_publishable_whNXpZBu7hbDWxZ-foYFUQ_WSEiIl1P';
const db   = supabase.createClient(SUPA, KEY);

/* ---- THREE SETUP ---- */
const canvas   = document.getElementById('studioCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, preserveDrawingBuffer:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0xF0EDE6);

const camera = new THREE.PerspectiveCamera(50, 1, 0.01, 100);
camera.position.set(2.5, 2, 2.5);
camera.lookAt(0, 0, 0);

const orbit = new OrbitControls(camera, canvas);
orbit.enableDamping  = true;
orbit.dampingFactor  = 0.08;
orbit.minDistance    = 0.5;
orbit.maxDistance    = 15;
orbit.maxPolarAngle  = Math.PI / 2.05;
orbit.target.set(0, 0, 0);

/* ---- LIGHTING ---- */
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const sun = new THREE.DirectionalLight(0xfffdf0, 2);
sun.position.set(4, 8, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far  = 30;
sun.shadow.camera.left = sun.shadow.camera.bottom = -8;
sun.shadow.camera.right = sun.shadow.camera.top = 8;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xfaf5eb, 0xb8a882, 0.6));

/* ---- FLOOR ---- */
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(12, 12),
  new THREE.MeshLambertMaterial({ color:0xE8E4DC })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

const grid = new THREE.GridHelper(12, 24, 0xC4B89A, 0xC4B89A);
grid.material.opacity = 0.4;
grid.material.transparent = true;
scene.add(grid);

/* ---- STATE ---- */
const loader = new GLTFLoader();
const usdzEx = new USDZExporter();

let products  = [];
let placed    = [];   // { mesh, id, name, sceneId }
let snapshots = [];   // for undo
let selected  = null;
let pending   = null; // loaded model waiting to be placed

/* ---- RESIZE ---- */
function resize() {
  const wrap = document.querySelector('.studio-wrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

/* ---- ANIMATE ---- */
(function loop() { requestAnimationFrame(loop); orbit.update(); renderer.render(scene, camera); })();

/* ---- LOAD MODEL ---- */
async function loadModel(item) {
  if (!item.glb) { toast('Pas de modele 3D', 'err'); return; }
  spin(true, 'Chargement...');
  try {
    const gltf = await new Promise(function(ok, fail) { loader.load(item.glb, ok, null, fail); });
    const mesh = gltf.scene;

    /* normalize scale */
    var box = new THREE.Box3().setFromObject(mesh);
    var mh  = box.max.y - box.min.y;
    var th  = item.h ? item.h / 100 : targetH(item.category);
    if (mh > 0) mesh.scale.setScalar(th / mh);

    /* floor anchor */
    var box2 = new THREE.Box3().setFromObject(mesh);
    mesh.position.y -= box2.min.y;

    /* shadows + color fix */
    mesh.traverse(function(c) {
      if (!c.isMesh) return;
      c.castShadow = c.receiveShadow = true;
      if (c.material) {
        if (c.material.map) c.material.map.colorSpace = THREE.SRGBColorSpace;
        c.material.needsUpdate = true;
      }
      c.userData.origMat = c.material;
    });

    var obj = { mesh:mesh, id:item.id||(''+Date.now()), name:item.name, icon:catIcon(item.category), sceneId:null };
    pending = obj;
    addTrayItem(obj, false);
    setStatus('Cliquez sur la scene pour placer ' + item.name, true);
    toast(item.name + ' charge - cliquez pour placer', 'ok');
    spin(false);
  } catch(e) {
    spin(false);
    toast('Erreur chargement: ' + e.message, 'err');
  }
}

/* ---- CLICK TO PLACE ---- */
var ray = new THREE.Raycaster();
canvas.addEventListener('click', function(e) {
  if (!pending) return;
  var rect = canvas.getBoundingClientRect();
  var nx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  var ny = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  ray.setFromCamera(new THREE.Vector2(nx, ny), camera);
  var hits = ray.intersectObject(floor);
  if (!hits.length) return;

  var m = pending.mesh.clone();
  m.position.copy(hits[0].point);
  /* fix floor anchor after clone */
  var b = new THREE.Box3().setFromObject(m);
  m.position.y -= b.min.y;
  m.traverse(function(c) {
    if (!c.isMesh) return;
    c.castShadow = c.receiveShadow = true;
    c.userData.origMat = c.material;
  });
  scene.add(m);

  var sid = Date.now();
  var p = { mesh:m, id:pending.id, name:pending.name, icon:pending.icon, sceneId:sid };
  placed.push(p);
  snapshots.push(p);

  /* mark tray */
  var tel = document.querySelector('.tray-item[data-id="' + pending.id + '"]');
  if (tel) { tel.dataset.sid = sid; tel.classList.add('placed'); }

  pending = null;
  selectObj(p);
  document.getElementById('undoBtn').classList.add('show');
  updateBadge();
  setStatus(placed.length + ' meuble' + (placed.length > 1 ? 's' : '') + ' - Cliquez pour selectionner');
  toast(p.name + ' place', 'ok');
  document.getElementById('hintTxt').textContent = 'Glissez pour deplacer - Cliquez pour selectionner';
});

/* ---- SELECT ON CLICK ---- */
canvas.addEventListener('click', function(e) {
  if (pending) return; /* handled above */
  var rect = canvas.getBoundingClientRect();
  var nx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  var ny = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  ray.setFromCamera(new THREE.Vector2(nx, ny), camera);
  var meshes = placed.map(function(o){ return o.mesh; });
  var hits = ray.intersectObjects(meshes, true);
  if (!hits.length) { selectObj(null); return; }
  var hit = hits[0].object;
  while (hit.parent && !placed.find(function(o){ return o.mesh === hit; })) hit = hit.parent;
  var found = placed.find(function(o){ return o.mesh === hit; });
  if (found) selectObj(found);
}, false);

/* ---- DRAG TO MOVE ---- */
var dragging = false, dragObj = null;
var dragPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
var dragStart = new THREE.Vector3();

canvas.addEventListener('mousedown', function(e) {
  if (!selected) return;
  var rect = canvas.getBoundingClientRect();
  var nx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  var ny = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  ray.setFromCamera(new THREE.Vector2(nx, ny), camera);
  var hits = ray.intersectObjects([selected.mesh], true);
  if (!hits.length) return;
  dragging = true;
  dragObj = selected;
  orbit.enabled = false;
  var pt = new THREE.Vector3();
  ray.ray.intersectPlane(dragPlane, pt);
  dragStart.copy(pt).sub(dragObj.mesh.position);
  e.preventDefault();
});

window.addEventListener('mousemove', function(e) {
  if (!dragging || !dragObj) return;
  var rect = canvas.getBoundingClientRect();
  var nx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  var ny = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  ray.setFromCamera(new THREE.Vector2(nx, ny), camera);
  var pt = new THREE.Vector3();
  ray.ray.intersectPlane(dragPlane, pt);
  dragObj.mesh.position.x = pt.x - dragStart.x;
  dragObj.mesh.position.z = pt.z - dragStart.z;
});

window.addEventListener('mouseup', function() {
  dragging = false; dragObj = null;
  orbit.enabled = true;
});

/* ---- TOUCH DRAG ---- */
var t0 = null, tDragging = false, tLastPinch = 0;
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    t0 = { x:e.touches[0].clientX, y:e.touches[0].clientY };
    tDragging = false;
  } else if (e.touches.length === 2) {
    tLastPinch = tPinch(e);
  }
}, { passive:false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (e.touches.length === 1 && t0 && selected) {
    var dx = e.touches[0].clientX - t0.x;
    var dy = e.touches[0].clientY - t0.y;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
      tDragging = true;
      var rect = canvas.getBoundingClientRect();
      var nx = (e.touches[0].clientX - rect.left) / rect.width * 2 - 1;
      var ny = -((e.touches[0].clientY - rect.top) / rect.height) * 2 + 1;
      ray.setFromCamera(new THREE.Vector2(nx, ny), camera);
      var pt = new THREE.Vector3();
      ray.ray.intersectPlane(dragPlane, pt);
      selected.mesh.position.x = pt.x;
      selected.mesh.position.z = pt.z;
      t0 = { x:e.touches[0].clientX, y:e.touches[0].clientY };
    }
  } else if (e.touches.length === 2 && selected) {
    var d = tPinch(e);
    var s = selected.mesh.scale.x * (d / tLastPinch);
    if (s > 0.05 && s < 12) selected.mesh.scale.setScalar(s);
    tLastPinch = d;
  }
}, { passive:false });

canvas.addEventListener('touchend', function(e) {
  if (!tDragging && t0 && e.changedTouches.length === 1) {
    var t = e.changedTouches[0];
    /* tap to select */
    var rect = canvas.getBoundingClientRect();
    var nx = (t.clientX - rect.left) / rect.width * 2 - 1;
    var ny = -((t.clientY - rect.top) / rect.height) * 2 + 1;
    ray.setFromCamera(new THREE.Vector2(nx, ny), camera);
    if (pending) {
      var hits2 = ray.intersectObject(floor);
      if (hits2.length) canvas.dispatchEvent(new MouseEvent('click', { clientX:t.clientX, clientY:t.clientY }));
    } else {
      var meshes2 = placed.map(function(o){ return o.mesh; });
      var hits3 = ray.intersectObjects(meshes2, true);
      if (hits3.length) {
        var h = hits3[0].object;
        while (h.parent && !placed.find(function(o){ return o.mesh===h; })) h = h.parent;
        var f = placed.find(function(o){ return o.mesh===h; });
        if (f) selectObj(f); else selectObj(null);
      } else { selectObj(null); }
    }
  }
  t0 = null; tDragging = false;
});

function tPinch(e) {
  var dx = e.touches[0].clientX - e.touches[1].clientX;
  var dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

/* ---- SELECT / HIGHLIGHT ---- */
function selectObj(obj) {
  if (selected) {
    selected.mesh.traverse(function(c) {
      if (c.isMesh && c.userData.origMat) c.material = c.userData.origMat;
    });
  }
  selected = obj;
  document.getElementById('objPanel').classList.toggle('show', !!obj);
  if (!obj) return;
  obj.mesh.traverse(function(c) {
    if (!c.isMesh) return;
    c.material = c.material.clone();
    c.material.emissive = new THREE.Color(0xB8986A);
    c.material.emissiveIntensity = 0.18;
  });
}

/* ---- CONTROLS ---- */
window.rotObj = function(d) {
  if (selected) selected.mesh.rotation.y += d * Math.PI / 180;
};
window.scaObj = function(f) {
  if (!selected) return;
  var s = selected.mesh.scale.x * f;
  if (s > 0.05 && s < 12) selected.mesh.scale.setScalar(s);
};
window.delObj = function() {
  if (!selected) return;
  scene.remove(selected.mesh);
  placed = placed.filter(function(o){ return o.sceneId !== selected.sceneId; });
  snapshots = snapshots.filter(function(o){ return o.sceneId !== selected.sceneId; });
  var tel = document.querySelector('.tray-item[data-sid="' + selected.sceneId + '"]');
  if (tel) tel.remove();
  selected = null;
  document.getElementById('objPanel').classList.remove('show');
  if (!snapshots.length) document.getElementById('undoBtn').classList.remove('show');
  updateBadge();
  setStatus(placed.length > 0 ? placed.length + ' meuble' + (placed.length > 1 ? 's' : '') + ' dans la scene' : 'Ajoutez des meubles pour commencer');
  toast('Meuble supprime');
};
window.undoLast = function() {
  if (!snapshots.length) return;
  var last = snapshots.pop();
  scene.remove(last.mesh);
  placed = placed.filter(function(o){ return o.sceneId !== last.sceneId; });
  if (selected && selected.sceneId === last.sceneId) {
    selected = null;
    document.getElementById('objPanel').classList.remove('show');
  }
  var tel = document.querySelector('.tray-item[data-sid="' + last.sceneId + '"]');
  if (tel) { tel.dataset.sid = ''; tel.classList.remove('placed'); }
  if (!snapshots.length) document.getElementById('undoBtn').classList.remove('show');
  updateBadge();
  toast('Annule: ' + last.name);
};

/* ---- EXPORT USDZ -> AR ---- */
window.exportAR = async function() {
  if (!placed.length) { toast('Ajoutez des meubles avant de lancer AR', 'err'); return; }
  spin(true, 'Generation USDZ...');
  try {
    var grp = new THREE.Group();
    placed.forEach(function(obj) {
      var clone = obj.mesh.clone();
      clone.position.copy(obj.mesh.position);
      clone.rotation.copy(obj.mesh.rotation);
      clone.scale.copy(obj.mesh.scale);
      clone.traverse(function(c) {
        if (!c.isMesh || !c.material) return;
        c.material = c.material.clone();
        if (c.material.map) {
          c.material.map.colorSpace = THREE.SRGBColorSpace;
          c.material.map.needsUpdate = true;
        }
      });
      grp.add(clone);
    });
    var buf  = await usdzEx.parse(grp, { maxTextureSize:1024 });
    spin(false);
    var blob = new Blob([buf], { type:'model/vnd.usdz+zip' });
    var url  = URL.createObjectURL(blob);
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      var a = document.createElement('a');
      a.setAttribute('rel', 'ar');
      a.href = url;
      a.appendChild(document.createElement('img'));
      document.body.appendChild(a);
      a.click();
      setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 5000);
      toast('Ouverture AR Quick Look...', 'ok');
    } else {
      var a2 = document.createElement('a');
      a2.href = url;
      a2.download = 'TadamHome-scene-' + Date.now() + '.usdz';
      a2.click();
      setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
      toast('Fichier USDZ telecharge', 'ok');
    }
  } catch(e) {
    spin(false);
    toast('Erreur: ' + e.message, 'err');
  }
};

/* ---- PHOTO ---- */
window.takePhoto = function() {
  renderer.render(scene, camera);
  var a = document.createElement('a');
  a.download = 'TadamHome-studio-' + Date.now() + '.jpg';
  a.href = canvas.toDataURL('image/jpeg', 0.92);
  a.click();
  toast('Photo enregistree', 'ok');
};

/* ---- CATALOGUE ---- */
async function loadCatalogue() {
  var res = await db.from('products').select('*').order('created_at', { ascending:false });
  products = (res.data || []).filter(function(p) { return p.model_glb_url; });
  renderCatGrid(products);
}

window.filterCat = function() {
  var q = document.getElementById('catSearch').value.toLowerCase();
  renderCatGrid(products.filter(function(p) {
    return (p.name||'').toLowerCase().includes(q) || (p.enseigne_name||'').toLowerCase().includes(q);
  }));
};

function renderCatGrid(list) {
  var g = document.getElementById('catGrid');
  if (!list.length) {
    g.innerHTML = '<div style="grid-column:1/-1;padding:24px;text-align:center;font-size:13px;color:var(--muted)">Aucun modele disponible</div>';
    return;
  }
  g.innerHTML = list.map(function(p) {
    var ic = catIcon(p.category);
    var imgHtml = (p.images && p.images[0])
      ? '<img src="' + p.images[0] + '" style="width:100%;height:100%;object-fit:cover"/>'
      : ic;
    return '<div class="cat-card">'
      + '<div class="cat-card-img">' + imgHtml + '</div>'
      + '<div class="cat-brand">' + (p.enseigne_name||'') + '</div>'
      + '<div class="cat-name">' + (p.name||'') + '</div>'
      + '<button class="cat-add" onclick="addFromCat(\'' + p.id + '\')">+ Ajouter</button>'
      + '</div>';
  }).join('');
}

window.addFromCat = async function(id) {
  var p = products.find(function(x){ return x.id === id; });
  if (!p) return;
  closeCat();
  await loadModel({ id:p.id, name:p.name, glb:p.model_glb_url, category:p.category, h:p.dimensions&&p.dimensions.h ? p.dimensions.h : null });
};

window.quickAdd = async function(btn, cat) {
  btn.classList.add('loading');
  var match = products.filter(function(p) { return (p.category||'').toLowerCase().includes(cat); });
  if (!match.length) { toast('Aucun ' + cat + ' disponible', 'err'); btn.classList.remove('loading'); return; }
  var p = match[0];
  await loadModel({ id:p.id, name:p.name, glb:p.model_glb_url, category:p.category, h:p.dimensions&&p.dimensions.h ? p.dimensions.h : null });
  btn.classList.remove('loading');
};

window.openCat  = function() { document.getElementById('catOverlay').classList.add('open'); };
window.closeCat = function() { document.getElementById('catOverlay').classList.remove('open'); };

/* ---- TRAY ---- */
function addTrayItem(item, isSel) {
  var tray = document.getElementById('tray');
  var d = document.createElement('div');
  d.className = 'tray-item' + (isSel ? ' sel' : '');
  d.dataset.id = item.id;
  d.innerHTML = '<div class="tray-thumb">' + item.icon + '</div><div class="tray-name">' + item.name + '</div>';
  d.addEventListener('click', function() {
    document.querySelectorAll('.tray-item').forEach(function(t){ t.classList.remove('sel'); });
    d.classList.add('sel');
    pending = item;
    setStatus('Cliquez sur la scene pour placer ' + item.name, true);
  });
  tray.appendChild(d);
}

/* ---- UTILS ---- */
function targetH(cat) {
  var h = { sofa:.85, canape:.85, fauteuil:.90, chaise:.90, table:.75, bureau:.75, luminaire:1.80, rangement:1.20, lit:.60 };
  return h[(cat||'').toLowerCase()] || 0.80;
}
function catIcon(cat) {
  var i = { sofa:'&#128763;', canape:'&#128763;', fauteuil:'&#129937;', chaise:'&#129937;', table:'&#129717;', luminaire:'&#128161;', rangement:'&#128230;', lit:'&#128719;' };
  return i[(cat||'').toLowerCase()] || '&#9671;';
}
function updateBadge() {
  var b = document.getElementById('arBadge');
  if (placed.length > 0) { b.textContent = placed.length; b.style.display = 'inline'; }
  else b.style.display = 'none';
}
function setStatus(txt, accent) {
  var s = document.getElementById('status');
  s.textContent = txt;
  s.className = 'status-bar' + (accent ? ' accent' : '');
}
var toastT;
function toast(txt, type) {
  var t = document.getElementById('toast');
  t.textContent = txt;
  t.className = 'on' + (type ? ' ' + type : '');
  clearTimeout(toastT);
  toastT = setTimeout(function() { t.className = ''; }, 3000);
}
function spin(show, txt) {
  document.getElementById('loader').className = show ? 'on' : '';
  if (txt) document.getElementById('loaderTxt').textContent = txt;
}

/* ---- INIT ---- */
loadCatalogue();

/* ---- LOAD FROM WALLET ---- */
var queue = JSON.parse(localStorage.getItem('tadam_ar_scene') || '[]');
if (queue.length) {
  localStorage.removeItem('tadam_ar_scene');
  queue.forEach(function(item) {
    if (item.glb) loadModel({ id:item.id, name:item.name, glb:item.glb, category:item.category, h:item.dimensions&&item.dimensions.h ? item.dimensions.h : null });
  });
}
</script>
