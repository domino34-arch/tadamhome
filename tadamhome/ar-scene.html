<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>TadamHome - Studio AR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F2EC;--ink:#1C1B18;--white:#FAFAF8;
  --accent:#B8986A;--acc3:#A07A4A;--muted:#8A8880;
  --border:rgba(28,27,24,.12);--green:#27704A;
  --serif:'Cormorant Garamond',serif;--sans:'Outfit',sans-serif;
}
html,body{height:100%;background:var(--bg);font-family:var(--sans);overflow:hidden}

/* TOPBAR */
.topbar{height:52px;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 10px;flex-shrink:0;padding-top:env(safe-area-inset-top,0);gap:6px}
.topbar-left{display:flex;align-items:center;gap:8px;flex-shrink:0;min-width:0}
.topbar-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.t-logo{height:18px;object-fit:contain;flex-shrink:0}
.t-sep{width:1px;height:16px;background:rgba(255,255,255,.15);flex-shrink:0}
.t-label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3);font-family:var(--sans);white-space:nowrap}
/* All buttons = icon only on mobile, label on larger screens */
.t-btn{display:flex;align-items:center;justify-content:center;gap:4px;width:34px;height:34px;padding:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--white);font-family:var(--sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;position:relative}
.t-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;flex-shrink:0}
.t-btn-lbl{display:none} /* hidden on mobile */
.t-btn:hover{background:rgba(184,152,106,.2);border-color:var(--accent);color:var(--accent)}
.t-btn.ar{width:auto;padding:0 10px;background:rgba(39,112,74,.25);border-color:rgba(39,112,74,.5);color:#6dcf95}
.t-btn.ar:hover{background:rgba(39,112,74,.4)}
.t-btn.ar .t-btn-lbl{display:inline;font-size:10px;letter-spacing:.08em}
.t-badge{background:var(--green);color:#fff;font-size:8px;font-weight:600;padding:1px 4px;border-radius:8px;font-family:var(--sans);display:none;flex-shrink:0}
.t-badge.on{display:inline}
.t-icon-btn{width:34px;height:34px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--white);transition:all .2s;flex-shrink:0}
.t-icon-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
.t-icon-btn:hover{background:rgba(255,255,255,.18)}
@media (min-width:500px){
  .t-btn{width:auto;padding:0 10px;gap:5px}
  .t-btn-lbl{display:inline}
  .topbar{padding:0 14px}
}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.studio{flex:1;position:relative;overflow:hidden;min-height:0}
#c{display:block;width:100%;height:100%;touch-action:none;cursor:grab}
#c:active{cursor:grabbing}

/* STATUS */
.status{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(28,27,24,.78);backdrop-filter:blur(8px);padding:6px 14px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.7);white-space:nowrap;border:1px solid rgba(255,255,255,.1);pointer-events:none;max-width:90%;overflow:hidden;text-overflow:ellipsis}
.status.accent{color:var(--accent);border-color:rgba(184,152,106,.3)}

/* SELECTED NAME TAG */
.sel-tag{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(28,27,24,.85);backdrop-filter:blur(8px);padding:5px 14px;font-size:11px;color:var(--white);letter-spacing:.05em;opacity:0;transition:opacity .2s;pointer-events:none;border-left:2px solid var(--accent);white-space:nowrap}
.sel-tag.on{opacity:1}

/* DELETE BUTTON */
.del-fab{position:absolute;bottom:74px;right:12px;width:40px;height:40px;background:rgba(192,57,43,.9);backdrop-filter:blur(8px);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;opacity:0;pointer-events:none;transition:all .25s;box-shadow:0 2px 10px rgba(192,57,43,.4)}
.del-fab.on{opacity:1;pointer-events:all}
.del-fab svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}

/* UNDO */
.undo-fab{position:absolute;bottom:74px;left:12px;width:40px;height:40px;background:rgba(250,250,248,.92);backdrop-filter:blur(8px);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;pointer-events:none;transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.undo-fab.on{opacity:1;pointer-events:all}
.undo-fab svg{width:15px;height:15px;fill:none;stroke:var(--muted);stroke-width:1.8;stroke-linecap:round}

/* BOTTOM */
.bottom{background:var(--white);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.tray-row{display:flex;align-items:center;gap:8px;padding:10px 14px;overflow-x:auto;scrollbar-width:none}
.tray-row::-webkit-scrollbar{display:none}
.tray-add{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.tray-add-box{width:52px;height:52px;border:1.5px dashed rgba(184,152,106,.45);background:rgba(184,152,106,.05);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--accent);transition:all .2s}
.tray-add-box:hover{border-color:var(--accent);background:rgba(184,152,106,.12)}
.tray-lbl{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.tray-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;position:relative}
.tray-thumb{width:52px;height:52px;border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;overflow:hidden}
.tray-thumb img{width:100%;height:100%;object-fit:cover}
.tray-item.sel .tray-thumb{border-color:var(--accent);background:rgba(184,152,106,.1)}
.tray-item.placed .tray-thumb::after{content:"";position:absolute;top:-4px;right:-4px;width:12px;height:12px;background:var(--green);border-radius:50%;border:1.5px solid var(--white)}
.tray-name{font-size:8px;letter-spacing:.04em;color:var(--muted);max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.tray-hint{font-size:9px;letter-spacing:.06em;color:var(--muted);padding:0 14px 8px;text-align:center;text-transform:uppercase}

/* CATALOGUE */
#catOv{position:fixed;inset:0;z-index:100;background:rgba(28,27,24,.55);backdrop-filter:blur(6px);display:none;flex-direction:column}
#catOv.open{display:flex}
.cov-head{background:var(--white);padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding-top:calc(12px + env(safe-area-inset-top,0))}
.cov-title{font-family:var(--serif);font-size:20px;font-weight:400}
.cov-title em{font-style:italic;color:var(--accent)}
.cov-x{background:none;border:1px solid var(--border);width:30px;height:30px;cursor:pointer;font-size:13px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.cov-body{flex:1;overflow-y:auto;padding:12px;background:var(--bg)}
.cov-search{display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--white);padding:9px 12px;margin-bottom:10px}
.cov-search svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:1.5;flex-shrink:0}
.cov-search input{border:none;outline:none;background:transparent;font-family:var(--sans);font-size:13px;color:var(--ink);flex:1;font-weight:300}
.cov-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--border)}
.cov-card{background:var(--white);padding:12px;display:flex;flex-direction:column;gap:5px}
.cov-img{aspect-ratio:4/3;background:#EDEAE2;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.cov-img img{width:100%;height:100%;object-fit:cover}
.cov-brand{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.cov-name{font-family:var(--serif);font-size:15px;color:var(--ink)}
.cov-btn{padding:8px;background:var(--ink);color:var(--white);border:none;font-family:var(--sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;width:100%}
.cov-btn:hover,.cov-btn.added{background:var(--accent)}

/* LOADER + TOAST */
#ldr{position:fixed;inset:0;z-index:200;background:rgba(245,242,236,.88);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#ldr.on{display:flex}
.spin{width:32px;height:32px;border:2px solid rgba(184,152,106,.2);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
.spin-txt{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
@keyframes sp{to{transform:rotate(360deg)}}
#tst{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%) translateY(6px);background:var(--ink);color:var(--white);padding:9px 16px;font-size:11px;letter-spacing:.05em;opacity:0;transition:all .3s;z-index:300;border-left:2px solid var(--accent);white-space:nowrap;pointer-events:none}
#tst.on{opacity:1;transform:translateX(-50%) translateY(0)}
#tst.ok{border-left-color:var(--green)}
#tst.err{border-left-color:#C0392B}
</style>
</head>
<body>
<div class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <img src="logo_blanc.png" class="t-logo" alt="TadamHome" onerror="this.outerHTML='<span style=font-size:15px;color:#fff;font-family:serif>TadamHome</span>'"/>
      <div class="t-sep"></div>
      <div class="t-label">Studio AR</div>
    </div>
    <div class="topbar-right">
      <button class="t-btn" onclick="doPhoto()" title="Photo">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span class="t-btn-lbl">Photo</span>
      </button>
      <button class="t-btn ar" onclick="doExportAR()" title="Voir en AR">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        <span class="t-btn-lbl">Voir en AR</span>
        <span class="t-badge" id="badge">0</span>
      </button>
      <div class="t-icon-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
  </div>

  <!-- STUDIO -->
  <div class="studio">
    <canvas id="c"></canvas>
    <div class="status" id="st">Ajoutez des meubles pour commencer</div>
    <div class="sel-tag" id="selTag"></div>
    <!-- DELETE FAB -->
    <button class="del-fab" id="delFab" onclick="doDelete()">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
    </button>
    <!-- UNDO FAB -->
    <button class="undo-fab" id="undoFab" onclick="doUndo()">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
    </button>
  </div>

  <!-- BOTTOM TRAY -->
  <div class="bottom">
    <div class="tray-row" id="tray">
      <div class="tray-add" onclick="openCat()">
        <div class="tray-add-box">+</div>
        <div class="tray-lbl">Ajouter</div>
      </div>
    </div>
    <div class="tray-hint" id="trayHint">Appuyez sur + pour choisir un meuble</div>
  </div>
</div>

<!-- CATALOGUE -->
<div id="catOv">
  <div class="cov-head">
    <div class="cov-title">Choisir un <em>meuble</em></div>
    <button class="cov-x" onclick="closeCat()">x</button>
  </div>
  <div class="cov-body">
    <div class="cov-search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="csrch" placeholder="Rechercher..." oninput="filterCat()"/>
    </div>
    <div class="cov-grid" id="cgrid">
      <div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--muted);font-size:13px">Chargement...</div>
    </div>
  </div>
</div>

<div id="ldr"><div class="spin"></div><div class="spin-txt" id="ltxt">Chargement...</div></div>
<div id="tst"></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }   from 'three/addons/loaders/GLTFLoader.js';
import { USDZExporter } from 'three/addons/exporters/USDZExporter.js';

/* SUPABASE */
const sb = supabase.createClient(
  'https://wbunwfxecvxngypuehop.supabase.co',
  'sb_publishable_whNXpZBu7hbDWxZ-foYFUQ_WSEiIl1P'
);

/* THREE */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, preserveDrawingBuffer:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xEEEBE3);
scene.fog = new THREE.FogExp2(0xEEEBE3, 0.04);

const camera = new THREE.PerspectiveCamera(48, 1, 0.01, 80);
camera.position.set(3, 2.2, 3);

/* FIXED CAMERA ORBIT - horizontal only, locked elevation */
var camTheta = Math.PI * 0.25; /* horizontal angle */
var camElev  = 0.55;           /* vertical elevation in radians — now controllable */
var camDist  = 4.5;            /* distance from center */
var camTarget = new THREE.Vector3(0, 0, 0);

function applyCamera() {
  camera.position.x = camTarget.x + camDist * Math.sin(camTheta) * Math.cos(camElev);
  camera.position.y = camTarget.y + camDist * Math.sin(camElev);
  camera.position.z = camTarget.z + camDist * Math.cos(camTheta) * Math.cos(camElev);
  camera.lookAt(camTarget);
}
applyCamera();

/* LIGHTS */
scene.add(new THREE.AmbientLight(0xffffff, 1.0));
var sun = new THREE.DirectionalLight(0xfffbf0, 2.2);
sun.position.set(5, 10, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far  = 40;
[-8, 8].forEach(function(v) { sun.shadow.camera.left = sun.shadow.camera.bottom = -8; sun.shadow.camera.right = sun.shadow.camera.top = 8; });
sun.shadow.bias = -0.001;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xfaf5eb, 0xcfc5b4, 0.7));

/* FLOOR - fixed in world space, never moves */
var floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(14, 14),
  new THREE.MeshLambertMaterial({ color:0xE4DFD6 })
);
floorMesh.rotation.x = -Math.PI / 2;
floorMesh.receiveShadow = true;
floorMesh.name = 'floor';
scene.add(floorMesh);

var grid = new THREE.GridHelper(14, 28, 0xBCB09A, 0xBCB09A);
grid.material.opacity = 0.35;
grid.material.transparent = true;
grid.name = 'grid';
scene.add(grid);

/* FLOOR PLANE for raycasting */
var groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

/* RESIZE */
function resize() {
  var w = canvas.parentElement.clientWidth;
  var h = canvas.parentElement.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

/* ANIMATE */
(function loop() { requestAnimationFrame(loop); renderer.render(scene, camera); })();

/* STATE */
var gltfLoader = new GLTFLoader();
var usdzEx     = new USDZExporter();
var raycaster  = new THREE.Raycaster();
var products   = [];
var placed     = []; /* { mesh, id, name, sceneId, icon, imgUrl } */
var snapList   = []; /* for undo */
var selected   = null;
var pending    = null; /* model ready to be placed by next tap */

/* ============================
   TOUCH STATE
   We handle ALL touch ourselves:
   - 1 finger, no selection = orbit camera (horizontal only)
   - 1 finger on selected obj = drag object
   - 2 fingers, selected obj = rotate object
   - 2 fingers, no selection = pinch zoom camera
   ============================ */
var t0 = null, t1 = null;
var orbitStart = null;
var tDragging  = false;
var tPinch0    = 0;
var tAngle0    = 0;
var tMode      = 'none'; /* 'orbit' | 'drag' | 'rotate' | 'zoom' */

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    t0 = { x:e.touches[0].clientX, y:e.touches[0].clientY, t:Date.now() };
    tDragging = false;
    tMode = 'none';
    orbitStart = { theta:camTheta, elev:camElev, x:e.touches[0].clientX, y:e.touches[0].clientY };
  } else if (e.touches.length === 2) {
    t0 = { x:e.touches[0].clientX, y:e.touches[0].clientY };
    t1 = { x:e.touches[1].clientX, y:e.touches[1].clientY };
    tPinch0 = getPinch(e);
    tAngle0 = getAngle(e);
    tMode = selected ? 'rotate' : 'zoom';
  }
}, { passive:false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (e.touches.length === 1 && t0) {
    var dx = e.touches[0].clientX - t0.x;
    var dy = e.touches[0].clientY - t0.y;
    if (!tDragging && Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
    tDragging = true;

    if (selected && tMode !== 'orbit') {
      /* drag selected object on ground */
      tMode = 'drag';
      var nx = (e.touches[0].clientX / canvas.parentElement.clientWidth) * 2 - 1;
      var ny = -((e.touches[0].clientY / canvas.parentElement.clientHeight) * 2 - 1);
      raycaster.setFromCamera(new THREE.Vector2(nx, ny), camera);
      var pt = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(groundPlane, pt)) {
        selected.mesh.position.x = pt.x;
        selected.mesh.position.z = pt.z;
        var bx = new THREE.Box3().setFromObject(selected.mesh);
        if (bx.min.y < 0) selected.mesh.position.y -= bx.min.y;
      }
    } else {
      /* orbit camera - horizontal only */
      tMode = 'orbit';
      camTheta = orbitStart.theta - (e.touches[0].clientX - orbitStart.x) * 0.007;
      camElev  = Math.max(0.05, Math.min(Math.PI / 2 - 0.05,
        orbitStart.elev + (e.touches[0].clientY - orbitStart.y) * 0.006));
      applyCamera();
    }
  } else if (e.touches.length === 2) {
    if (tMode === 'rotate' && selected) {
      /* rotate selected object with 2 fingers */
      var da = getAngle(e) - tAngle0;
      selected.mesh.rotation.y -= da;
      tAngle0 = getAngle(e);
    } else if (tMode === 'zoom') {
      /* pinch zoom camera distance */
      var dp = getPinch(e);
      camDist = Math.max(1, Math.min(12, camDist * (tPinch0 / dp)));
      tPinch0 = dp;
      applyCamera();
    }
  }
}, { passive:false });

canvas.addEventListener('touchend', function(e) {
  if (!tDragging && t0 && e.changedTouches.length === 1 && (Date.now() - t0.t) < 280) {
    handleTap(e.changedTouches[0]);
  }
  if (e.touches.length === 0) { t0 = null; t1 = null; tDragging = false; tMode = 'none'; }
}, { passive:false });

function getPinch(e) {
  var dx = e.touches[0].clientX - e.touches[1].clientX;
  var dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}
function getAngle(e) {
  return Math.atan2(
    e.touches[1].clientY - e.touches[0].clientY,
    e.touches[1].clientX - e.touches[0].clientX
  );
}

/* MOUSE for desktop */
var mDown = false, mDragging = false, mOrbitStart = null, mObjDrag = false;
canvas.addEventListener('mousedown', function(e) {
  mDown = true; mDragging = false;
  var nx = (e.clientX / canvas.parentElement.clientWidth) * 2 - 1;
  var ny = -((e.clientY / canvas.parentElement.clientHeight) * 2 - 1);
  raycaster.setFromCamera(new THREE.Vector2(nx, ny), camera);
  if (selected) {
    var hits = raycaster.intersectObjects([selected.mesh], true);
    if (hits.length) { mObjDrag = true; return; }
  }
  mObjDrag = false;
  mOrbitStart = { theta:camTheta, elev:camElev, x:e.clientX, y:e.clientY };
});
window.addEventListener('mousemove', function(e) {
  if (!mDown) return;
  mDragging = true;
  if (mObjDrag && selected) {
    var nx = (e.clientX / canvas.parentElement.clientWidth) * 2 - 1;
    var ny = -((e.clientY / canvas.parentElement.clientHeight) * 2 - 1);
    raycaster.setFromCamera(new THREE.Vector2(nx, ny), camera);
    var pt = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(groundPlane, pt)) {
      selected.mesh.position.x = pt.x;
      selected.mesh.position.z = pt.z;
    }
  } else if (mOrbitStart) {
    camTheta = mOrbitStart.theta - (e.clientX - mOrbitStart.x) * 0.007;
    camElev  = Math.max(0.05, Math.min(Math.PI / 2 - 0.05,
      mOrbitStart.elev + (e.clientY - mOrbitStart.y) * 0.006));
    applyCamera();
  }
});
window.addEventListener('mouseup', function(e) {
  if (!mDragging && mDown) handleMouseClick(e);
  mDown = false; mDragging = false; mObjDrag = false;
});
canvas.addEventListener('wheel', function(e) {
  camDist = Math.max(1, Math.min(12, camDist + e.deltaY * 0.005));
  applyCamera();
}, { passive:true });

function handleMouseClick(e) {
  var nx = (e.clientX / canvas.parentElement.clientWidth) * 2 - 1;
  var ny = -((e.clientY / canvas.parentElement.clientHeight) * 2 - 1);
  raycaster.setFromCamera(new THREE.Vector2(nx, ny), camera);
  if (pending) {
    var hf = raycaster.intersectObject(floorMesh);
    if (hf.length) { doPlace(hf[0].point); return; }
  }
  var meshes = placed.map(function(o){ return o.mesh; });
  var hits = raycaster.intersectObjects(meshes, true);
  if (hits.length) {
    var m = hits[0].object;
    while (m.parent && !placed.find(function(o){ return o.mesh===m; })) m = m.parent;
    var f = placed.find(function(o){ return o.mesh===m; });
    if (f) { selectObj(f); return; }
  }
  selectObj(null);
}
function handleTap(t) {
  var nx = (t.clientX / canvas.parentElement.clientWidth) * 2 - 1;
  var ny = -((t.clientY / canvas.parentElement.clientHeight) * 2 - 1);
  raycaster.setFromCamera(new THREE.Vector2(nx, ny), camera);
  if (pending) {
    var hf = raycaster.intersectObject(floorMesh);
    if (hf.length) { doPlace(hf[0].point); return; }
  }
  var meshes = placed.map(function(o){ return o.mesh; });
  var hits = raycaster.intersectObjects(meshes, true);
  if (hits.length) {
    var m = hits[0].object;
    while (m.parent && !placed.find(function(o){ return o.mesh===m; })) m = m.parent;
    var f = placed.find(function(o){ return o.mesh===m; });
    if (f) { selectObj(f); return; }
  }
  selectObj(null);
}

/* PLACE */
function doPlace(pt) {
  var m = pending.mesh.clone();
  m.position.set(pt.x, 0, pt.z);
  /* re-anchor to floor */
  var b = new THREE.Box3().setFromObject(m);
  m.position.y -= b.min.y;
  m.traverse(function(c) {
    if (!c.isMesh) return;
    c.castShadow = c.receiveShadow = true;
    c.userData.origMat = c.material;
  });
  scene.add(m);
  var sid = Date.now();
  var p = { mesh:m, id:pending.id, name:pending.name, icon:pending.icon, imgUrl:pending.imgUrl, sceneId:sid };
  placed.push(p);
  snapList.push(p);
  /* mark tray */
  var tel = document.querySelector('.tray-item[data-id="' + pending.id + '"]');
  if (tel) { tel.dataset.sid = sid; tel.classList.add('placed'); }
  pending = null;
  selectObj(p);
  document.getElementById('undoFab').classList.add('on');
  updateBadge();
  setStatus(placed.length + ' meuble' + (placed.length > 1 ? 's' : '') + ' - Touchez pour selectionner');
  document.getElementById('trayHint').textContent = 'Glissez pour deplacer - 2 doigts pour pivoter';
  toast(p.name + ' place', 'ok');
}

/* SELECT */
function selectObj(obj) {
  if (selected) {
    selected.mesh.traverse(function(c) {
      if (c.isMesh && c.userData.origMat) c.material = c.userData.origMat;
    });
  }
  selected = obj;
  var panel = document.getElementById('delFab');
  var tag   = document.getElementById('selTag');
  panel.classList.toggle('on', !!obj);
  tag.classList.toggle('on', !!obj);
  if (obj) tag.textContent = obj.name;
}

/* DELETE */
window.doDelete = function() {
  if (!selected) return;
  scene.remove(selected.mesh);
  placed   = placed.filter(function(o){ return o.sceneId !== selected.sceneId; });
  snapList = snapList.filter(function(o){ return o.sceneId !== selected.sceneId; });
  var tel = document.querySelector('.tray-item[data-sid="' + selected.sceneId + '"]');
  if (tel) { tel.removeAttribute('data-sid'); tel.classList.remove('placed'); }
  selected = null;
  document.getElementById('delFab').classList.remove('on');
  document.getElementById('selTag').classList.remove('on');
  if (!snapList.length) document.getElementById('undoFab').classList.remove('on');
  updateBadge();
  setStatus(placed.length > 0 ? placed.length + ' meuble' + (placed.length > 1 ? 's' : '') : 'Ajoutez des meubles pour commencer');
  toast('Meuble supprime');
};

/* UNDO */
window.doUndo = function() {
  if (!snapList.length) return;
  var last = snapList.pop();
  scene.remove(last.mesh);
  placed = placed.filter(function(o){ return o.sceneId !== last.sceneId; });
  if (selected && selected.sceneId === last.sceneId) {
    selected = null;
    document.getElementById('delFab').classList.remove('on');
    document.getElementById('selTag').classList.remove('on');
  }
  var tel = document.querySelector('.tray-item[data-sid="' + last.sceneId + '"]');
  if (tel) { tel.removeAttribute('data-sid'); tel.classList.remove('placed'); }
  if (!snapList.length) document.getElementById('undoFab').classList.remove('on');
  updateBadge();
  toast('Annule: ' + last.name);
};

/* LOAD GLB */
async function loadModel(item) {
  spin(true, 'Chargement ' + item.name + '...');
  try {
    var gltf = await new Promise(function(ok, fail) {
      gltfLoader.load(item.glb, ok, null, fail);
    });
    var mesh = gltf.scene;

    /* real 1:1 scale based on stored dimensions or category */
    var box = new THREE.Box3().setFromObject(mesh);
    var mh  = box.max.y - box.min.y;
    var th  = item.h ? (item.h / 100) : realH(item.category);
    if (mh > 0.001) mesh.scale.setScalar(th / mh);

    /* anchor to floor */
    var box2 = new THREE.Box3().setFromObject(mesh);
    mesh.position.y -= box2.min.y;

    /* fix textures + shadows */
    mesh.traverse(function(c) {
      if (!c.isMesh) return;
      c.castShadow = c.receiveShadow = true;
      if (!c.material) return;
      /* preserve all texture types */
      var mat = c.material;
      ['map','normalMap','roughnessMap','metalnessMap','emissiveMap','aoMap'].forEach(function(k) {
        if (mat[k]) { mat[k].colorSpace = THREE.SRGBColorSpace; mat[k].needsUpdate = true; }
      });
      mat.needsUpdate = true;
      c.userData.origMat = c.material;
    });

    pending = { mesh:mesh, id:item.id, name:item.name, icon:item.icon || '&#9671;', imgUrl:item.imgUrl || null };
    spin(false);
    setStatus('Touchez le sol pour placer ' + item.name, true);
    toast(item.name + ' charge - touchez le sol pour placer', 'ok');
  } catch(e) {
    spin(false);
    toast('Erreur: ' + e.message, 'err');
  }
}

/* EXPORT USDZ */
window.doExportAR = async function() {
  if (!placed.length) { toast('Ajoutez des meubles d\'abord', 'err'); return; }
  spin(true, 'Generation USDZ...');
  try {
    var grp = new THREE.Group();
    placed.forEach(function(obj) {
      var cl = obj.mesh.clone();
      cl.position.copy(obj.mesh.position);
      cl.rotation.copy(obj.mesh.rotation);
      cl.scale.copy(obj.mesh.scale);
      cl.traverse(function(c) {
        if (!c.isMesh || !c.material) return;
        c.material = c.material.clone();
        if (c.material.map) { c.material.map.colorSpace = THREE.SRGBColorSpace; c.material.map.needsUpdate = true; }
      });
      grp.add(cl);
    });
    var buf  = await usdzEx.parse(grp, { maxTextureSize:1024 });
    spin(false);
    var blob = new Blob([buf], { type:'model/vnd.usdz+zip' });
    var url  = URL.createObjectURL(blob);
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      var a = document.createElement('a');
      a.setAttribute('rel', 'ar');
      a.href = url;
      a.appendChild(document.createElement('img'));
      document.body.appendChild(a);
      a.click();
      setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 6000);
      toast('Ouverture AR Quick Look...', 'ok');
    } else {
      var a2 = document.createElement('a');
      a2.href = url;
      a2.download = 'TadamHome-scene-' + Date.now() + '.usdz';
      a2.click();
      setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
      toast('Fichier USDZ telecharge', 'ok');
    }
  } catch(e) {
    spin(false);
    toast('Erreur export: ' + e.message, 'err');
  }
};

/* PHOTO */
window.doPhoto = function() {
  renderer.render(scene, camera);
  var a = document.createElement('a');
  a.download = 'TadamHome-' + Date.now() + '.jpg';
  a.href = canvas.toDataURL('image/jpeg', 0.92);
  a.click();
  toast('Photo enregistree', 'ok');
};

/* CATALOGUE */
async function loadCatalogue() {
  var res = await sb.from('products').select('*').order('created_at', { ascending:false });
  products = (res.data || []).filter(function(p) { return p.model_glb_url; });
  renderGrid(products);
}
window.filterCat = function() {
  var q = document.getElementById('csrch').value.toLowerCase();
  renderGrid(products.filter(function(p) {
    return (p.name||'').toLowerCase().includes(q) || (p.enseigne_name||'').toLowerCase().includes(q);
  }));
};
function renderGrid(list) {
  var g = document.getElementById('cgrid');
  if (!list.length) { g.innerHTML = '<div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--muted);font-size:13px">Aucun modele</div>'; return; }
  g.innerHTML = list.map(function(p) {
    var imgHtml = (p.images && p.images[0])
      ? '<img src="' + p.images[0] + '" style="width:100%;height:100%;object-fit:cover"/>'
      : catIco(p.category);
    return '<div class="cov-card">'
      + '<div class="cov-img">' + imgHtml + '</div>'
      + '<div class="cov-brand">' + (p.enseigne_name||'') + '</div>'
      + '<div class="cov-name">' + (p.name||'') + '</div>'
      + '<button class="cov-btn" onclick="addFromCat(\'' + p.id + '\')">+ Ajouter</button>'
      + '</div>';
  }).join('');
}
window.addFromCat = async function(id) {
  var p = products.find(function(x){ return x.id===id; });
  if (!p) return;
  closeCat();
  var trayImg = (p.images && p.images[0]) ? p.images[0] : null;
  await loadModel({
    id: p.id, name: p.name,
    glb: p.model_glb_url,
    category: p.category,
    h: p.dimensions && p.dimensions.h ? p.dimensions.h : null,
    icon: catIco(p.category),
    imgUrl: trayImg
  });
  addTrayItem({ id:p.id, name:p.name, icon:catIco(p.category), imgUrl:trayImg });
};
window.openCat  = function() { document.getElementById('catOv').classList.add('open'); };
window.closeCat = function() { document.getElementById('catOv').classList.remove('open'); };

/* TRAY */
function addTrayItem(item) {
  var tray = document.getElementById('tray');
  /* avoid duplicates */
  if (document.querySelector('.tray-item[data-id="' + item.id + '"]')) return;
  var d = document.createElement('div');
  d.className = 'tray-item sel';
  d.dataset.id = item.id;
  var thumbHtml = item.imgUrl
    ? '<img src="' + item.imgUrl + '" style="width:100%;height:100%;object-fit:cover"/>'
    : item.icon;
  d.innerHTML = '<div class="tray-thumb">' + thumbHtml + '</div><div class="tray-name">' + item.name + '</div>';
  d.addEventListener('click', function() {
    document.querySelectorAll('.tray-item').forEach(function(t){ t.classList.remove('sel'); });
    d.classList.add('sel');
    if (pending && pending.id === item.id) {
      setStatus('Touchez le sol pour placer ' + item.name, true);
    }
  });
  tray.appendChild(d);
}

/* UTILS */
function realH(cat) {
  var h = { sofa:.85, canape:.85, fauteuil:.90, chaise:.90,
            'table basse':.45, table:.75, bureau:.75,
            luminaire:1.70, rangement:1.20, lit:.55 };
  return h[(cat||'').toLowerCase()] || 0.80;
}
function catIco(cat) {
  var i = { sofa:'&#128763;', canape:'&#128763;', fauteuil:'&#129937;', chaise:'&#129937;',
            table:'&#129717;', luminaire:'&#128161;', rangement:'&#128230;', lit:'&#128719;' };
  return i[(cat||'').toLowerCase()] || '&#9671;';
}
function updateBadge() {
  var b = document.getElementById('badge');
  if (placed.length > 0) { b.textContent = placed.length; b.classList.add('on'); }
  else b.classList.remove('on');
}
function setStatus(txt, accent) {
  var s = document.getElementById('st');
  s.textContent = txt;
  s.className = 'status' + (accent ? ' accent' : '');
}
var tT;
function toast(txt, type) {
  var t = document.getElementById('tst');
  t.textContent = txt;
  t.className = 'on' + (type ? ' ' + type : '');
  clearTimeout(tT);
  tT = setTimeout(function() { t.className = ''; }, 3000);
}
function spin(show, txt) {
  document.getElementById('ldr').className = show ? 'on' : '';
  if (txt) document.getElementById('ltxt').textContent = txt;
}

/* INIT */
loadCatalogue();
var q = JSON.parse(localStorage.getItem('tadam_ar_scene') || '[]');
if (q.length) {
  localStorage.removeItem('tadam_ar_scene');
  q.forEach(function(item) {
    if (item.glb) {
      loadModel({ id:item.id, name:item.name, glb:item.glb, category:item.category,
                  h: item.dimensions && item.dimensions.h ? item.dimensions.h : null,
                  icon: catIco(item.category) });
      addTrayItem({ id:item.id, name:item.name, icon:catIco(item.category) });
    }
  });
}
</script>
