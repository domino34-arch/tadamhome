/* TRAY */
function addTrayItem(item) {
  const tray = document.getElementById('tray');
  if (document.querySelector('.tray-item[data-id="' + item.id + '"]')) return;
  const d = document.createElement('div');
  d.className = 'tray-item sel';
  d.dataset.id = item.id;
  const thumbHtml = item.imgUrl
    ? '<img src="' + item.imgUrl + '" style="width:100%;height:100%;object-fit:cover"/>'
    : item.icon;
  d.innerHTML = '<div class="tray-thumb">' + thumbHtml + '</div><div class="tray-name">' + item.name + '</div>';
  d.addEventListener('click', () => {
    document.querySelectorAll('.tray-item').forEach(t => t.classList.remove('sel'));
    d.classList.add('sel');
    if (pending && pending.id === item.id) {
      setStatus('Touchez le sol pour placer ' + item.name, true);
    }
  });
  tray.appendChild(d);
}

/* UTILS */
function realH(cat) {
  const h = { sofa:.85, canape:.85, fauteuil:.90, chaise:.90,
              'table basse':.45, table:.75, bureau:.75,
              luminaire:1.70, rangement:1.20, lit:.55 };
  return h[(cat||'').toLowerCase()] || 0.80;
}
function catIco(cat) {
  const i = { sofa:'\uD83D\uDECB', canape:'\uD83D\uDECB', fauteuil:'\uD83E\uDE91', chaise:'\uD83E\uDE91',
              table:'\uD83E\uDD55', luminaire:'\uD83D\uDCA1', rangement:'\uD83D\uDCE6', lit:'\uD83D\uDECF' };
  return i[(cat||'').toLowerCase()] || '\u25C7';
}
function updateBadge() {
  const b = document.getElementById('badge');
  if (placed.length > 0) { b.textContent = placed.length; b.classList.add('on'); }
  else b.classList.remove('on');
}
function setStatus(txt, accent) {
  const s = document.getElementById('st');
  s.textContent = txt;
  s.className = 'status' + (accent ? ' accent' : '');
}
let tT;
function toast(txt, type) {
  const t = document.getElementById('tst');
  t.textContent = txt;
  t.className = 'on' + (type ? ' ' + type : '');
  clearTimeout(tT);
  tT = setTimeout(() => { t.className = ''; }, 3000);
}
function spin(show, txt) {
  document.getElementById('ldr').className = show ? 'on' : '';
  if (txt) document.getElementById('ltxt').textContent = txt;
}

/* SCENES — save / load / delete */
const SCENES_KEY = 'tadam_saved_scenes';

function listScenes() {
  try { return JSON.parse(localStorage.getItem(SCENES_KEY) || '[]'); }
  catch(e) { return []; }
}
function persistScenes(arr) {
  try {
    localStorage.setItem(SCENES_KEY, JSON.stringify(arr));
    return true;
  } catch(e) {
    toast('Espace de stockage plein', 'err');
    console.warn(e);
    return false;
  }
}
function captureThumbnail(maxW, maxH) {
  renderer.render(scene, activeCam);
  const sw = canvas.width;
  const sh = canvas.height;
  const k  = Math.min(maxW / sw, maxH / sh, 1);
  const tw = Math.max(1, Math.round(sw * k));
  const th = Math.max(1, Math.round(sh * k));
  const c = document.createElement('canvas');
  c.width = tw; c.height = th;
  const ctx = c.getContext('2d');
  ctx.drawImage(canvas, 0, 0, tw, th);
  try { return c.toDataURL('image/jpeg', 0.65); }
  catch(_) { return null; }
}

window.openScenes = function() {
  document.getElementById('scnNameInput').value = '';
  renderScenesModal();
  document.getElementById('scnOv').classList.add('open');
};
window.closeScenes = function() {
  document.getElementById('scnOv').classList.remove('open');
};

window.saveScene = function() {
  if (!placed.length) {
    toast('Aucun meuble a sauvegarder', 'err');
    return;
  }
  const input = document.getElementById('scnNameInput');
  let name = (input.value || '').trim();
  if (!name) {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    name = 'Scene ' + pad(d.getDate()) + '/' + pad(d.getMonth() + 1)
         + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  const thumb = captureThumbnail(280, 180);

  const scn = {
    id: 'scene_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
    name,
    savedAt: Date.now(),
    thumb,
    items: placed.map((p) => {
      const prod = products.find(x => x.id === p.id);
      return {
        productId: p.id,
        name: p.name,
        glbUrl:   prod ? prod.model_glb_url : null,
        category: prod ? prod.category : null,
        heightCm: prod && prod.dimensions && prod.dimensions.h ? prod.dimensions.h : null,
        imgUrl: p.imgUrl || (prod && prod.images && prod.images[0]) || null,
        position: { x: p.mesh.position.x, y: p.mesh.position.y, z: p.mesh.position.z },
        rotationY: p.mesh.rotation.y || 0,
        scale: p.mesh.scale.x || 1
      };
    })
  };

  const restorable = scn.items.filter(it => it.glbUrl);
  if (!restorable.length) {
    toast('Aucun modele restaurable (catalogue introuvable)', 'err');
    return;
  }
  scn.items = restorable;

  const arr = listScenes();
  arr.unshift(scn);
  if (persistScenes(arr)) {
    input.value = '';
    renderScenesModal();
    toast('Scene "' + name + '" sauvegardee', 'ok');
  }
};

window.deleteScene = function(id) {
  const arr = listScenes().filter(s => s.id !== id);
  if (persistScenes(arr)) {
    renderScenesModal();
    toast('Scene supprimee');
  }
};

window.loadSavedScene = async function(id) {
  const arr = listScenes();
  const scn = arr.find(s => s.id === id);
  if (!scn) { toast('Scene introuvable', 'err'); return; }
  closeScenes();
  spin(true, 'Chargement de la scene...');

  if (!products.length) {
    try { await loadCatalogue(); } catch(_) {}
  }

  clearScene();

  for (const it of scn.items) {
    if (!it.glbUrl) {
      const p = products.find(x => x.id === it.productId);
      if (p) it.glbUrl = p.model_glb_url;
    }
    if (!it.glbUrl) { console.warn('Skipping unrestorable item', it.name); continue; }
    try {
      await restoreSavedItem(it);
    } catch(e) {
      console.warn('Failed to restore item', it.name, e);
    }
  }

  spin(false);
  toast('Scene "' + scn.name + '" chargee', 'ok');
  setStatus(placed.length + ' meuble' + (placed.length > 1 ? 's' : '') + ' charge' + (placed.length > 1 ? 's' : ''));
};

async function restoreSavedItem(it) {
  const gltf = await new Promise((ok, fail) => {
    gltfLoader.load(it.glbUrl, ok, null, fail);
  });
  const mesh = gltf.scene;

  const box = new THREE.Box3().setFromObject(mesh);
  const mh  = box.max.y - box.min.y;
  const th  = it.heightCm ? (it.heightCm / 100) : realH(it.category);
  if (mh > 0.001) mesh.scale.setScalar(th / mh);

  const box2 = new THREE.Box3().setFromObject(mesh);
  mesh.position.y -= box2.min.y;

  mesh.traverse((c) => {
    if (!c.isMesh) return;
    c.castShadow = c.receiveShadow = true;
    if (!c.material) return;
    const mats = Array.isArray(c.material) ? c.material : [c.material];
    mats.forEach((mat) => {
      ['map', 'emissiveMap'].forEach((k) => {
        if (mat[k]) { mat[k].colorSpace = THREE.SRGBColorSpace; mat[k].needsUpdate = true; }
      });
      ['normalMap', 'roughnessMap', 'metalnessMap', 'aoMap'].forEach((k) => {
        if (mat[k]) { mat[k].colorSpace = THREE.NoColorSpace; mat[k].needsUpdate = true; }
      });
      mat.needsUpdate = true;
    });
  });

  pending = {
    mesh,
    id: it.productId,
    name: it.name,
    icon: catIco(it.category),
    imgUrl: it.imgUrl || null
  };
  pending.mesh.rotation.y = it.rotationY || 0;
  doPlace({ x: it.position.x, z: it.position.z });

  addTrayItem({ id: it.productId, name: it.name, icon: catIco(it.category), imgUrl: it.imgUrl });
}

function clearScene() {
  placed.forEach((p) => {
    scene.remove(p.mesh);
    p.mesh.traverse((c) => {
      if (c.isMesh && c.material) {
        if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
        else c.material.dispose();
      }
    });
  });
  placed   = [];
  snapList = [];
  selected = null;
  pending  = null;
  document.getElementById('delFab').classList.remove('on');
  document.getElementById('dupFab').classList.remove('on');
  document.getElementById('elevUp').classList.remove('on');
  document.getElementById('elevDown').classList.remove('on');
  document.getElementById('rotCw').classList.remove('on');
  document.getElementById('rotCcw').classList.remove('on');
  document.getElementById('selTag').classList.remove('on');
  document.getElementById('undoFab').classList.remove('on');
  document.querySelectorAll('.tray-item').forEach(el => el.remove());
  updateBadge();
  setStatus('Ajoutez des meubles pour commencer');
}

function renderScenesModal() {
  const arr = listScenes();
  const list = document.getElementById('scnList');
  document.getElementById('scnCount').textContent = arr.length;
  document.getElementById('scnSaveBtn').disabled = (placed.length === 0);

  if (!arr.length) {
    list.innerHTML = '<div class="sov-empty">Aucune scene sauvegardee</div>';
    return;
  }
  list.innerHTML = arr.map((s) => {
    const d = new Date(s.savedAt);
    const pad = (n) => String(n).padStart(2, '0');
    const dateStr = pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    const cnt = s.items.length;
    const safeName = String(s.name).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const thumbHtml = s.thumb
      ? '<img src="' + s.thumb + '" alt=""/>'
      : '\u25C7';
    return '<div class="sov-item">'
      + '<div class="sov-item-thumb">' + thumbHtml + '</div>'
      + '<div class="sov-item-info">'
        + '<div class="sov-item-name">' + safeName + '</div>'
        + '<div class="sov-item-meta">' + dateStr + ' &middot; ' + cnt + ' meuble' + (cnt > 1 ? 's' : '') + '</div>'
      + '</div>'
      + '<div class="sov-item-actions">'
        + '<button class="sov-item-btn load" onclick="loadSavedScene(\'' + s.id + '\')" title="Charger">'
          + '<svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>'
        + '</button>'
        + '<button class="sov-item-btn del" onclick="deleteScene(\'' + s.id + '\')" title="Supprimer">'
          + '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>'
        + '</button>'
      + '</div>'
    + '</div>';
  }).join('');
}

/* INIT */
loadCatalogue();
document.getElementById('zoomSlider').classList.add('on');
const q = JSON.parse(localStorage.getItem('tadam_ar_scene') || '[]');
if (q.length) {
  localStorage.removeItem('tadam_ar_scene');

  (async function autoPlaceModels() {
    spin(true, 'Chargement de la scène...');

    for (let i = 0; i < q.length; i++) {
      const item = q[i];
      if (!item.glb) continue;

      try {
        await loadModel({
          id: item.id,
          name: item.name,
          glb: item.glb,
          category: item.category,
          h: item.dimensions && typeof item.dimensions === 'object' && item.dimensions.h ? item.dimensions.h : null,
          icon: catIco(item.category)
        });

        const angle = (i / Math.max(q.length, 1)) * Math.PI * 2;
        const radius = q.length > 1 ? 1.5 : 0;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;

        doPlace({ x, y: 0, z });

        addTrayItem({ id: item.id, name: item.name, icon: catIco(item.category) });
      } catch(e) {
        console.error('Erreur placement auto:', e);
        toast('Erreur: ' + item.name, 'err');
      }
    }

    spin(false);
    if (placed.length > 0) {
      toast('Scène chargée: ' + placed.length + ' meuble' + (placed.length > 1 ? 's' : '') + ' placé' + (placed.length > 1 ? 's' : ''));
      setStatus(placed.length + ' meuble' + (placed.length > 1 ? 's' : '') + ' placé' + (placed.length > 1 ? 's' : ''));
    }
  })();
}
