<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>TadamHome - Studio AR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F2EC;--ink:#1C1B18;--white:#FAFAF8;
  --accent:#B8986A;--acc3:#A07A4A;--muted:#8A8880;
  --border:rgba(28,27,24,.12);--green:#27704A;
  --serif:'Cormorant Garamond',serif;--sans:'Outfit',sans-serif;
}
html,body{height:100%;background:var(--bg);font-family:var(--sans);overflow:hidden}

/* TOPBAR */
.topbar{height:50px;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 8px;flex-shrink:0;padding-top:env(safe-area-inset-top,0);gap:4px}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:1;min-width:0;overflow:hidden}
.topbar-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.t-logo{height:14px;object-fit:contain;flex-shrink:0}
.t-sep{width:1px;height:14px;background:rgba(255,255,255,.15);flex-shrink:0}
.t-label{font-size:8px;letter-spacing:.10em;text-transform:uppercase;color:rgba(255,255,255,.3);font-family:var(--sans);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-btn{display:flex;align-items:center;justify-content:center;gap:4px;width:32px;height:32px;padding:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--white);font-family:var(--sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;position:relative}
.t-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;flex-shrink:0}
.t-btn-lbl{display:none}
.t-btn:hover{background:rgba(184,152,106,.2);border-color:var(--accent);color:var(--accent)}
.t-btn.ar{background:rgba(184,152,106,.18);border-color:var(--accent);color:var(--accent)}
.t-btn.ar:hover{background:rgba(184,152,106,.32);color:var(--accent)}
.t-badge{background:var(--accent);color:var(--ink);font-size:8px;font-weight:600;padding:1px 4px;border-radius:8px;font-family:var(--sans);display:none;flex-shrink:0;position:absolute;top:-3px;right:-3px}
.t-badge.on{display:inline}
.t-icon-btn{width:32px;height:32px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--white);transition:all .2s;flex-shrink:0}
.t-icon-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
.t-icon-btn:hover{background:rgba(255,255,255,.18)}
@media (min-width:540px){
  .t-btn{width:auto;padding:0 10px;gap:5px}
  .t-btn-lbl{display:inline}
  .t-btn.ar .t-badge{position:static}
  .topbar{padding:0 14px;gap:6px}
  .t-logo{height:16px}
}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.studio{flex:1;position:relative;overflow:hidden;min-height:0}
#c{display:block;width:100%;height:100%;touch-action:none;cursor:grab}
#c:active{cursor:grabbing}

/* STATUS */
.status{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(28,27,24,.78);backdrop-filter:blur(8px);padding:6px 14px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.7);white-space:nowrap;border:1px solid rgba(255,255,255,.1);pointer-events:none;max-width:90%;overflow:hidden;text-overflow:ellipsis}
.status.accent{color:var(--accent);border-color:rgba(184,152,106,.3)}

/* SELECTED NAME TAG */
.sel-tag{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(28,27,24,.85);backdrop-filter:blur(8px);padding:5px 14px;font-size:11px;color:var(--white);letter-spacing:.05em;opacity:0;transition:opacity .2s;pointer-events:none;border-left:2px solid var(--accent);white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
.sel-tag.on{opacity:1}
.sel-tag .sep{color:rgba(255,255,255,.35);margin:0 7px;font-size:10px}
.sel-tag .axis{color:var(--accent);font-weight:500;margin-right:4px;font-size:10px}

/* MINI BRIGHTNESS — floating, always visible top-left of canvas */
.bright-mini{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:8px;background:rgba(28,27,24,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:7px 11px;border:1px solid rgba(255,255,255,.08);z-index:5;-webkit-user-select:none;user-select:none;border-radius:2px}
.bright-mini-ic{width:13px;height:13px;color:rgba(255,255,255,.78);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.bright-mini-ic svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.bright-mini-ic.lg{color:rgba(255,255,255,.95);width:14px;height:14px}
.bright-mini-slider{-webkit-appearance:none;appearance:none;width:88px;height:2px;background:rgba(255,255,255,.22);outline:none;cursor:pointer;margin:0;padding:0;border-radius:0}
.bright-mini-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--accent);border-radius:50%;cursor:pointer;border:1.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:transform .15s}
.bright-mini-slider:active::-webkit-slider-thumb{transform:scale(1.15)}
.bright-mini-slider::-moz-range-thumb{width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer;border:1.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3)}
@media (min-width:540px){
  .bright-mini-slider{width:120px}
}

/* ACTION FABs */
.del-fab{position:absolute;bottom:16px;right:114px;width:42px;height:42px;background:rgba(192,57,43,.92);backdrop-filter:blur(8px);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;opacity:0;pointer-events:none;transition:all .25s;box-shadow:0 2px 10px rgba(192,57,43,.35);border-radius:2px}
.del-fab.on{opacity:1;pointer-events:all}
.del-fab svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}

.dup-fab{position:absolute;bottom:16px;right:162px;width:42px;height:42px;background:rgba(184,152,106,.95);backdrop-filter:blur(8px);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;opacity:0;pointer-events:none;transition:all .25s;box-shadow:0 2px 10px rgba(184,152,106,.35);border-radius:2px}
.dup-fab.on{opacity:1;pointer-events:all}
.dup-fab svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* RIGHT-EDGE MANIPULATION COLUMN */
.elev-fab{position:absolute;right:14px;width:42px;height:42px;background:rgba(28,27,24,.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;opacity:0;pointer-events:none;transition:opacity .25s, background .15s;box-shadow:0 2px 10px rgba(0,0,0,.18);border-radius:2px;-webkit-user-select:none;user-select:none}
.elev-fab.on{opacity:1;pointer-events:all}
.elev-fab:active,.elev-fab.holding{background:var(--accent)}
.elev-fab svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.elev-up   {bottom:64px}
.elev-down {bottom:16px}
.rot-cw    {bottom:166px}
.rot-ccw   {bottom:116px}
.rot-cw,.rot-ccw{background:rgba(45,42,36,.85)}

/* ZOOM SLIDER */
.zoom-slider{position:absolute;right:14px;bottom:80px;display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(250,250,248,.35);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:8px 6px;border-radius:4px;opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:4;-webkit-user-select:none;user-select:none}
.zoom-slider.on{opacity:1;pointer-events:all}
.zoom-btn{width:22px;height:22px;background:transparent;border:none;color:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
.zoom-btn:hover,.zoom-btn:active{color:var(--accent)}
.zoom-btn svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.zoom-track{position:relative;width:18px;height:96px;display:flex;justify-content:center;align-items:center;cursor:pointer;touch-action:none}
.zoom-track::before{content:"";position:absolute;width:1px;height:100%;background:rgba(255,255,255,.4);left:50%;transform:translateX(-50%);filter:drop-shadow(0 0 1px rgba(0,0,0,.5))}
.zoom-thumb{position:absolute;width:10px;height:10px;background:var(--accent);border-radius:50%;box-shadow:0 0 0 1.5px rgba(28,27,24,.5),0 1px 3px rgba(0,0,0,.35);left:50%;top:50%;transform:translate(-50%,-50%);transition:box-shadow .15s;will-change:top;pointer-events:none}
.zoom-thumb.dragging{box-shadow:0 0 0 1.5px rgba(28,27,24,.5),0 0 0 5px rgba(184,152,106,.22),0 1px 3px rgba(0,0,0,.35)}

/* UNDO */
.undo-fab{position:absolute;bottom:16px;left:14px;width:42px;height:42px;background:rgba(250,250,248,.94);backdrop-filter:blur(8px);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;pointer-events:none;transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,.1);border-radius:2px}
.undo-fab.on{opacity:1;pointer-events:all}
.undo-fab svg{width:15px;height:15px;fill:none;stroke:var(--muted);stroke-width:1.8;stroke-linecap:round}

/* BOTTOM */
.bottom{background:var(--white);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}

/* VIEW BAR */
.view-bar{display:flex;border-bottom:1px solid var(--border);background:rgba(245,242,236,.55)}
.view-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 6px;background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--border);transition:all .2s;position:relative}
.view-btn:last-child{border-right:none}
.view-btn:hover{color:var(--ink);background:rgba(184,152,106,.08)}
.view-btn.active{color:var(--accent);background:var(--white)}
.view-btn.active::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--accent)}
.view-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

.tray-row{display:flex;align-items:center;gap:8px;padding:10px 14px;overflow-x:auto;scrollbar-width:none}
.tray-row::-webkit-scrollbar{display:none}
.tray-add{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.tray-add-box{width:52px;height:52px;border:1.5px dashed rgba(184,152,106,.45);background:rgba(184,152,106,.05);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--accent);transition:all .2s}
.tray-add-box:hover{border-color:var(--accent);background:rgba(184,152,106,.12)}
.tray-lbl{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.tray-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;position:relative}
.tray-thumb{width:52px;height:52px;border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;overflow:hidden}
.tray-thumb img{width:100%;height:100%;object-fit:cover}
.tray-item.sel .tray-thumb{border-color:var(--accent);background:rgba(184,152,106,.1)}
.tray-item.placed .tray-thumb::after{content:"";position:absolute;top:-4px;right:-4px;width:12px;height:12px;background:var(--green);border-radius:50%;border:1.5px solid var(--white)}
.tray-name{font-size:8px;letter-spacing:.04em;color:var(--muted);max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.tray-hint{font-size:9px;letter-spacing:.06em;color:var(--muted);padding:0 14px 8px;text-align:center;text-transform:uppercase}

/* CATALOGUE */
#catOv{position:fixed;inset:0;z-index:100;background:rgba(28,27,24,.55);backdrop-filter:blur(6px);display:none;flex-direction:column}
#catOv.open{display:flex}
.cov-head{background:var(--white);padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding-top:calc(12px + env(safe-area-inset-top,0))}
.cov-title{font-family:var(--serif);font-size:20px;font-weight:400}
.cov-title em{font-style:italic;color:var(--accent)}
.cov-x{background:none;border:1px solid var(--border);width:30px;height:30px;cursor:pointer;font-size:13px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.cov-body{flex:1;overflow-y:auto;padding:12px;background:var(--bg)}

/* CATEGORY FILTER inside catalogue — onglets soulignement or, style catalogue.html */
.cat-filter{display:flex;gap:0;overflow-x:auto;padding:0 0 0 0;margin:-2px 0 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--border);position:relative}
.cat-filter::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;position:relative;display:inline-flex;align-items:center;gap:6px;padding:10px 14px 11px;border:none;background:transparent;font-family:var(--sans);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);cursor:pointer;white-space:nowrap;transition:color .2s;font-weight:400;margin-bottom:-1px}
.cat-pill:hover{color:var(--ink)}
.cat-pill.on{color:var(--ink);font-weight:500}
.cat-pill.on::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:2px;background:var(--accent)}
.cat-pill .cat-count{font-size:9px;color:var(--muted);font-weight:300;letter-spacing:.02em;opacity:.7}
.cat-pill.on .cat-count{color:var(--accent);opacity:1}

.cov-search{display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--white);padding:9px 12px;margin-bottom:10px}
.cov-search svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:1.5;flex-shrink:0}
.cov-search input{border:none;outline:none;background:transparent;font-family:var(--sans);font-size:13px;color:var(--ink);flex:1;font-weight:300}
.cov-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--border)}
.cov-card{background:var(--white);padding:12px;display:flex;flex-direction:column;gap:5px}
.cov-img{aspect-ratio:4/3;background:#EDEAE2;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.cov-img img{width:100%;height:100%;object-fit:cover}
.cov-brand{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.cov-name{font-family:var(--serif);font-size:15px;color:var(--ink)}
.cov-btn{padding:8px;background:var(--ink);color:var(--white);border:none;font-family:var(--sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;width:100%}
.cov-btn:hover,.cov-btn.added{background:var(--accent)}
/* Variantes (coloris) */
.cov-var-lbl{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:3px;font-family:var(--sans)}
.cov-vars{display:flex;flex-wrap:wrap;gap:5px;margin-top:1px}
.cov-var{position:relative;width:22px;height:22px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;flex-shrink:0;padding:0;transition:all .15s;background-size:cover;background-position:center}
.cov-var:hover{transform:scale(1.12);border-color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.15);z-index:2}
.cov-var::after{content:"+";position:absolute;top:-5px;right:-5px;width:13px;height:13px;background:var(--accent);color:#fff;border-radius:50%;font-size:11px;font-weight:600;line-height:13px;text-align:center;opacity:0;transition:opacity .15s;border:1.5px solid var(--white);font-family:var(--sans)}
.cov-var:hover::after{opacity:1}
.cov-var.adding{transform:scale(.92);border-color:var(--accent)}
.cov-var.adding::after{opacity:1;background:var(--green);content:"✓"}

/* SCENES MODAL */
#scnOv{position:fixed;inset:0;z-index:100;background:rgba(28,27,24,.55);backdrop-filter:blur(6px);display:none;flex-direction:column}
#scnOv.open{display:flex}
.sov-body{flex:1;overflow-y:auto;padding:14px;background:var(--bg)}
.sov-section-title{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:0 0 8px 0;font-weight:500}
.sov-section-title:not(:first-child){margin-top:18px}
.sov-save-block{background:var(--white);border:1px solid var(--border);padding:14px}
.sov-input{width:100%;border:1px solid var(--border);background:var(--bg);padding:10px 12px;font-family:var(--sans);font-size:13px;color:var(--ink);outline:none;font-weight:300;margin-bottom:10px;transition:border-color .15s}
.sov-input:focus{border-color:var(--accent);background:var(--white)}
.sov-save-btn{width:100%;padding:11px;background:var(--ink);color:var(--white);border:none;font-family:var(--sans);font-size:10px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.sov-save-btn:hover{background:var(--accent)}
.sov-save-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.sov-save-btn:disabled{opacity:.4;cursor:not-allowed}
.sov-list{display:flex;flex-direction:column;gap:8px}
.sov-item{background:var(--white);border:1px solid var(--border);padding:10px;display:flex;align-items:center;gap:12px}
.sov-item-thumb{width:64px;height:48px;border:1px solid var(--border);background:var(--bg);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px}
.sov-item-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.sov-item-info{flex:1;min-width:0}
.sov-item-name{font-family:var(--serif);font-size:15px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
.sov-item-meta{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.sov-item-actions{display:flex;gap:6px;flex-shrink:0}
.sov-item-btn{width:32px;height:32px;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .15s}
.sov-item-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.sov-item-btn.load:hover{color:var(--green);border-color:var(--green)}
.sov-item-btn.del:hover{color:#C0392B;border-color:#C0392B}
.sov-empty{padding:32px 16px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:.06em;background:var(--white);border:1px dashed var(--border);text-transform:uppercase}

/* AMBIANCE MODAL — Sol + Lumière */
#ambOv{position:fixed;inset:0;z-index:100;background:rgba(28,27,24,.55);backdrop-filter:blur(6px);display:none;flex-direction:column}
#ambOv.open{display:flex}
.amb-body{flex:1;overflow-y:auto;padding:14px;background:var(--bg)}
.amb-block{background:var(--white);border:1px solid var(--border);padding:14px}
.floor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
.floor-swatch{position:relative;cursor:pointer;display:flex;flex-direction:column;padding:0;border:1.5px solid transparent;background:#1C1B18;font-family:var(--sans);text-align:left;overflow:hidden;transition:border-color .2s}
.floor-swatch:hover{border-color:rgba(184,152,106,.4)}
.floor-swatch.on{border-color:var(--accent)}
.floor-thumb{width:100%;aspect-ratio:1;background:radial-gradient(circle at 32% 28%, #2a2924 0%, #0E0D0B 80%);position:relative;overflow:hidden}
.floor-sphere{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;opacity:0;transition:opacity .35s}
.floor-sphere[src]{opacity:1}
.floor-thumb-fallback{position:absolute;inset:18%;border-radius:50%;background:radial-gradient(circle at 35% 30%, #3a3934 0%, #1a1916 70%, #0E0D0B 100%)}
.floor-meta{padding:9px 12px 11px;line-height:1.2}
.floor-name{font-family:var(--serif);font-size:14px;font-weight:400;color:#FAFAF8;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:none;letter-spacing:0}
.floor-cat{font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.42);font-family:var(--sans)}

{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }   from 'three/addons/loaders/GLTFLoader.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
import { USDZExporter } from 'three/addons/exporters/USDZExporter.js';

/* SUPABASE */
const sb = supabase.createClient(
  'https://wbunwfxecvxngypuehop.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidW53ZnhlY3Z4bmd5cHVlaG9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1ODUyMzUsImV4cCI6MjA5MjE2MTIzNX0.4eytoW6tro2VbAV3Ay_DXlR1r3NBSIORg3nhRiWe-wo'
);

/* THREE */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, preserveDrawingBuffer:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
/* OPTIMISATION ÉCLAIRAGE — exposition réduite (1.1 → 0.92) pour éviter
   les zones surexposées, surtout sur les matériaux clairs. */
renderer.toneMappingExposure = 0.92;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xEEEBE3);
scene.fog = new THREE.FogExp2(0xEEEBE3, 0.04);

/* PERSPECTIVE camera */
const perspCam = new THREE.PerspectiveCamera(48, 1, 0.01, 80);
perspCam.position.set(3, 2.2, 3);

/* ORTHOGRAPHIC camera */
const orthoCam = new THREE.OrthographicCamera(-5, 5, 5, -5, -50, 100);

let activeCam = perspCam;

/* CAMERA STATE */
let viewMode = 'persp';
let camTheta = Math.PI * 0.25;
let camElev  = 0.55;
let camDist  = 4.5;
const camTarget = new THREE.Vector3(0, 0, 0);

const viewState = {
  persp: { theta: Math.PI * 0.25, elev: 0.55,                      dist: 4.5 },
  plan:  { theta: 0,              elev: Math.PI / 2 - 0.001,       dist: 6   },
  axo:   { theta: Math.PI / 4,    elev: Math.atan(1/Math.SQRT2),   dist: 7   }
};

function applyCamera() {
  activeCam.position.x = camTarget.x + camDist * Math.sin(camTheta) * Math.cos(camElev);
  activeCam.position.y = camTarget.y + camDist * Math.sin(camElev);
  activeCam.position.z = camTarget.z + camDist * Math.cos(camTheta) * Math.cos(camElev);
  activeCam.lookAt(camTarget);
  if (activeCam === orthoCam) {
    const w = canvas.parentElement.clientWidth;
    const h = canvas.parentElement.clientHeight;
    const aspect = w / h;
    const size = camDist * 0.7;
    orthoCam.left   = -size * aspect;
    orthoCam.right  =  size * aspect;
    orthoCam.top    =  size;
    orthoCam.bottom = -size;
    orthoCam.updateProjectionMatrix();
  }
}
applyCamera();

window.setView = function(mode) {
  if (mode === viewMode) return;
  viewState[viewMode] = { theta: camTheta, elev: camElev, dist: camDist };
  viewMode = mode;
  const s = viewState[mode];
  camTheta = s.theta;
  camElev  = s.elev;
  camDist  = s.dist;
  activeCam = (mode === 'persp') ? perspCam : orthoCam;
  document.querySelectorAll('.view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === mode);
  });
  applyCamera();
  const labels = { persp: 'Vue 3D perspective', plan: 'Vue de dessus (plan)', axo: 'Vue axonométrique' };
  toast(labels[mode], 'ok');
};

/* ========================================================================
   LIGHTING — système avec multiplicateur de luminosité
   Valeurs de base ré-équilibrées (ancienne version trop exposée) :
     ambient 1.0  → 0.42   (lumière diffuse globale)
     sun     2.2  → 1.55   (directionnelle, ombres)
     hemi    0.7  → 0.50   (gradient ciel/sol)
   Le multiplicateur LIGHT_MULT (0.4 → 1.6) permet à l'utilisateur d'ajuster
   l'ensemble en gardant la balance entre les sources.
   ======================================================================== */
const LIGHT_BASE = {
  ambient: 0.42,
  sun:     1.55,
  hemi:    0.50,
  exposureBase: 0.92
};
let LIGHT_MULT = 1.0;

const ambientLight = new THREE.AmbientLight(0xffffff, LIGHT_BASE.ambient);
scene.add(ambientLight);

const sun = new THREE.DirectionalLight(0xfffbf0, LIGHT_BASE.sun);
sun.position.set(5, 10, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far  = 40;
sun.shadow.camera.left = -8;
sun.shadow.camera.right = 8;
sun.shadow.camera.top = 8;
sun.shadow.camera.bottom = -8;
sun.shadow.bias = -0.001;
/* Adoucissement des ombres pour un rendu plus réaliste */
sun.shadow.radius = 4;
sun.shadow.normalBias = 0.02;
scene.add(sun);

const hemiLight = new THREE.HemisphereLight(0xfaf5eb, 0xcfc5b4, LIGHT_BASE.hemi);
scene.add(hemiLight);

function applyBrightness() {
  ambientLight.intensity = LIGHT_BASE.ambient * LIGHT_MULT;
  sun.intensity          = LIGHT_BASE.sun     * LIGHT_MULT;
  hemiLight.intensity    = LIGHT_BASE.hemi    * LIGHT_MULT;
  /* L'exposition s'ajuste plus doucement (la perception est non-linéaire) :
     courbe douce qui évite que ce soit trop sombre à 40% ou trop cramé à 160%. */
  const expoFactor = 0.6 + 0.4 * LIGHT_MULT;
  renderer.toneMappingExposure = LIGHT_BASE.exposureBase * expoFactor;
}
applyBrightness();

/* ========================================================================
   FLOOR TEXTURES — chargées depuis la table Supabase `floor_textures`.
   L'admin gère l'upload, le scaling (repeat_x/y), la rugosité et le
   choix par défaut depuis admin.html. Si la table est vide, on retombe
   sur un sol beige neutre uni.
   ======================================================================== */
let FLOOR_PRESETS = [];     // peuplé par loadFloorTextures()
let currentFloorId = null;

const FALLBACK_FLOOR = {
  id: '_fallback',
  name: 'Carreaux blancs',
  category: 'carrelage',
  image_url: null,
  repeat_x: 1, repeat_y: 1,
  roughness: 0.50,        /* léger satiné carreau émaillé */
  bg_color: '#F5F4F0',    /* blanc cassé chaud */
  is_default: false       /* la priorité reste aux textures de la DB marquées default */
};

/* FLOOR mesh — MeshStandardMaterial pour répondre correctement à la lumière */
const floorGeo = new THREE.PlaneGeometry(14, 14);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0xF5F4F0,       /* blanc cassé chaud par défaut */
  roughness: 0.50,
  metalness: 0.0
});
const floorMesh = new THREE.Mesh(floorGeo, floorMat);
floorMesh.rotation.x = -Math.PI / 2;
floorMesh.receiveShadow = true;
floorMesh.name = 'floor';
scene.add(floorMesh);

/* Grille = joints des carreaux quand le sol est en mode "Carreaux blancs".
   Cachée dès qu'une texture image (parquet, marbre…) s'applique. */
const grid = new THREE.GridHelper(14, 28, 0xB8B0A4, 0xB8B0A4);
grid.material.opacity = 0.55;
grid.material.transparent = true;
grid.name = 'grid';
scene.add(grid);

/* Cache de textures THREE chargées depuis URL */
const _floorTexCache = {};
const _texLoader = new THREE.TextureLoader();
_texLoader.crossOrigin = 'anonymous';

function loadTexFromUrl(url) {
  if (_floorTexCache[url]) return Promise.resolve(_floorTexCache[url]);
  return new Promise((resolve) => {
    _texLoader.load(
      url,
      (tex) => {
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
        _floorTexCache[url] = tex;
        resolve(tex);
      },
      null,
      (err) => { console.warn('[floor texture] load failed', url, err); resolve(null); }
    );
  });
}

async function loadFloorTextures() {
  try {
    const { data, error } = await sb
      .from('floor_textures')
      .select('*')
      .eq('is_active', true)
      .order('sort_order', { ascending: true });
    if (error) throw error;
    const dbPresets = (data || []).map(d => ({
      id: d.id,
      name: d.name,
      category: d.category || 'autre',
      image_url: d.image_url,
      repeat_x: Number(d.repeat_x) || 4,
      repeat_y: Number(d.repeat_y) || 4,
      roughness: Number(d.roughness ?? 0.85),
      bg_color: d.bg_color || '#EEEBE3',
      is_default: !!d.is_default
    }));
    /* Le sol "Carreaux blancs" est toujours proposé en tête du picker —
       option permanente, indépendante de la base. */
    FLOOR_PRESETS = [FALLBACK_FLOOR, ...dbPresets];
  } catch (e) {
    console.warn('[loadFloorTextures] failed', e);
    FLOOR_PRESETS = [FALLBACK_FLOOR];
  }
  return FLOOR_PRESETS;
}

async function applyFloor(id) {
  let preset;
  if (id === '_fallback' || !FLOOR_PRESETS.length) {
    preset = FALLBACK_FLOOR;
  } else {
    preset = FLOOR_PRESETS.find(p => p.id === id)
          || FLOOR_PRESETS.find(p => p.is_default)
          || FLOOR_PRESETS[0]
          || FALLBACK_FLOOR;
  }
  currentFloorId = preset.id;

  if (preset.image_url) {
    const tex = await loadTexFromUrl(preset.image_url);
    if (tex) {
      tex.repeat.set(preset.repeat_x, preset.repeat_y);
      tex.needsUpdate = true;
      floorMat.map = tex;
      floorMat.color.set(0xffffff);
      grid.visible = false;
    } else {
      floorMat.map = null;
      floorMat.color.set(preset.bg_color);
      grid.visible = true;
    }
  } else {
    floorMat.map = null;
    floorMat.color.set(preset.bg_color);
    grid.visible = true;
  }
  floorMat.roughness = preset.roughness;
  floorMat.needsUpdate = true;

  const bg = new THREE.Color(preset.bg_color);
  scene.background = bg;
  scene.fog.color = bg;

  if (preset.id !== '_fallback') {
    try { localStorage.setItem('tadam_floor', preset.id); } catch(_){}
  }
}

const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);


/* ========================================================================
   MANIPULATION HELPERS — "Natural Minimal"
   ======================================================================== */
const HELPER = (() => {
  const root = new THREE.Group();
  root.name = 'manip-helpers';
  root.visible = false;
  scene.add(root);

  const axisMatX = new THREE.LineBasicMaterial({ color: 0xF0EDE5, transparent: true, opacity: 0.30, depthTest: false });
  const axisMatY = new THREE.LineBasicMaterial({ color: 0xF0EDE5, transparent: true, opacity: 0.30, depthTest: false });
  const axisMatZ = new THREE.LineBasicMaterial({ color: 0xF0EDE5, transparent: true, opacity: 0.30, depthTest: false });
  const dashMat  = new THREE.LineDashedMaterial({ color: 0xF0EDE5, transparent: true, opacity: 0.55, dashSize: 0.04, gapSize: 0.04, depthTest: false });

  function makeLine(mat) {
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
    const l = new THREE.Line(g, mat);
    l.frustumCulled = false;
    l.renderOrder = 999;
    return l;
  }
  const xAxis = makeLine(axisMatX);
  const yAxis = makeLine(axisMatY);
  const zAxis = makeLine(axisMatZ);
  const dropY = makeLine(dashMat);
  root.add(xAxis, yAxis, zAxis, dropY);

  const ringGroup = new THREE.Group();
  ringGroup.visible = false;
  ringGroup.renderOrder = 998;
  root.add(ringGroup);

  const ringSegs = 96;
  const ringRadius = 1;
  const ringPos = new Float32Array((ringSegs + 1) * 3);
  for (let i = 0; i <= ringSegs; i++) {
    const a = (i / ringSegs) * Math.PI * 2;
    ringPos[i * 3]     = Math.cos(a) * ringRadius;
    ringPos[i * 3 + 1] = 0.001;
    ringPos[i * 3 + 2] = Math.sin(a) * ringRadius;
  }
  const ringGeo = new THREE.BufferGeometry();
  ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
  const ringLine = new THREE.LineLoop(ringGeo, new THREE.LineBasicMaterial({ color: 0xB8986A, transparent: true, opacity: 0.55, depthTest: false }));
  ringLine.renderOrder = 998;
  ringGroup.add(ringLine);

  const tickMat      = new THREE.LineBasicMaterial({ color: 0xB8986A, transparent: true, opacity: 0.65, depthTest: false });
  const tickMatMajor = new THREE.LineBasicMaterial({ color: 0xF0EDE5, transparent: true, opacity: 0.85, depthTest: false });
  for (let deg = 0; deg < 360; deg += 15) {
    const a = deg * Math.PI / 180;
    const major = (deg % 90) === 0;
    const inner = major ? 0.92 : 0.95;
    const outer = 1.02;
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
      Math.cos(a) * inner, 0.001, Math.sin(a) * inner,
      Math.cos(a) * outer, 0.001, Math.sin(a) * outer
    ]), 3));
    const t = new THREE.Line(g, major ? tickMatMajor : tickMat);
    t.renderOrder = 998;
    ringGroup.add(t);
  }

  const hLabel = document.getElementById('hLabel');
  const selTag = document.getElementById('selTag');
  let hDisplay = 0, hTarget = 0;
  let aDisplay = 0, aTarget = 0;
  let dxDisp = 0, dxTgt = 0;
  let dyDisp = 0, dyTgt = 0;
  let dzDisp = 0, dzTgt = 0;

  function fmtCm(cm) {
    cm = Math.round(cm);
    if (cm >= 100) return (cm / 100).toFixed(2) + ' m';
    return cm + ' cm';
  }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const distGeo = new THREE.BufferGeometry();
  distGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
  const distMat = new THREE.LineDashedMaterial({ color: 0xB8986A, transparent: true, opacity: 0.7, dashSize: 0.05, gapSize: 0.04, depthTest: false });
  const distLine = new THREE.Line(distGeo, distMat);
  distLine.frustumCulled = false;
  distLine.renderOrder = 999;
  distLine.visible = false;
  scene.add(distLine);

  let mode = 'none';
  let target = null;

  function tweenLabels() {
    if (Math.abs(hTarget - hDisplay) > 0.05) hDisplay += (hTarget - hDisplay) * 0.35;
    else hDisplay = hTarget;
    if (Math.abs(aTarget - aDisplay) > 0.1) aDisplay += (aTarget - aDisplay) * 0.35;
    else aDisplay = aTarget;
    if (Math.abs(dxTgt - dxDisp) > 0.05) dxDisp += (dxTgt - dxDisp) * 0.35; else dxDisp = dxTgt;
    if (Math.abs(dyTgt - dyDisp) > 0.05) dyDisp += (dyTgt - dyDisp) * 0.35; else dyDisp = dyTgt;
    if (Math.abs(dzTgt - dzDisp) > 0.05) dzDisp += (dzTgt - dzDisp) * 0.35; else dzDisp = dzTgt;

    if (hLabel.classList.contains('on')) {
      hLabel.textContent = 'H ' + Math.round(hDisplay) + ' cm';
    }

    if (mode === 'drag' && target) {
      let html = escHtml(target.name);
      if (placed.length > 1) {
        html += '<span class="sep">·</span><span class="axis">X</span>' + fmtCm(dxDisp);
        html += '<span class="sep">·</span><span class="axis">Y</span>' + fmtCm(dzDisp);
        if (viewMode !== 'plan') {
          html += '<span class="sep">·</span><span class="axis">Z</span>' + fmtCm(dyDisp);
        }
      }
      if (selTag.innerHTML !== html) selTag.innerHTML = html;
    } else if (mode === 'rotate' && target) {
      let deg = ((aDisplay % 360) + 360) % 360;
      if (deg > 180) deg -= 360;
      const angleStr = (deg >= 0 ? '+' : '') + Math.round(deg) + '°';
      const html = escHtml(target.name)
        + '<span class="sep">·</span><span class="axis">ROT</span>' + angleStr;
      if (selTag.innerHTML !== html) selTag.innerHTML = html;
    }
  }

  function boxEdgeDistance(a, b) {
    const dx = Math.max(0, Math.max(a.min.x - b.max.x, b.min.x - a.max.x));
    const dy = Math.max(0, Math.max(a.min.y - b.max.y, b.min.y - a.max.y));
    const dz = Math.max(0, Math.max(a.min.z - b.max.z, b.min.z - a.max.z));
    return Math.sqrt(dx * dx + dy * dy + dz * dz);
  }
  function closestPointOnBox(box, ref, out) {
    out.set(
      Math.max(box.min.x, Math.min(ref.x, box.max.x)),
      Math.max(box.min.y, Math.min(ref.y, box.max.y)),
      Math.max(box.min.z, Math.min(ref.z, box.max.z))
    );
    return out;
  }

  const _otherCenter = new THREE.Vector3();
  const _selfCenter  = new THREE.Vector3();
  const _ptA = new THREE.Vector3();
  const _ptB = new THREE.Vector3();
  function nearestNeighbour(selfBox) {
    if (!target) return null;
    selfBox.getCenter(_selfCenter);
    let bestDist = Infinity;
    let bestObj  = null;
    let bestBox  = null;
    for (const o of placed) {
      if (o.sceneId === target.sceneId) continue;
      const ob = new THREE.Box3().setFromObject(o.mesh);
      const d  = boxEdgeDistance(selfBox, ob);
      if (d < bestDist) { bestDist = d; bestObj = o; bestBox = ob; }
    }
    if (!bestObj) return null;
    bestBox.getCenter(_otherCenter);
    closestPointOnBox(selfBox,  _otherCenter, _ptA);
    closestPointOnBox(bestBox, _selfCenter,   _ptB);
    return { obj: bestObj, distance: bestDist, a: _ptA.clone(), b: _ptB.clone(), boxB: bestBox.clone() };
  }

  function project(v3) {
    const v = v3.clone().project(activeCam);
    const w = canvas.parentElement.clientWidth;
    const h = canvas.parentElement.clientHeight;
    return { x: (v.x * 0.5 + 0.5) * w, y: (-v.y * 0.5 + 0.5) * h };
  }

  const _bx = new THREE.Box3();
  const _ctr = new THREE.Vector3();
  const _bot = new THREE.Vector3();
  function objCenter(obj) {
    _bx.setFromObject(obj.mesh);
    _bx.getCenter(_ctr);
    _bot.set(_ctr.x, _bx.min.y, _ctr.z);
    return { center: _ctr.clone(), bottom: _bot.clone(), box: _bx.clone() };
  }

  function axisExtent(box) {
    const sz = new THREE.Vector3();
    box.getSize(sz);
    const objScale = Math.max(sz.x, sz.y, sz.z) * 1.5;
    const camScale = Math.max(0.6, Math.min(camDist * 0.4, 5));
    return Math.max(objScale, camScale, 0.5);
  }

  function update() {
    if (!target || !root.visible) return;
    const info = objCenter(target);
    const ext  = axisExtent(info.box);
    root.position.copy(info.bottom);

    const xp = xAxis.geometry.attributes.position;
    xp.array[0] = -ext; xp.array[1] = 0.001; xp.array[2] = 0;
    xp.array[3] =  ext; xp.array[4] = 0.001; xp.array[5] = 0;
    xp.needsUpdate = true;

    const yp = yAxis.geometry.attributes.position;
    yp.array[0] = 0; yp.array[1] = 0.001; yp.array[2] = 0;
    yp.array[3] = 0; yp.array[4] = ext;   yp.array[5] = 0;
    yp.needsUpdate = true;

    const zp = zAxis.geometry.attributes.position;
    zp.array[0] = 0; zp.array[1] = 0.001; zp.array[2] = -ext;
    zp.array[3] = 0; zp.array[4] = 0.001; zp.array[5] =  ext;
    zp.needsUpdate = true;

    const liftedH = info.bottom.y;
    const showDrop = (mode === 'drag') && (viewMode === 'persp') && liftedH > 0.005;
    dropY.visible = showDrop;
    if (showDrop) {
      const dp = dropY.geometry.attributes.position;
      dp.array[0] = 0; dp.array[1] = 0;       dp.array[2] = 0;
      dp.array[3] = 0; dp.array[4] = liftedH; dp.array[5] = 0;
      dp.needsUpdate = true;
      dropY.computeLineDistances();
    }

    const sz = new THREE.Vector3();
    info.box.getSize(sz);
    const ringR = Math.max(0.4, Math.hypot(sz.x, sz.z) * 0.55);
    ringGroup.scale.setScalar(ringR);

    if (mode === 'drag' && viewMode === 'persp') {
      hTarget = info.bottom.y * 100;
      const wp = info.bottom.clone(); wp.y += 0.04;
      const sc = project(wp);
      hLabel.style.transform = 'translate(' + (sc.x + 14) + 'px,' + (sc.y - 26) + 'px)';
      if (!hLabel.classList.contains('on')) hLabel.classList.add('on');
    } else if (hLabel.classList.contains('on')) {
      hLabel.classList.remove('on');
    }

    if (mode === 'drag' && placed.length > 1) {
      const nn = nearestNeighbour(info.box);
      if (nn) {
        const aBox = info.box;
        const bBox = nn.boxB;
        const dx = Math.max(0, Math.max(aBox.min.x - bBox.max.x, bBox.min.x - aBox.max.x));
        const dy = Math.max(0, Math.max(aBox.min.y - bBox.max.y, bBox.min.y - aBox.max.y));
        const dz = Math.max(0, Math.max(aBox.min.z - bBox.max.z, bBox.min.z - aBox.max.z));
        dxTgt = dx * 100;
        dyTgt = dy * 100;
        dzTgt = dz * 100;
        const dp = distGeo.attributes.position;
        dp.array[0] = nn.a.x; dp.array[1] = Math.max(nn.a.y, 0.005); dp.array[2] = nn.a.z;
        dp.array[3] = nn.b.x; dp.array[4] = Math.max(nn.b.y, 0.005); dp.array[5] = nn.b.z;
        dp.needsUpdate = true;
        distLine.computeLineDistances();
        distLine.visible = true;
      } else {
        dxTgt = dyTgt = dzTgt = 0;
        distLine.visible = false;
      }
    } else {
      dxTgt = dyTgt = dzTgt = 0;
      distLine.visible = false;
    }

    tweenLabels();
  }

  function show(obj, m) {
    target = obj;
    mode = m;
    root.visible = true;
    ringGroup.visible = (m === 'rotate');
    if (m === 'drag') {
      hTarget = (objCenter(obj).bottom.y) * 100;
      hDisplay = hTarget;
      dxDisp = dxTgt = 0;
      dyDisp = dyTgt = 0;
      dzDisp = dzTgt = 0;
    } else if (m === 'rotate') {
      aTarget = (obj.mesh.rotation.y * 180 / Math.PI);
      aDisplay = aTarget;
      hLabel.classList.remove('on');
      distLine.visible = false;
    }
    update();
  }

  function setRotationLabel(rad) { aTarget = rad * 180 / Math.PI; }

  let lockState = null;
  function setAxisLock(axis) {
    if (axis === lockState) return;
    lockState = axis;
    axisMatX.color.set(0xF0EDE5); axisMatX.opacity = 0.30;
    axisMatZ.color.set(0xF0EDE5); axisMatZ.opacity = 0.30;
    if (axis === 'x') { axisMatX.color.set(0xB8986A); axisMatX.opacity = 0.85; }
    else if (axis === 'z') { axisMatZ.color.set(0xB8986A); axisMatZ.opacity = 0.85; }
  }

  function hide() {
    mode = 'none';
    hLabel.classList.remove('on');
    distLine.visible = false;
    if (selected) selTag.textContent = selected.name;
    setAxisLock(null);
    const start = performance.now();
    const dur = 400;
    const initial = {
      x: axisMatX.opacity, y: axisMatY.opacity, z: axisMatZ.opacity,
      d: dashMat.opacity, r: ringLine.material.opacity,
      tk: tickMat.opacity, tj: tickMatMajor.opacity
    };
    function step() {
      const t = Math.min(1, (performance.now() - start) / dur);
      const k = 1 - t;
      axisMatX.opacity = initial.x * k;
      axisMatY.opacity = initial.y * k;
      axisMatZ.opacity = initial.z * k;
      dashMat.opacity  = initial.d * k;
      ringLine.material.opacity = initial.r * k;
      tickMat.opacity  = initial.tk * k;
      tickMatMajor.opacity = initial.tj * k;
      if (t < 1 && mode === 'none') {
        requestAnimationFrame(step);
      } else if (mode === 'none') {
        root.visible = false;
        target = null;
        axisMatX.opacity = 0.30;
        axisMatY.opacity = 0.30;
        axisMatZ.opacity = 0.30;
        dashMat.opacity = 0.55;
        ringLine.material.opacity = 0.55;
        tickMat.opacity = 0.65; tickMatMajor.opacity = 0.85;
      }
    }
    requestAnimationFrame(step);
  }

  return { show, hide, update, setRotationLabel, setAxisLock };
})();


/* FEEDBACK — thock + haptic at thresholds */
const FEEDBACK = (() => {
  let ctx = null;
  let lastTickAt = 0;
  const minIntervalMs = 35;

  function ensureCtx() {
    if (ctx) return ctx;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) ctx = new AC();
    } catch(_) {}
    return ctx;
  }

  function thock() {
    const ac = ensureCtx();
    if (!ac) return;
    if (ac.state === 'suspended') { try { ac.resume(); } catch(_){} }
    const now = ac.currentTime;
    const osc = ac.createOscillator();
    const oscGain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(820, now);
    oscGain.gain.setValueAtTime(0.0001, now);
    oscGain.gain.exponentialRampToValueAtTime(0.40, now + 0.001);
    oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.014);
    osc.connect(oscGain);
    const lp = ac.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 2400;
    lp.Q.value = 0.4;
    oscGain.connect(lp);
    const out = ac.createGain();
    out.gain.value = 0.60;
    lp.connect(out);
    out.connect(ac.destination);
    osc.start(now);
    osc.stop(now + 0.025);
  }

  function haptic() { try { if (navigator.vibrate) navigator.vibrate(18); } catch(_){} }

  function tickSilent() {
    const now = performance.now();
    if (now - lastTickAt < minIntervalMs) return;
    lastTickAt = now;
    haptic();
  }
  function tickFull() {
    const now = performance.now();
    if (now - lastTickAt < minIntervalMs) return;
    lastTickAt = now;
    thock();
    haptic();
  }

  const TRANS_THRESHOLD = 0.10;
  let lastPos = null, transAccum = 0;
  function startTranslate(pos) { lastPos = pos.clone(); transAccum = 0; }
  function updateTranslate(pos) {
    if (!lastPos) { startTranslate(pos); return; }
    transAccum += Math.hypot(pos.x - lastPos.x, pos.z - lastPos.z);
    lastPos.copy(pos);
    while (transAccum >= TRANS_THRESHOLD) { transAccum -= TRANS_THRESHOLD; tickSilent(); }
  }
  function endTranslate() { lastPos = null; transAccum = 0; }

  const ROT_THRESHOLD = 15 * Math.PI / 180;
  let lastRot = null, rotAccum = 0;
  function startRotate(rad) { lastRot = rad; rotAccum = 0; }
  function updateRotate(rad) {
    if (lastRot === null) { startRotate(rad); return; }
    let d = rad - lastRot;
    while (d > Math.PI)  d -= Math.PI * 2;
    while (d < -Math.PI) d += Math.PI * 2;
    rotAccum += Math.abs(d);
    lastRot = rad;
    while (rotAccum >= ROT_THRESHOLD) { rotAccum -= ROT_THRESHOLD; tickFull(); }
  }
  function endRotate() { lastRot = null; rotAccum = 0; }

  function unlock() {
    ensureCtx();
    if (ctx && ctx.state === 'suspended') { try { ctx.resume(); } catch(_){} }
    window.removeEventListener('touchstart', unlock);
    window.removeEventListener('mousedown',   unlock);
  }
  window.addEventListener('touchstart', unlock, { once: false, passive: true });
  window.addEventListener('mousedown',   unlock, { once: false });

  return { startTranslate, updateTranslate, endTranslate,
           startRotate,    updateRotate,    endRotate };
})();

/* ELEVATION CONTROLS */
(function elevationControls() {
  const STEP_M    = 0.05;
  const SPEED_M_S = 0.30;
  const Y_MIN = 0;
  const Y_MAX = 3.0;
  const upBtn   = document.getElementById('elevUp');
  const downBtn = document.getElementById('elevDown');
  function clampY(y) { return Math.max(Y_MIN, Math.min(Y_MAX, y)); }
  function nudge(deltaM) {
    if (!selected) return;
    const before = selected.mesh.position.y;
    const after  = clampY(before + deltaM);
    if (after === before) return;
    selected.mesh.position.y = after;
    HELPER.show(selected, 'drag');
  }
  let holdRAF = null;
  let holdLastT = 0;
  let holdDir = 0;
  function holdLoop() {
    const now = performance.now();
    const dt = Math.min(0.05, (now - holdLastT) / 1000);
    holdLastT = now;
    nudge(holdDir * SPEED_M_S * dt);
    holdRAF = requestAnimationFrame(holdLoop);
  }
  function startHold(dir, btn) {
    if (!selected) return;
    btn.classList.add('holding');
    holdDir = dir;
    holdLastT = performance.now();
    nudge(dir * STEP_M);
    holdRAF = setTimeout(() => {
      holdLastT = performance.now();
      holdRAF = requestAnimationFrame(holdLoop);
    }, 280);
  }
  function endHold(btn) {
    btn.classList.remove('holding');
    if (holdRAF) { clearTimeout(holdRAF); cancelAnimationFrame(holdRAF); holdRAF = null; }
    HELPER.show(selected, 'drag');
  }
  function bind(btn, dir) {
    btn.addEventListener('pointerdown', (e) => { e.preventDefault(); startHold(dir, btn); btn.setPointerCapture(e.pointerId); });
    btn.addEventListener('pointerup',   ()  => endHold(btn));
    btn.addEventListener('pointercancel', () => endHold(btn));
    btn.addEventListener('pointerleave', () => endHold(btn));
  }
  bind(upBtn,   +1);
  bind(downBtn, -1);
})();

/* ROTATION CONTROLS */
(function rotationControls() {
  const STEP_RAD    = 15 * Math.PI / 180;
  const SPEED_RAD_S = 90 * Math.PI / 180;
  const ccwBtn = document.getElementById('rotCcw');
  const cwBtn  = document.getElementById('rotCw');
  function nudge(deltaRad) {
    if (!selected) return;
    selected.mesh.rotation.y += deltaRad;
    HELPER.show(selected, 'rotate');
    HELPER.setRotationLabel(selected.mesh.rotation.y);
    FEEDBACK.updateRotate(selected.mesh.rotation.y);
  }
  let holdRAF = null, holdLastT = 0, holdDir = 0;
  function holdLoop() {
    const now = performance.now();
    const dt = Math.min(0.05, (now - holdLastT) / 1000);
    holdLastT = now;
    nudge(holdDir * SPEED_RAD_S * dt);
    holdRAF = requestAnimationFrame(holdLoop);
  }
  function startHold(dir, btn) {
    if (!selected) return;
    btn.classList.add('holding');
    holdDir = dir;
    holdLastT = performance.now();
    FEEDBACK.startRotate(selected.mesh.rotation.y);
    nudge(dir * STEP_RAD);
    holdRAF = setTimeout(() => {
      holdLastT = performance.now();
      holdRAF = requestAnimationFrame(holdLoop);
    }, 280);
  }
  function endHold(btn) {
    btn.classList.remove('holding');
    if (holdRAF) { clearTimeout(holdRAF); cancelAnimationFrame(holdRAF); holdRAF = null; }
    FEEDBACK.endRotate();
  }
  function bind(btn, dir) {
    btn.addEventListener('pointerdown', (e) => { e.preventDefault(); startHold(dir, btn); btn.setPointerCapture(e.pointerId); });
    btn.addEventListener('pointerup',   ()  => endHold(btn));
    btn.addEventListener('pointercancel', () => endHold(btn));
    btn.addEventListener('pointerleave', () => endHold(btn));
  }
  bind(ccwBtn, +1);
  bind(cwBtn,  -1);
})();

/* ZOOM SLIDER */
(function zoomSlider() {
  const root  = document.getElementById('zoomSlider');
  const track = document.getElementById('zoomTrack');
  const thumb = document.getElementById('zoomThumb');
  const inBtn = document.getElementById('zoomIn');
  const outBtn= document.getElementById('zoomOut');
  function bounds() {
    const max = (viewMode === 'persp') ? 12 : 20;
    return { min: 1, max };
  }
  function distToT(d) {
    const b = bounds();
    const k = Math.log(d / b.min) / Math.log(b.max / b.min);
    return Math.max(0, Math.min(1, k));
  }
  function tToDist(t) {
    const b = bounds();
    return b.min * Math.pow(b.max / b.min, t);
  }
  function syncThumbToCam() {
    const t = distToT(camDist);
    thumb.style.top = (t * 100) + '%';
  }
  function setDistFromT(t) {
    camDist = tToDist(Math.max(0, Math.min(1, t)));
    applyCamera();
    syncThumbToCam();
  }
  let dragging = false;
  function trackEventToT(clientY) {
    const r = track.getBoundingClientRect();
    return (clientY - r.top) / r.height;
  }
  track.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    dragging = true;
    track.setPointerCapture(e.pointerId);
    thumb.classList.add('dragging');
    setDistFromT(trackEventToT(e.clientY));
  });
  track.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    setDistFromT(trackEventToT(e.clientY));
  });
  function stopDrag() { dragging = false; thumb.classList.remove('dragging'); }
  track.addEventListener('pointerup', stopDrag);
  track.addEventListener('pointercancel', stopDrag);
  const STEP = 0.04;
  let holdRAF = null;
  function stepBy(deltaT) { setDistFromT(distToT(camDist) + deltaT); }
  function bindBtn(btn, sign) {
    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      btn.setPointerCapture(e.pointerId);
      stepBy(sign * STEP);
      holdRAF = setTimeout(function tick() {
        stepBy(sign * STEP);
        holdRAF = setTimeout(tick, 90);
      }, 320);
    });
    const stop = () => { if (holdRAF) { clearTimeout(holdRAF); holdRAF = null; } };
    btn.addEventListener('pointerup', stop);
    btn.addEventListener('pointercancel', stop);
    btn.addEventListener('pointerleave', stop);
  }
  bindBtn(inBtn,  -1);
  bindBtn(outBtn, +1);
  let lastSyncedT = -1;
  (function syncLoop() {
    requestAnimationFrame(syncLoop);
    if (root.classList.contains('on')) {
      const t = distToT(camDist);
      if (Math.abs(t - lastSyncedT) > 0.001) {
        thumb.style.top = (t * 100) + '%';
        lastSyncedT = t;
      }
    }
  })();
  syncThumbToCam();
})();

/* TOUCH STATE */
let t0 = null;
let orbitStart = null;
let tDragging  = false;
let tPinch0    = 0;
let tAngle0    = 0;
let tMid0      = null;
let tMode      = 'none';

const dragOffset = new THREE.Vector3();
let dragOffsetSet = false;
const dragStart = new THREE.Vector3();
let currentAxisLock = null;
const AXIS_LOCK_DEG    = 12;
const AXIS_LOCK_MIN_M  = 0.05;
const AXIS_LOCK_TAN    = Math.tan(AXIS_LOCK_DEG * Math.PI / 180);

function applyAxisLock(desired) {
  const dx = desired.x - dragStart.x;
  const dz = desired.z - dragStart.z;
  const total = Math.hypot(dx, dz);
  if (total < AXIS_LOCK_MIN_M) return null;
  const ax = Math.abs(dx), az = Math.abs(dz);
  if (ax > az && (az / ax) < AXIS_LOCK_TAN) { desired.z = dragStart.z; return 'x'; }
  if (az > ax && (ax / az) < AXIS_LOCK_TAN) { desired.x = dragStart.x; return 'z'; }
  return null;
}

const _pickBox = new THREE.Box3();
const _pickHit = new THREE.Vector3();
function pickPlaced(nx, ny, requireSelected) {
  raycaster.setFromCamera(new THREE.Vector2(nx, ny), activeCam);
  let best = null, bestDist = Infinity;
  const list = requireSelected ? (selected ? [selected] : []) : placed;
  for (const obj of list) {
    _pickBox.setFromObject(obj.mesh);
    _pickBox.expandByScalar(0.05);
    if (raycaster.ray.intersectBox(_pickBox, _pickHit)) {
      const d = raycaster.ray.origin.distanceTo(_pickHit);
      if (d < bestDist) { bestDist = d; best = obj; }
    }
  }
  return best;
}


canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (e.touches.length === 1) {
    t0 = { x:e.touches[0].clientX, y:e.touches[0].clientY, t:Date.now() };
    tDragging = false;
    tMode = 'none';
    orbitStart = { theta:camTheta, elev:camElev, x:e.touches[0].clientX, y:e.touches[0].clientY };
    dragOffsetSet = false;
    if (selected) FEEDBACK.startTranslate(selected.mesh.position);
  } else if (e.touches.length === 2) {
    tPinch0 = getPinch(e);
    tAngle0 = getAngle(e);
    tMid0   = getMidpoint(e);
    tMode = selected ? 'rotate' : 'panZoom';
    if (tMode === 'rotate') FEEDBACK.startRotate(selected.mesh.rotation.y);
  }
}, { passive:false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && t0) {
    const dx = e.touches[0].clientX - t0.x;
    const dy = e.touches[0].clientY - t0.y;
    if (!tDragging && Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
    tDragging = true;

    if (selected && tMode !== 'orbit') {
      tMode = 'drag';
      const nx = (e.touches[0].clientX / canvas.parentElement.clientWidth) * 2 - 1;
      const ny = -((e.touches[0].clientY / canvas.parentElement.clientHeight) * 2 - 1);
      raycaster.setFromCamera(new THREE.Vector2(nx, ny), activeCam);
      const pt = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(groundPlane, pt)) {
        if (!dragOffsetSet) {
          dragOffset.set(selected.mesh.position.x - pt.x, 0, selected.mesh.position.z - pt.z);
          dragStart.copy(selected.mesh.position);
          dragOffsetSet = true;
        }
        const desired = new THREE.Vector3(pt.x + dragOffset.x, selected.mesh.position.y, pt.z + dragOffset.z);
        currentAxisLock = applyAxisLock(desired);
        selected.mesh.position.x = desired.x;
        selected.mesh.position.z = desired.z;
        const bx = new THREE.Box3().setFromObject(selected.mesh);
        if (bx.min.y < 0) selected.mesh.position.y -= bx.min.y;
        HELPER.show(selected, 'drag');
        HELPER.setAxisLock(currentAxisLock);
        FEEDBACK.updateTranslate(selected.mesh.position);
      }
    } else {
      tMode = 'orbit';
      if (viewMode !== 'plan') {
        camTheta = orbitStart.theta - (e.touches[0].clientX - orbitStart.x) * 0.007;
      }
      if (viewMode !== 'plan') {
        camElev = Math.max(0.05, Math.min(Math.PI / 2 - 0.05,
          orbitStart.elev + (e.touches[0].clientY - orbitStart.y) * 0.006));
      }
      applyCamera();
    }
  } else if (e.touches.length === 2) {
    if (tMode === 'rotate' && selected) {
      const da = getAngle(e) - tAngle0;
      selected.mesh.rotation.y -= da;
      tAngle0 = getAngle(e);
      HELPER.show(selected, 'rotate');
      HELPER.setRotationLabel(selected.mesh.rotation.y);
      FEEDBACK.updateRotate(selected.mesh.rotation.y);
    } else if (tMode === 'panZoom') {
      const dp = getPinch(e);
      const maxD = (viewMode === 'persp') ? 12 : 20;
      camDist = Math.max(1, Math.min(maxD, camDist * (tPinch0 / dp)));
      tPinch0 = dp;
      const mid = getMidpoint(e);
      const dx = mid.x - tMid0.x;
      const dy = mid.y - tMid0.y;
      tMid0 = mid;
      panCamera(dx, dy);
      applyCamera();
    }
  }
}, { passive:false });

canvas.addEventListener('touchend', (e) => {
  if (!tDragging && t0 && e.changedTouches.length === 1 && (Date.now() - t0.t) < 280) {
    handleTap(e.changedTouches[0]);
  }
  if (e.touches.length === 0) {
    if (tMode === 'drag' || tMode === 'rotate') HELPER.hide();
    if (tMode === 'drag')   FEEDBACK.endTranslate();
    if (tMode === 'rotate') FEEDBACK.endRotate();
    currentAxisLock = null;
    HELPER.setAxisLock(null);
    t0 = null; tDragging = false; tMode = 'none';
  }
}, { passive:false });

function getPinch(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}
function getAngle(e) {
  return Math.atan2(
    e.touches[1].clientY - e.touches[0].clientY,
    e.touches[1].clientX - e.touches[0].clientX
  );
}
function getMidpoint(e) {
  return {
    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
    y: (e.touches[0].clientY + e.touches[1].clientY) / 2
  };
}

const _panRight = new THREE.Vector3();
const _panUp    = new THREE.Vector3();
function panCamera(dx, dy) {
  const h = canvas.parentElement.clientHeight;
  let worldPerPixel;
  if (activeCam === orthoCam) {
    worldPerPixel = (orthoCam.top - orthoCam.bottom) / h;
  } else {
    const vFov = perspCam.fov * Math.PI / 180;
    worldPerPixel = (2 * Math.tan(vFov / 2) * camDist) / h;
  }
  _panRight.setFromMatrixColumn(activeCam.matrixWorld, 0);
  _panUp.setFromMatrixColumn(activeCam.matrixWorld, 1);
  camTarget.addScaledVector(_panRight, -dx * worldPerPixel);
  camTarget.addScaledVector(_panUp,     dy * worldPerPixel);
}

/* MOUSE for desktop */
let mDown = false, mDragging = false, mOrbitStart = null, mObjDrag = false, mPan = false, mPanStart = null;
let mObjRotate = false, mRotStartX = 0, mRotStartAngle = 0;
const ROT_SENSITIVITY = 0.012;

canvas.addEventListener('mousedown', (e) => {

window.addEventListener('mousemove', (e) => {

    raycaster.setFromCamera(new THREE.Vector2(nx, ny), activeCam);

    if (raycaster.ray.intersectPlane(groundPlane, pt)) {

      currentAxisLock = applyAxisLock(desired);

      HELPER.show(selected, 'drag');

/* PLACE */
function doPlace(pt) {
  const m = pending.mesh.clone(true);
  m.traverse((c) => {
    if (!c.isMesh) return;
    c.castShadow = c.receiveShadow = true;
    if (Array.isArray(c.material)) {
      c.material = c.material.map(mat => mat.clone());
    } else if (c.material) {
      c.material = c.material.clone();
    }
    c.userData.origMat = c.material;
  });
  m.position.set(pt.x, 0, pt.z);
  const b = new THREE.Box3().setFromObject(m);
  m.position.y -= b.min.y;
  scene.add(m);

  const sid = Date.now() + Math.floor(Math.random() * 1000);
  const p = {
    mesh: m, id: pending.id, name: pending.name,
    icon: pending.icon, imgUrl: pending.imgUrl, sceneId: sid
  };
  placed.push(p);
  snapList.push(p);

  const tel = document.querySelector('.tray-item[data-id="' + pending.id + '"]');
  if (tel) { tel.dataset.sid = sid; tel.classList.add('placed'); }
  pending = null;
  selectObj(p);
  document.getElementById('undoFab').classList.add('on');
  updateBadge();
  setStatus(placed.length + ' meuble' + (placed.length > 1 ? 's' : '') + ' - Touchez pour selectionner');
  document.getElementById('trayHint').textContent = 'Glissez pour deplacer - 2 doigts pour pivoter';
  toast(p.name + ' place', 'ok');
}

/* SELECT */
function selectObj(obj) {
  if (selected) {
    selected.mesh.traverse((c) => {
      if (c.isMesh && c.userData.origMat) c.material = c.userData.origMat;
    });
  }
  selected = obj;
  document.getElementById('delFab').classList.toggle('on', !!obj);
  document.getElementById('dupFab').classList.toggle('on', !!obj);
  document.getElementById('elevUp').classList.toggle('on', !!obj);
  document.getElementById('elevDown').classList.toggle('on', !!obj);
  document.getElementById('rotCw').classList.toggle('on', !!obj);
  document.getElementById('rotCcw').classList.toggle('on', !!obj);
  document.getElementById('zoomSlider').classList.toggle('on', !obj);
  const tag = document.getElementById('selTag');
  tag.classList.toggle('on', !!obj);
  if (obj) tag.textContent = obj.name;
  if (!obj) HELPER.hide();
}

/* DELETE */
window.doDelete = function() {
  if (!selected) return;
  scene.remove(selected.mesh);
  selected.mesh.traverse((c) => {
    if (c.isMesh && c.material) {
      if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
      else c.material.dispose();
    }
  });
  const removedId = selected.sceneId;
  const removedSrcId = selected.id;
  placed   = placed.filter(o => o.sceneId !== removedId);
  snapList = snapList.filter(o => o.sceneId !== removedId);
  const stillPlaced = placed.some(o => o.id === removedSrcId);
  if (!stillPlaced) {
    /* Plus aucune instance de ce produit dans la scène : on retire la
       vignette du tray, sauf s'il y a un placement en attente du même produit. */
    const isPending = pending && pending.id === removedSrcId;
    const tel = document.querySelector('.tray-item[data-id="' + removedSrcId + '"]');
    if (tel) {
      if (isPending) {
        tel.removeAttribute('data-sid');
        tel.classList.remove('placed');
      } else {
        tel.remove();
      }
    }
  }
  selected = null;
  document.getElementById('delFab').classList.remove('on');
  document.getElementById('dupFab').classList.remove('on');
  document.getElementById('elevUp').classList.remove('on');
  document.getElementById('elevDown').classList.remove('on');
  document.getElementById('rotCw').classList.remove('on');
  document.getElementById('rotCcw').classList.remove('on');
  document.getElementById('selTag').classList.remove('on');
  if (!snapList.length) document.getElementById('undoFab').classList.remove('on');
  updateBadge();
  setStatus(placed.length > 0 ? placed.length + ' meuble' + (placed.length > 1 ? 's' : '') : 'Ajoutez des meubles pour commencer');
  toast('Meuble supprime');
};

/* DUPLICATE */
window.doDuplicate = function() {
  if (!selected) return;
  const src = selected;
  const m = src.mesh.clone(true);
  m.traverse((c) => {
    if (!c.isMesh) return;
    c.castShadow = c.receiveShadow = true;
    if (Array.isArray(c.material)) {
      c.material = c.material.map(mat => mat.clone());
    } else if (c.material) {
      c.material = c.material.clone();
    }
    c.userData.origMat = c.material;
  });
  m.position.copy(src.mesh.position);
  m.position.x += 0.5;
  m.position.z += 0.5;
  m.rotation.copy(src.mesh.rotation);
  m.scale.copy(src.mesh.scale);
  scene.add(m);
  const sid = Date.now() + Math.floor(Math.random() * 1000);
  const p = { mesh: m, id: src.id, name: src.name, icon: src.icon, imgUrl: src.imgUrl, sceneId: sid };
  placed.push(p);
  snapList.push(p);
  selectObj(p);
  document.getElementById('undoFab').classList.add('on');
  updateBadge();
  setStatus(placed.length + ' meuble' + (placed.length > 1 ? 's' : ''));
  toast(src.name + ' duplique', 'ok');
};

/* UNDO */
window.doUndo = function() {
  if (!snapList.length) return;
  const last = snapList.pop();
  scene.remove(last.mesh);
  last.mesh.traverse((c) => {
    if (c.isMesh && c.material) {
      if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
      else c.material.dispose();
    }
  });
  placed = placed.filter(o => o.sceneId !== last.sceneId);
  if (selected && selected.sceneId === last.sceneId) {
    selected = null;
    document.getElementById('delFab').classList.remove('on');
    document.getElementById('dupFab').classList.remove('on');
    document.getElementById('elevUp').classList.remove('on');
    document.getElementById('elevDown').classList.remove('on');
    document.getElementById('rotCw').classList.remove('on');
    document.getElementById('rotCcw').classList.remove('on');
    document.getElementById('selTag').classList.remove('on');
  }
  const stillPlaced = placed.some(o => o.id === last.id);
  if (!stillPlaced) {
    const isPending = pending && pending.id === last.id;
    const tel = document.querySelector('.tray-item[data-id="' + last.id + '"]');
    if (tel) {
      if (isPending) {
        tel.removeAttribute('data-sid');
        tel.classList.remove('placed');
      } else {
        tel.remove();
      }
    }
  }
  if (!snapList.length) document.getElementById('undoFab').classList.remove('on');
  updateBadge();
  toast('Annule: ' + last.name);
};

/* LOAD GLB */
async function loadModel(item) {
  spin(true, 'Chargement ' + item.name + '...');
  try {
    const gltf = await new Promise((ok, fail) => {
      gltfLoader.load(item.glb, ok, null, fail);
    });
    const mesh = gltf.scene;
    const box = new THREE.Box3().setFromObject(mesh);
    const mh  = box.max.y - box.min.y;
    const th  = item.h ? (item.h / 100) : realH(item.category);
    if (mh > 0.001) mesh.scale.setScalar(th / mh);
    const box2 = new THREE.Box3().setFromObject(mesh);
    mesh.position.y -= box2.min.y;
    mesh.traverse((c) => {
      if (!c.isMesh) return;
      c.castShadow = c.receiveShadow = true;
      if (!c.material) return;
      const mats = Array.isArray(c.material) ? c.material : [c.material];
      mats.forEach((mat) => {
        ['map', 'emissiveMap'].forEach((k) => {
          if (mat[k]) { mat[k].colorSpace = THREE.SRGBColorSpace; mat[k].needsUpdate = true; }
        });
        ['normalMap', 'roughnessMap', 'metalnessMap', 'aoMap'].forEach((k) => {
          if (mat[k]) { mat[k].colorSpace = THREE.NoColorSpace; mat[k].needsUpdate = true; }
        });
        mat.needsUpdate = true;
      });
    });
    pending = { mesh, id:item.id, name:item.name, icon:item.icon || '\u25C7', imgUrl:item.imgUrl || null };
    spin(false);
    setStatus('Touchez le sol pour placer ' + item.name, true);
  } catch(e) {
    spin(false);
    toast('Erreur: ' + e.message, 'err');
  }
}

window.doExportAR = async function() {
  if (!placed.length) { toast('Ajoutez des meubles d\'abord', 'err'); return; }
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                (navigator.userAgent.includes('Mac') && 'ontouchend' in document);
  const isAndroid = /Android/.test(navigator.userAgent);
  spin(true, 'Generation AR (' + placed.length + ' modeles)...');
  const grp = new THREE.Group();
  grp.name = 'TadamHomeScene';
  const clonedMats = [];
  try {
    placed.forEach((obj, idx) => {
      const cl = obj.mesh.clone(true);
      cl.position.copy(obj.mesh.position);
      cl.rotation.copy(obj.mesh.rotation);
      cl.scale.copy(obj.mesh.scale);
      cl.name = 'object_' + idx + '_' + sanitize(obj.name);
      let meshIdx = 0;
      cl.traverse((c) => {
        if (c.name) c.name = 'o' + idx + '_' + sanitize(c.name);
        else c.name = 'o' + idx + '_n' + meshIdx;
        if (!c.isMesh) return;
        meshIdx++;
        if (!c.geometry || !c.material) {
          if (c.parent) c.parent.remove(c);
          return;
        }
        if (Array.isArray(c.material)) {
          c.material = c.material.map((m) => { const cm = m.clone(); clonedMats.push(cm); return cm; });
        } else {
          c.material = c.material.clone();
          clonedMats.push(c.material);
        }
      });
      grp.add(cl);
    });
    grp.updateMatrixWorld(true);

    if (isIOS) {
      const buf = await usdzEx.parse(grp, { maxTextureSize: 1024 });
      spin(false);
      const blob = new Blob([buf], { type: 'model/vnd.usdz+zip' });
      const url  = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.setAttribute('rel', 'ar');
      a.href = url;
      const img = document.createElement('img');
      img.style.display = 'none';
      a.appendChild(img);
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        if (a.parentNode) a.parentNode.removeChild(a);
        URL.revokeObjectURL(url);
      }, 8000);
      toast('Ouverture AR Quick Look...', 'ok');
    } else if (isAndroid) {
      const exporter = new GLTFExporter();
      exporter.parse(
        grp,
        async function(result) {
          try {
            const blob = new Blob([result], { type: 'model/gltf-binary' });
            const fileName = 'ar-scene-' + Date.now() + '-' + Math.floor(Math.random() * 1000) + '.glb';
            spin(true, 'Téléversement vers AR...');
            const { error: upErr } = await sb.storage
              .from('ar-scenes')
              .upload(fileName, blob, { contentType: 'model/gltf-binary', cacheControl: '3600', upsert: false });
            if (upErr) throw new Error('Upload échoué : ' + upErr.message);
            const { data: pub } = sb.storage.from('ar-scenes').getPublicUrl(fileName);
            if (!pub || !pub.publicUrl) throw new Error('URL publique introuvable');
            const glbUrl = pub.publicUrl;
            spin(false);
            const sceneViewerUrl =
              'https://arvr.google.com/scene-viewer/1.0' +
              '?file=' + encodeURIComponent(glbUrl) +
              '&mode=ar_preferred' +
              '&title=' + encodeURIComponent('Scene TadamHome');
            const arOverlay = document.createElement('div');
            arOverlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(28,27,24,.94);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px;animation:fadeIn .3s ease';
            arOverlay.innerHTML =
              '<div style="font-family:Cormorant Garamond,serif;font-size:26px;color:#fff;text-align:center;font-weight:300">Scene prete</div>' +
              '<div style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);text-align:center">Touchez le bouton pour lancer la realite augmentee</div>' +
              '<a id="ar-launch-btn" href="' + sceneViewerUrl + '" style="display:flex;align-items:center;gap:12px;background:#B8986A;color:#fff;padding:18px 36px;text-decoration:none;font-family:Outfit,sans-serif;font-size:13px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;box-shadow:0 4px 20px rgba(184,152,106,.4)">' +
                '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>' +
                'Lancer l\'AR' +
              '</a>' +
              '<button id="ar-cancel-btn" style="background:none;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.7);padding:10px 24px;font-family:Outfit,sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer">Annuler</button>';
            document.body.appendChild(arOverlay);
            arOverlay.querySelector('#ar-cancel-btn').onclick = () => arOverlay.remove();
            arOverlay.querySelector('#ar-launch-btn').onclick = () => {
              setTimeout(() => arOverlay.remove(), 1000);
            };
          } catch (err) {
            spin(false);
            console.error('[AR Android]', err);
            toast('Erreur AR : ' + (err.message || 'inconnu'), 'err');
          }
        },
        function(error) {
          spin(false);
          console.error('[AR Export GLB] failed:', error);
          toast('Erreur export GLB : ' + (error.message || 'inconnu'), 'err');
        },
        { binary: true, maxTextureSize: 1024, forcePowerOfTwoTextures: false, embedImages: true, truncateDrawRange: true }
      );
    } else {
      const exporter = new GLTFExporter();
      exporter.parse(
        grp,
        function(result) {
          spin(false);
          const blob = new Blob([result], { type: 'model/gltf-binary' });
          downloadGLB(blob);
          toast('Fichier GLB téléchargé', 'ok');
        },
        function(error) {
          spin(false);
          console.error('[AR Export GLB] failed:', error);
          toast('Erreur: ' + (error.message || 'echec export'), 'err');
        },
        { binary: true, maxTextureSize: 1024, forcePowerOfTwoTextures: false, embedImages: true, truncateDrawRange: true }
      );
    }
  } catch(err) {
    spin(false);
    console.error('[AR Export] failed:', err);
    toast('Erreur AR: ' + (err.message || 'echec export'), 'err');
  } finally {
    clonedMats.forEach((m) => { try { m.dispose(); } catch(_){} });
  }
};

function sanitize(s) {
  return String(s || 'item').replace(/[^a-zA-Z0-9_]/g, '_').substring(0, 40);
}

   CATALOGUE — chargement + filtre par catégorie + recherche
