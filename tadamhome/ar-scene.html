/* Catégories par défaut + leurs labels d'affichage. L'ordre détermine
   l'ordre dans la barre de filtres. */
const CAT_LABELS = {
  'all':         'Tout',
  'sofa':        'Canapés',
  'canape':      'Canapés',
  'fauteuil':    'Fauteuils',
  'chaise':      'Chaises',
  'table':       'Tables',
  'table basse': 'Tables basses',
  'bureau':      'Bureaux',
  'lit':         'Lits',
  'luminaire':   'Luminaires',
  'rangement':   'Rangements',
  'autre':       'Autres'
};

/* Normalisation d'une catégorie produit. On regroupe sofa+canapé,
   table+table basse, etc., pour éviter la duplication des onglets. */
function normCat(c) {
  if (!c) return 'autre';
  const k = String(c).trim().toLowerCase();
  if (k === 'sofa' || k === 'canape' || k === 'canapé' || k === 'canapés') return 'canape';
  if (k === 'fauteuil' || k === 'fauteuils' || k === 'armchair') return 'fauteuil';
  if (k === 'chaise'   || k === 'chaises'   || k === 'chair')    return 'chaise';
  if (k === 'table basse' || k === 'tables basses' || k === 'coffee table') return 'table';
  if (k === 'table' || k === 'tables') return 'table';
  if (k === 'bureau' || k === 'desk')  return 'bureau';
  if (k === 'lit' || k === 'lits' || k === 'bed') return 'lit';
  if (k === 'luminaire' || k === 'luminaires' || k === 'light' || k === 'lamp' || k === 'lampe') return 'luminaire';
  if (k === 'rangement' || k === 'rangements' || k === 'storage') return 'rangement';
  return 'autre';
}

async function loadCatalogue() {
  const res = await sb.from('products').select('*').order('created_at', { ascending:false });
  products = (res.data || []).filter(p => p.model_glb_url);
  renderCatFilter();
  renderGrid(applyCatAndSearchFilter());
}

/* Construit la barre de filtres en se basant sur les catégories réellement
   présentes dans les produits. Affiche un compteur entre parenthèses. */
function renderCatFilter() {
  const counts = { all: products.length };
  for (const p of products) {
    const k = normCat(p.category);
    counts[k] = (counts[k] || 0) + 1;
  }
  /* Ordre logique : Tout, Canapés, Fauteuils, Chaises, Tables, Bureaux, Lits, Luminaires, Rangements, Autres */
  const order = ['all','canape','fauteuil','chaise','table','bureau','lit','luminaire','rangement','autre'];
  const filterEl = document.getElementById('catFilter');
  filterEl.innerHTML = order
    .filter(k => k === 'all' || counts[k])
    .map(k => {
      const n = counts[k] || 0;
      const lbl = (k === 'all') ? 'Tout' : (CAT_LABELS[k] || k);
      const on  = (currentCatFilter === k) ? ' on' : '';
      return '<button class="cat-pill' + on + '" data-cat="' + k + '" onclick="setCatFilter(\'' + k + '\')">'
           + '<span>' + lbl + '</span>'
           + '<span class="cat-count">' + n + '</span>'
           + '</button>';
    }).join('');
}

window.setCatFilter = function(k) {
  currentCatFilter = k;
  document.querySelectorAll('.cat-pill').forEach(b => {
    b.classList.toggle('on', b.dataset.cat === k);
  });
  renderGrid(applyCatAndSearchFilter());
};

function applyCatAndSearchFilter() {
  const q = (document.getElementById('csrch').value || '').toLowerCase().trim();
  return products.filter(p => {
    if (currentCatFilter !== 'all' && normCat(p.category) !== currentCatFilter) return false;
    if (!q) return true;
    return ((p.name||'').toLowerCase().includes(q) || (p.enseigne_name||'').toLowerCase().includes(q));
  });
}

/* Conservé pour compatibilité avec l'oninput de l'input de recherche */
window.filterCat = function() {
  renderGrid(applyCatAndSearchFilter());
};

function renderGrid(list) {
  const g = document.getElementById('cgrid');
  if (!list.length) {
    g.innerHTML = '<div style="grid-column:1/-1;padding:32px 24px;text-align:center;color:var(--muted);font-size:12px;letter-spacing:.06em;text-transform:uppercase">Aucun modèle dans cette catégorie</div>';
    return;
  }
  g.innerHTML = list.map((p) => {
    const imgHtml = (p.images && p.images[0])
      ? '<img src="' + p.images[0] + '" style="width:100%;height:100%;object-fit:cover"/>'
      : catIco(p.category);
    /* On ne montre que les variantes utilisables (coloris avec un GLB propre,
       ou avec une texture qui peut s'appliquer au GLB principal). */
    const variants = Array.isArray(p.colors)
      ? p.colors.filter(c => c && (c.glb || c.texture || c.hex))
      : [];
    let varsHtml = '';
    if (variants.length) {
      const dots = variants.map((c, i) => {
        const safeName = (c.name || '').replace(/"/g, '&quot;');
        const subtitle = c.mat ? c.name + ' · ' + c.mat : c.name;
        const subSafe = (subtitle || '').replace(/"/g, '&quot;');
        const style = c.texture
          ? 'background-image:url(\'' + c.texture + '\')'
          : 'background:' + (c.hex || '#999');
        const disabled = c.glb ? '' : ' data-noglb="1"';
        return '<button class="cov-var" style="'+style+'" title="'+subSafe+'" data-pid="'+p.id+'" data-vi="'+i+'"'+disabled+' onclick="addFromVariant(\''+p.id+'\','+i+',this)"></button>';
      }).join('');
      varsHtml = '<div class="cov-var-lbl">Coloris ('+variants.length+')</div>'
               + '<div class="cov-vars">' + dots + '</div>';
    }
    return '<div class="cov-card">'
      + '<div class="cov-img">' + imgHtml + '</div>'
      + '<div class="cov-brand">' + (p.enseigne_name||'') + '</div>'
      + '<div class="cov-name">' + (p.name||'') + '</div>'
      + '<button class="cov-btn" onclick="addFromCat(\'' + p.id + '\')">+ Ajouter</button>'
      + varsHtml
      + '</div>';
  }).join('');
}

window.addFromCat = async function(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  closeCat();
  const trayImg = (p.images && p.images[0]) ? p.images[0] : null;
  await loadModel({
    id: p.id, name: p.name,
    glb: p.model_glb_url,
    category: p.category,
    h: p.dimensions && p.dimensions.h ? p.dimensions.h : null,
    icon: catIco(p.category),
    imgUrl: trayImg
  });
  addTrayItem({ id:p.id, name:p.name, icon:catIco(p.category), imgUrl:trayImg });
};

/* Ajouter une variante (coloris) — utilise le GLB de la variante si présent,
   sinon retombe sur le GLB principal. La vignette du tray prend la texture
   du coloris (mieux pour distinguer plusieurs variantes du même produit). */
window.addFromVariant = async function(productId, colorIndex, btnEl) {
  const p = products.find(x => x.id === productId);
  if (!p || !Array.isArray(p.colors) || !p.colors[colorIndex]) return;
  const c = p.colors[colorIndex];
  const glb = c.glb || p.model_glb_url;
  if (!glb) { toast('Ce coloris n\'a pas de modèle 3D', 'err'); return; }
  if (btnEl) btnEl.classList.add('adding');
  closeCat();
  /* ID composite pour que chaque variante soit une vignette distincte du tray */
  const variantId  = p.id + ':' + colorIndex;
  const variantName= p.name + ' · ' + (c.name || 'variante');
  const trayImg    = c.texture || (p.images && p.images[0]) || null;
  await loadModel({
    id: variantId, name: variantName,
    glb: glb,
    category: p.category,
    h: p.dimensions && p.dimensions.h ? p.dimensions.h : null,
    icon: catIco(p.category),
    imgUrl: trayImg
  });
  addTrayItem({ id: variantId, name: variantName, icon: catIco(p.category), imgUrl: trayImg });
  if (btnEl) setTimeout(() => btnEl.classList.remove('adding'), 350);
};

/* TRAY */
function addTrayItem(item) {
  const tray = document.getElementById('tray');
  if (document.querySelector('.tray-item[data-id="' + item.id + '"]')) return;
  const d = document.createElement('div');
  d.className = 'tray-item sel';
  d.dataset.id = item.id;
  const thumbHtml = item.imgUrl
    ? '<img src="' + item.imgUrl + '" style="width:100%;height:100%;object-fit:cover"/>'
    : item.icon;
  d.innerHTML = '<div class="tray-thumb">' + thumbHtml + '</div><div class="tray-name">' + item.name + '</div>';
  d.addEventListener('click', () => {
    document.querySelectorAll('.tray-item').forEach(t => t.classList.remove('sel'));
    d.classList.add('sel');
    if (pending && pending.id === item.id) {
      setStatus('Touchez le sol pour placer ' + item.name, true);
    }
  });
  tray.appendChild(d);
}

/* Cache des prévisualisations en sphère (data URL PNG par texture) */
const _spherePreviewCache = {};
let _spheRenderer = null, _spheScene = null, _spheCamera = null,
    _spheMesh = null, _spheMat = null;

/* Setup unique du rig de rendu sphère — appelé une fois à la première
   demande de preview, puis réutilisé pour toutes les textures. */
function ensureSphereRig() {
  if (_spheRenderer) return;
  const cv = document.createElement('canvas');
  cv.width = 384; cv.height = 384;
  _spheRenderer = new THREE.WebGLRenderer({canvas: cv, alpha: true, antialias: true, preserveDrawingBuffer: true});
  _spheRenderer.outputColorSpace = THREE.SRGBColorSpace;
  _spheRenderer.toneMapping = THREE.ACESFilmicToneMapping;
  _spheRenderer.toneMappingExposure = 1.05;

  _spheScene = new THREE.Scene();
  _spheCamera = new THREE.PerspectiveCamera(32, 1, 0.1, 100);
  _spheCamera.position.set(0, 0, 3.0);
  _spheCamera.lookAt(0, 0, 0);

  /* Éclairage type "studio shot" — clé chaude haut-droite, fill froid bas-gauche */
  _spheScene.add(new THREE.AmbientLight(0xffffff, 0.42));
  const key = new THREE.DirectionalLight(0xfff5e8, 1.35);
  key.position.set(2.5, 2.2, 3);
  _spheScene.add(key);
  const rim = new THREE.DirectionalLight(0xc8d4e0, 0.55);
  rim.position.set(-2, 0.5, -1);
  _spheScene.add(rim);

  const geo = new THREE.SphereGeometry(1.1, 64, 48);
  _spheMat = new THREE.MeshStandardMaterial({
    color: 0xffffff, roughness: 0.5, metalness: 0
  });
  _spheMesh = new THREE.Mesh(geo, _spheMat);
  _spheScene.add(_spheMesh);
}

async function generateSpherePreview(preset) {
  if (_spherePreviewCache[preset.id]) return _spherePreviewCache[preset.id];
  ensureSphereRig();

  /* Texture séparée du sol applicable — on la veut affichée à un repeat
     fixe optimisé pour la sphère (~1.5×) indépendamment du repeat configuré
     pour le rendu plancher. */
  let tex = null;
  if (preset.image_url) {
    tex = await new Promise((resolve) => {
      const loader = new THREE.TextureLoader();
      loader.crossOrigin = 'anonymous';
      loader.load(
        preset.image_url,
        (t) => {
          t.colorSpace = THREE.SRGBColorSpace;
          t.wrapS = t.wrapT = THREE.RepeatWrapping;
          resolve(t);
        },
        null,
        () => resolve(null)
      );
    });
  }

  if (_spheMat.map) { _spheMat.map.dispose(); _spheMat.map = null; }
  if (tex) {
    tex.repeat.set(1.6, 1.6);
    _spheMat.map = tex;
    _spheMat.color.set(0xffffff);
  } else {
    _spheMat.color.set(preset.bg_color || '#F5F4F0');
  }
  _spheMat.roughness = preset.roughness ?? 0.85;
  _spheMat.needsUpdate = true;

  _spheRenderer.render(_spheScene, _spheCamera);
  const dataUrl = _spheRenderer.domElement.toDataURL('image/png');
  _spherePreviewCache[preset.id] = dataUrl;
  return dataUrl;
}

async function renderFloorGrid() {
  const g = document.getElementById('floorGrid');
  if (!FLOOR_PRESETS.length) {
    g.innerHTML = '<div style="grid-column:1/-1;padding:24px 16px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-family:var(--sans)">Aucune texture disponible.<br/>Ajoutez-en depuis l\'admin.</div>';
    return;
  }
  const filtered = (currentFloorCat === 'all')
    ? FLOOR_PRESETS
    : FLOOR_PRESETS.filter(p => (p.category || 'autre') === currentFloorCat);
  if (!filtered.length) {
    g.innerHTML = '<div style="grid-column:1/-1;padding:24px 16px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-family:var(--sans)">Aucune texture dans cette catégorie</div>';
    return;
  }
  /* Squelette d'abord — le DOM s'affiche immédiatement, les sphères se
     remplissent ensuite asynchroneousement (fade-in via CSS). */
  g.innerHTML = filtered.map(p => {
    const on = (p.id === currentFloorId) ? ' on' : '';
    const safeId = String(p.id).replace(/'/g, "\\'");
    const subtitle = FLOOR_CAT_LABELS[p.category] || 'Texture';
    return '<button class="floor-swatch' + on + '" data-floor="' + p.id + '" onclick="setFloor(\'' + safeId + '\')" title="' + p.name + '">'
      + '<div class="floor-thumb"><div class="floor-thumb-fallback"></div><img class="floor-sphere" data-pid="' + p.id + '" alt=""/></div>'
      + '<div class="floor-meta"><div class="floor-name">' + p.name + '</div><div class="floor-cat">' + subtitle + '</div></div>'
      + '</button>';
  }).join('');
  /* Génère les sphères en série (réutilise un seul renderer) */
  for (const p of filtered) {
    try {
      const dataUrl = await generateSpherePreview(p);
      const img = g.querySelector('.floor-sphere[data-pid="' + p.id + '"]');
      if (img) img.src = dataUrl;
    } catch(e) {
      console.warn('[sphere preview]', p.id, e);
    }
  }
}

window.setFloor = function(id) {
  applyFloor(id);
  document.querySelectorAll('.floor-swatch').forEach(b => {
    b.classList.toggle('on', b.dataset.floor === id);
  });
  const preset = FLOOR_PRESETS.find(p => p.id === id);
  toast('Sol : ' + (preset ? preset.name : 'Mis à jour'), 'ok');
};

function syncBrightnessSlider() {
  const val = Math.round(LIGHT_MULT * 100);
  const mini = document.getElementById('brightMiniSlider');
  if (mini) mini.value = val;
}

/* Source unique de mise à jour de luminosité — appelée par le slider mini */
function setBrightnessPct(pct, persist) {
  pct = Math.max(40, Math.min(160, parseInt(pct, 10) || 100));
  LIGHT_MULT = pct / 100;
  applyBrightness();
  syncBrightnessSlider();
  if (persist !== false) {
    try { localStorage.setItem('tadam_brightness', String(LIGHT_MULT)); } catch(_){}
  }
}

document.getElementById('brightMiniSlider').addEventListener('input', (e) => {
  setBrightnessPct(e.target.value);
});


/* ========================================================================
   SCENES — save / load / delete
   ======================================================================== */
const SCENES_KEY = 'tadam_saved_scenes';

function listScenes() {
  try { return JSON.parse(localStorage.getItem(SCENES_KEY) || '[]'); }
  catch(e) { return []; }
}
function persistScenes(arr) {
  try {
    localStorage.setItem(SCENES_KEY, JSON.stringify(arr));
    return true;
  } catch(e) {
    toast('Espace de stockage plein', 'err');
    console.warn(e);
    return false;
  }
}
function captureThumbnail(maxW, maxH) {
  renderer.render(scene, activeCam);
  const sw = canvas.width;
  const sh = canvas.height;
  const k  = Math.min(maxW / sw, maxH / sh, 1);
  const tw = Math.max(1, Math.round(sw * k));
  const th = Math.max(1, Math.round(sh * k));
  const c = document.createElement('canvas');
  c.width = tw; c.height = th;
  const ctx = c.getContext('2d');
  ctx.drawImage(canvas, 0, 0, tw, th);
  try { return c.toDataURL('image/jpeg', 0.65); }
  catch(_) { return null; }
}

window.openScenes = function() {
  document.getElementById('scnNameInput').value = '';
  renderScenesModal();
  document.getElementById('scnOv').classList.add('open');
};
window.closeScenes = function() {
  document.getElementById('scnOv').classList.remove('open');
};

window.saveScene = function() {
  if (!placed.length) {
    toast('Aucun meuble a sauvegarder', 'err');
    return;
  }
  const input = document.getElementById('scnNameInput');
  let name = (input.value || '').trim();
  if (!name) {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    name = 'Scene ' + pad(d.getDate()) + '/' + pad(d.getMonth() + 1)
         + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  const thumb = captureThumbnail(280, 180);
  const scn = {
    id: 'scene_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
    name,
    savedAt: Date.now(),
    thumb,
    /* On enregistre aussi le sol et la luminosité pour reproduire l'ambiance */
    floorId: currentFloorId,
    lightMult: LIGHT_MULT,
    items: placed.map((p) => {
      /* ID composite "productId:variantIndex" pour les variantes — on
         décompose pour retrouver le produit et le coloris. */
      const parts = String(p.id).split(':');
      const baseId = parts[0];
      const variantIdx = parts.length > 1 ? parseInt(parts[1], 10) : null;
      const prod = products.find(x => x.id === baseId);
      let glb = null, cat = null, hCm = null;
      if (prod) {
        cat = prod.category;
        hCm = prod.dimensions && prod.dimensions.h ? prod.dimensions.h : null;
        if (variantIdx !== null && Array.isArray(prod.colors) && prod.colors[variantIdx]) {
          glb = prod.colors[variantIdx].glb || prod.model_glb_url;
        } else {
          glb = prod.model_glb_url;
        }
      }
      return {
        productId: p.id,            // ID composite, utilisé pour la déduplication tray
        baseProductId: baseId,
        variantIndex: variantIdx,
        name: p.name,
        glbUrl: glb,
        category: cat,
        heightCm: hCm,
        imgUrl: p.imgUrl || (prod && prod.images && prod.images[0]) || null,
        position: { x: p.mesh.position.x, y: p.mesh.position.y, z: p.mesh.position.z },
        rotationY: p.mesh.rotation.y || 0,
        scale: p.mesh.scale.x || 1
      };
    })
  };
  const restorable = scn.items.filter(it => it.glbUrl);
  if (!restorable.length) {
    toast('Aucun modele restaurable (catalogue introuvable)', 'err');
    return;
  }
  scn.items = restorable;
  const arr = listScenes();
  arr.unshift(scn);
  if (persistScenes(arr)) {
    input.value = '';
    renderScenesModal();
    toast('Scene "' + name + '" sauvegardee', 'ok');
  }
};

window.deleteScene = function(id) {
  const arr = listScenes().filter(s => s.id !== id);
  if (persistScenes(arr)) {
    renderScenesModal();
    toast('Scene supprimee');
  }
};

window.loadSavedScene = async function(id) {
  const arr = listScenes();
  const scn = arr.find(s => s.id === id);
  if (!scn) { toast('Scene introuvable', 'err'); return; }
  closeScenes();
  spin(true, 'Chargement de la scene...');
  if (!products.length) {
    try { await loadCatalogue(); } catch(_) {}
  }
  clearScene();
  /* Restaure l'ambiance avant d'ajouter les meubles */
  if (!FLOOR_PRESETS.length) {
    try { await loadFloorTextures(); } catch(_) {}
  }
  if (scn.floorId) await applyFloor(scn.floorId);
  if (typeof scn.lightMult === 'number') {
    LIGHT_MULT = Math.max(0.4, Math.min(1.6, scn.lightMult));
    applyBrightness();
    syncBrightnessSlider();
  }
  for (const it of scn.items) {
    if (!it.glbUrl) {
      const baseId = it.baseProductId || String(it.productId).split(':')[0];
      const p = products.find(x => x.id === baseId);
      if (p) {
        const vi = (typeof it.variantIndex === 'number')
          ? it.variantIndex
          : (String(it.productId).includes(':') ? parseInt(String(it.productId).split(':')[1], 10) : null);
        if (vi !== null && Array.isArray(p.colors) && p.colors[vi]) {
          it.glbUrl = p.colors[vi].glb || p.model_glb_url;
        } else {
          it.glbUrl = p.model_glb_url;
        }
      }
    }
    if (!it.glbUrl) { console.warn('Skipping unrestorable item', it.name); continue; }
    try {
      await restoreSavedItem(it);
    } catch(e) {
      console.warn('Failed to restore item', it.name, e);
    }
  }
  spin(false);
  toast('Scene "' + scn.name + '" chargee', 'ok');
  setStatus(placed.length + ' meuble' + (placed.length > 1 ? 's' : '') + ' charge' + (placed.length > 1 ? 's' : ''));
};

async function restoreSavedItem(it) {
  const gltf = await new Promise((ok, fail) => {
    gltfLoader.load(it.glbUrl, ok, null, fail);
  });
  const mesh = gltf.scene;
  const box = new THREE.Box3().setFromObject(mesh);
  const mh  = box.max.y - box.min.y;
  const th  = it.heightCm ? (it.heightCm / 100) : realH(it.category);
  if (mh > 0.001) mesh.scale.setScalar(th / mh);
  const box2 = new THREE.Box3().setFromObject(mesh);
  mesh.position.y -= box2.min.y;
  mesh.traverse((c) => {
    if (!c.isMesh) return;
    c.castShadow = c.receiveShadow = true;
    if (!c.material) return;
    const mats = Array.isArray(c.material) ? c.material : [c.material];
    mats.forEach((mat) => {
      ['map', 'emissiveMap'].forEach((k) => {
        if (mat[k]) { mat[k].colorSpace = THREE.SRGBColorSpace; mat[k].needsUpdate = true; }
      });
      ['normalMap', 'roughnessMap', 'metalnessMap', 'aoMap'].forEach((k) => {
        if (mat[k]) { mat[k].colorSpace = THREE.NoColorSpace; mat[k].needsUpdate = true; }
      });
      mat.needsUpdate = true;
    });
  });
  pending = { mesh, id: it.productId, name: it.name, icon: catIco(it.category), imgUrl: it.imgUrl || null };
  pending.mesh.rotation.y = it.rotationY || 0;
  doPlace({ x: it.position.x, z: it.position.z });
  addTrayItem({ id: it.productId, name: it.name, icon: catIco(it.category), imgUrl: it.imgUrl });
}

function clearScene() {
  placed.forEach((p) => {
    scene.remove(p.mesh);
    p.mesh.traverse((c) => {
      if (c.isMesh && c.material) {
        if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
        else c.material.dispose();
      }
    });
  });
  placed   = [];
  snapList = [];
  selected = null;
  pending  = null;
  document.getElementById('delFab').classList.remove('on');
  document.getElementById('dupFab').classList.remove('on');
  document.getElementById('elevUp').classList.remove('on');
  document.getElementById('elevDown').classList.remove('on');
  document.getElementById('rotCw').classList.remove('on');
  document.getElementById('rotCcw').classList.remove('on');
  document.getElementById('selTag').classList.remove('on');
  document.getElementById('undoFab').classList.remove('on');
  document.querySelectorAll('.tray-item').forEach(el => el.remove());
  updateBadge();
  setStatus('Ajoutez des meubles pour commencer');
}

function renderScenesModal() {
  const arr = listScenes();
  const list = document.getElementById('scnList');
  document.getElementById('scnCount').textContent = arr.length;
  document.getElementById('scnSaveBtn').disabled = (placed.length === 0);
  if (!arr.length) {
    list.innerHTML = '<div class="sov-empty">Aucune scene sauvegardee</div>';
    return;
  }
  list.innerHTML = arr.map((s) => {
    const d = new Date(s.savedAt);
    const pad = (n) => String(n).padStart(2, '0');
    const dateStr = pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    const cnt = s.items.length;
    const safeName = String(s.name).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const thumbHtml = s.thumb ? '<img src="' + s.thumb + '" alt=""/>' : '\u25C7';
    return '<div class="sov-item">'
      + '<div class="sov-item-thumb">' + thumbHtml + '</div>'
      + '<div class="sov-item-info">'
        + '<div class="sov-item-name">' + safeName + '</div>'
        + '<div class="sov-item-meta">' + dateStr + ' &middot; ' + cnt + ' meuble' + (cnt > 1 ? 's' : '') + '</div>'
      + '</div>'
      + '<div class="sov-item-actions">'
        + '<button class="sov-item-btn load" onclick="loadSavedScene(\'' + s.id + '\')" title="Charger">'
          + '<svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>'
        + '</button>'
        + '<button class="sov-item-btn del" onclick="deleteScene(\'' + s.id + '\')" title="Supprimer">'
          + '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>'
        + '</button>'
      + '</div>'
    + '</div>';
  }).join('');
}

/* ========================================================================
   INIT — restaure l'ambiance + charge le catalogue + auto-place si demandé
   ======================================================================== */

/* Luminosité d'abord (n'a pas besoin du réseau) */
try {
  const savedBright = parseFloat(localStorage.getItem('tadam_brightness'));
  if (!isNaN(savedBright)) {
    LIGHT_MULT = Math.max(0.4, Math.min(1.6, savedBright));
    applyBrightness();
  }
  syncBrightnessSlider();
} catch(_) {}

/* Sol par défaut tant que la liste n'est pas chargée — évite un sol blanc */
applyFloor('_fallback');

/* Puis on charge la liste des sols depuis Supabase, et on applique le bon */
loadFloorTextures().then(() => {
  let chosenId = null;
  /* 1. Sol précédemment choisi (localStorage) */
  try {
    const savedFloor = localStorage.getItem('tadam_floor');
    if (savedFloor && FLOOR_PRESETS.some(p => p.id === savedFloor)) {
      chosenId = savedFloor;
    }
  } catch(_) {}
  /* 2. Sol marqué "default" en base — priorité aux vraies textures uploadées */
  if (!chosenId) {
    const def = FLOOR_PRESETS.find(p => p.id !== '_fallback' && p.is_default);
    if (def) chosenId = def.id;
  }
  /* 3. Par défaut : Carreaux blancs */
  if (!chosenId) chosenId = '_fallback';
  applyFloor(chosenId);
}).catch(() => {});

loadCatalogue();
document.getElementById('zoomSlider').classList.add('on');

const q = JSON.parse(localStorage.getItem('tadam_ar_scene') || '[]');
if (q.length) {
  localStorage.removeItem('tadam_ar_scene');
  (async function autoPlaceModels() {
    spin(true, 'Chargement de la scène...');
    for (let i = 0; i < q.length; i++) {
      const item = q[i];
      if (!item.glb) continue;
      try {
        await loadModel({
          id: item.id,
          name: item.name,
          glb: item.glb,
          category: item.category,
          h: item.dimensions && typeof item.dimensions === 'object' && item.dimensions.h ? item.dimensions.h : null,
          icon: catIco(item.category)
        });
        const angle = (i / Math.max(q.length, 1)) * Math.PI * 2;
        const radius = q.length > 1 ? 1.5 : 0;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        doPlace({ x, y: 0, z });
        addTrayItem({ id: item.id, name: item.name, icon: catIco(item.category) });
      } catch(e) {
        console.error('Erreur placement auto:', e);
        toast('Erreur: ' + item.name, 'err');
      }
    }
    spin(false);
    if (placed.length > 0) {
      toast('Scène chargée: ' + placed.length + ' meuble' + (placed.length > 1 ? 's' : '') + ' placé' + (placed.length > 1 ? 's' : ''));
      setStatus(placed.length + ' meuble' + (placed.length > 1 ? 's' : '') + ' placé' + (placed.length > 1 ? 's' : ''));
    }
  })();
}
</script>
